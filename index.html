<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%23ff4d4d'/%3E%3Cg transform='translate(8,14)'%3E%3Crect x='0' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3Crect x='11.5' y='-1' width='10' height='12' rx='1' fill='none' stroke='white' stroke-width='1.5'/%3E%3Crect x='23' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3C/g%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Movi</title>
  <meta name="description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:title" content="Movi" />
  <meta property="og:description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:image" content="https://movirank.com/og-image.png?v=2" />
  <meta property="og:url" content="https://movirank.com/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Movi" />
  <meta name="twitter:description" content="Every movie ranked, one matchup at a time." />
  <meta name="twitter:image" content="https://movirank.com/og-image.png?v=2" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111115;
      --surface2: #18181e;
      --accent: #ff4d4d;
      --accent-hover: #ff6b6b;
      --text: #f0efe8;
      --text-muted: #6e6e7a;
      --gold: #f5c518;
      --radius: 14px;
      --border: #1c1c22;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #root { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Film Strip Logo */
    .header { text-align: center; padding: 36px 0 20px; position: relative; }
    .header h1 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; cursor: pointer; display: none; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }

    .logo-strip { display: flex; align-items: center; justify-content: center; gap: 0; cursor: pointer; }
    .logo-frame {
      display: flex; align-items: center; justify-content: center; position: relative;
      width: 38px; height: 46px; border: 2px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.025);
    }
    .logo-frame.active {
      border-color: var(--accent); background: rgba(255,77,77,0.07);
      transform: scale(1.1); z-index: 2;
      box-shadow: 0 0 20px rgba(255,77,77,0.25);
    }
    .logo-frame .frame-num {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px;
      color: rgba(255,255,255,0.16);
    }
    .logo-frame.active .frame-num { color: var(--accent); }
    .logo-frame .sprocket {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 9px; height: 3px; border-radius: 1px; background: rgba(255,255,255,0.08);
    }
    .logo-frame.active .sprocket { background: rgba(255,77,77,0.28); }
    .sprocket-top { top: 3px; }
    .sprocket-bot { bottom: 3px; }
    .logo-wordmark {
      font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 32px;
      letter-spacing: 10px; text-transform: uppercase; color: #fff; margin-top: 8px;
    }
    .logo-tv-sub {
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 10px;
      letter-spacing: 4px; text-transform: uppercase; color: #4ddb9a; opacity: 0.65;
      margin-top: 2px; display: none;
    }
    .tv-mode .logo-tv-sub { display: block; }
    .tv-mode .logo-frame.active {
      border-color: var(--accent); background: rgba(0,105,62,0.1);
      box-shadow: 0 0 20px rgba(0,105,62,0.25);
    }
    .tv-mode .logo-frame.active .frame-num { color: var(--accent); }
    .tv-mode .logo-frame.active .sprocket { background: rgba(0,105,62,0.35); }

    /* Auth Bar */
    .auth-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      padding: 10px 0; margin-bottom: 4px;
    }
    .auth-user {
      display: flex; align-items: center; gap: 8px;
    }
    .auth-avatar {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent);
    }
    .auth-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent);
    }
    .auth-name { font-size: 0.85rem; font-weight: 600; }
    .auth-btn {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-btn-signin {
      background: var(--accent); color: #fff;
    }
    .auth-btn-signin:hover { background: var(--accent-hover); }
    .auth-btn-signout {
      background: #333; color: var(--text-muted); font-size: 0.75rem; padding: 6px 12px;
    }
    .auth-btn-signout:hover { background: #444; color: var(--text); }
    .auth-btn-email {
      background: #fff; color: #333;
    }
    .auth-btn-email:hover { background: #e0e0e0; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 10px 0;
      color: var(--text-muted); font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ""; flex: 1; height: 1px; background: #333;
    }
    .auth-form {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px;
      margin-bottom: 16px; max-width: 360px; margin-left: auto; margin-right: auto;
    }
    .auth-form h3 { text-align: center; margin-bottom: 16px; font-size: 1.1rem; font-family: 'Outfit', sans-serif; }
    .auth-input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 0.9rem; margin-bottom: 10px;
      outline: none; transition: border-color 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: #666; }
    .auth-error {
      color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; text-align: center;
    }
    .auth-link {
      color: var(--accent); cursor: pointer; font-size: 0.8rem;
      background: none; border: none; text-decoration: underline;
    }
    .auth-link:hover { color: var(--accent-hover); }
    .auth-form-footer {
      text-align: center; margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);
    }
    .auth-form-submit {
      width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; background: var(--accent); color: #fff;
      transition: background 0.2s; margin-top: 4px;
    }
    .auth-form-submit:hover { background: var(--accent-hover); }
    .auth-back {
      display: block; text-align: center; margin-bottom: 12px;
      color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
      background: none; border: none;
    }
    .auth-back:hover { color: var(--text); }
    .auth-sync {
      font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
    }
    .auth-sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block;
    }

    /* Share */
    .share-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }
    .private-toggle {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .private-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .private-toggle.active { border-color: var(--gold); color: var(--gold); }

    /* Profile View (viewing someone else's rankings) */
    .profile-banner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px;
      text-align: center; margin-bottom: 20px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent); margin-bottom: 10px;
    }
    .profile-avatar-ph {
      width: 64px; height: 64px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      border: 3px solid var(--accent); margin: 0 auto 10px;
    }
    .profile-name { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .profile-count { color: var(--text-muted); font-size: 0.9rem; }
    .profile-back {
      display: inline-block; margin-top: 12px; padding: 8px 20px;
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .profile-back:hover { background: var(--accent-hover); }

    /* Tabs for navigation */
    .nav-tabs {
      display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto;
    }
    .nav-tab {
      flex: 1; padding: 10px 16px; border: none; background: none;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; text-align: center;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.3px;
    }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* Community */
    .community-section { margin-top: 10px; }
    .community-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .community-list { display: flex; flex-direction: column; gap: 8px; }
    .community-card {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .community-card:hover { background: var(--surface2); transform: translateY(-2px); }
    .community-card-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-avatar-ph {
      width: 44px; height: 44px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-info { flex: 1; min-width: 0; }
    .community-card-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem; }
    .community-card-meta { color: var(--text-muted); font-size: 0.8rem; }
    .community-card-top {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .community-card-top img, .community-card-top .poster-placeholder {
      width: 28px; height: 42px; border-radius: 4px; object-fit: cover;
    }
    .community-card-arrow { color: var(--text-muted); font-size: 1.2rem; flex-shrink: 0; }
    .compatibility-badge {
      font-size: 0.7rem; font-weight: 700; padding: 4px 8px;
      border-radius: 12px; flex-shrink: 0; text-align: center;
      min-width: 36px; line-height: 1;
    }
    .compatibility-high { background: var(--accent); color: #fff; }
    .compatibility-mid { background: #b8860b; color: #fff; }
    .compatibility-low { background: var(--surface2); color: var(--text-muted); font-weight: 600; }
    .compatibility-badge { cursor: pointer; }
    .compatibility-badge:active { transform: scale(0.95); }
    .compat-explainer {
      background: var(--surface); border: 1px solid var(--accent); border-radius: 12px;
      padding: 14px 18px; margin-bottom: 12px; font-size: 0.8rem;
      color: var(--text); line-height: 1.5; position: relative;
      animation: fadeInUp 0.2s;
    }
    .compat-explainer-close {
      position: absolute; top: 6px; right: 10px; background: none; border: none;
      color: var(--text-muted); cursor: pointer; font-size: 1rem;
    }
    .community-delete-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      opacity: 0.4; transition: opacity 0.2s; padding: 4px 8px; flex-shrink: 0;
    }
    .community-delete-btn:hover { opacity: 1; }

    /* Search */
    .search-section { position: relative; margin-bottom: 24px; }
    .search-input {
      width: 100%; padding: 14px 20px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 1rem; outline: none; transition: border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface); border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--border); border-top: none; max-height: 400px; overflow-y: auto;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .search-item:hover { background: rgba(255, 77, 77, 0.1); }
    .search-item-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #2a2a4a; }
    .search-item-info { flex: 1; }
    .search-item-title { font-weight: 600; font-size: 0.95rem; }
    .search-item-year { color: var(--text-muted); font-size: 0.85rem; }
    .search-item-dupe {
      font-size: 0.75rem; color: var(--gold); background: rgba(245, 197, 24, 0.15);
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .search-add-custom {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; transition: background 0.15s; color: var(--accent);
      font-weight: 600; border-top: 1px solid #333;
    }
    .search-add-custom:hover { background: rgba(233, 69, 96, 0.15); }
    .search-add-icon {
      width: 40px; height: 60px; border-radius: 4px; background: #2a2a4a;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      color: var(--accent); flex-shrink: 0;
    }
    .poster-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: #2a2a4a; color: var(--text-muted); font-size: 0.6rem;
      text-align: center; overflow: hidden;
    }

    /* Recommendations */
    .recs-section { margin-bottom: 30px; }
    .recs-category { margin-bottom: 20px; }
    .recs-category-title {
      font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; color: var(--text-muted);
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .recs-category-title:hover { color: var(--text); }
    .recs-category-title .expand-hint {
      font-size: 0.65rem; opacity: 0; transition: opacity 0.2s; color: var(--accent);
    }
    .recs-category-title:hover .expand-hint { opacity: 1; }
    .recs-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .recs-row::-webkit-scrollbar { height: 6px; }
    .recs-row::-webkit-scrollbar-track { background: transparent; }
    .recs-row::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .rec-card {
      flex-shrink: 0; width: 110px; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
      position: relative;
    }
    .rec-card:hover { transform: scale(1.05) translateY(-3px); }
    .rec-card.ranked { opacity: 0.35; }
    .rec-card img, .rec-card .poster-placeholder {
      width: 110px; height: 165px; border-radius: 8px; object-fit: cover;
    }
    .rec-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; margin-top: 6px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-card-year { font-size: 0.65rem; color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
    .rec-card-badge {
      position: absolute; top: 6px; right: 6px; background: rgba(245, 197, 24, 0.9);
      color: #000; font-size: 0.6rem; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    }
    .recs-row-loader {
      flex-shrink: 0; width: 60px; display: flex; align-items: center; justify-content: center;
    }
    .recs-spinner {
      width: 20px; height: 20px; border: 2px solid var(--surface2); border-top-color: var(--accent);
      border-radius: 50%; animation: recs-spin 0.7s linear infinite;
    }
    @keyframes recs-spin { to { transform: rotate(360deg); } }

    /* Expanded category overlay */
    .expanded-cat-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92); z-index: 275;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 16px; overflow-y: auto;
    }
    .expanded-cat-modal {
      background: var(--bg); border: 1px solid var(--surface2); border-radius: 16px;
      width: 100%; max-width: 820px; max-height: calc(100vh - 80px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .expanded-cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px; border-bottom: 1px solid var(--surface2); flex-shrink: 0;
    }
    .expanded-cat-header h2 {
      font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text);
    }
    .expanded-cat-close {
      background: none; border: 1px solid var(--surface2); color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .expanded-cat-close:hover { border-color: var(--accent); color: var(--accent); }
    .expanded-cat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 16px; padding: 20px 24px; overflow-y: auto; flex: 1;
    }
    .expanded-cat-loader {
      grid-column: 1 / -1; display: flex; justify-content: center; padding: 20px 0;
    }
    .expanded-cat-end {
      grid-column: 1 / -1; text-align: center; color: var(--text-muted);
      font-size: 0.75rem; padding: 12px 0;
    }

    /* Comparison */
    .comparison-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .comparison-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px;
      max-width: 650px; width: 100%; text-align: center;
    }
    .comparison-title {
      font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .comparison-progress { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }
    .comparison-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .comparison-card {
      cursor: pointer; border-radius: var(--radius); overflow: hidden;
      border: 3px solid transparent; transition: all 0.2s; background: var(--surface2);
    }
    .comparison-card:hover { border-color: var(--accent); transform: scale(1.03); }
    .comparison-card img, .comparison-card .poster-placeholder {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
    }
    .comparison-card-info { padding: 10px; }
    .comparison-card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .comparison-card-year { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
    .comparison-label {
      padding: 8px; background: var(--accent); color: #fff;
      border-radius: 8px; font-weight: 600; font-size: 0.85rem;
    }
    .comparison-cancel {
      margin-top: 16px; padding: 10px 24px; background: none; border: 1px solid #555;
      color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .comparison-cancel:hover { border-color: var(--accent); color: var(--text); }

    /* Movie Detail Modal */
    /* Import Modal */
    .import-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; cursor: pointer;
    }
    .import-modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      max-width: 420px; width: 100%; padding: 28px; cursor: default;
      max-height: 80vh; overflow-y: auto;
    }
    .import-modal h3 { font-family: 'Outfit', sans-serif; margin: 0 0 6px; font-size: 1.1rem; }
    .import-modal p { color: var(--text-muted); font-size: 0.8rem; margin: 0 0 16px; line-height: 1.5; }
    .import-file-input {
      width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: 10px;
      text-align: center; cursor: pointer; color: var(--text-muted); font-size: 0.85rem;
      background: var(--bg); transition: border-color 0.2s; margin-bottom: 16px;
    }
    .import-file-input:hover { border-color: var(--accent); }
    .import-progress-bar {
      width: 100%; height: 6px; background: var(--surface2); border-radius: 3px;
      overflow: hidden; margin: 12px 0;
    }
    .import-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease;
    }
    .import-status { font-size: 0.8rem; color: var(--text-muted); margin: 8px 0; }
    .import-results { margin: 12px 0; }
    .import-success { color: #4caf50; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
    .import-failed-toggle {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 0.75rem; padding: 4px 0; text-decoration: underline;
    }
    .import-failed-list {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;
      max-height: 120px; overflow-y: auto; line-height: 1.6;
    }
    .import-btns { display: flex; gap: 8px; margin-top: 16px; }
    .import-btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .import-btn-primary { background: var(--accent); color: #fff; }
    .import-btn-primary:hover { background: var(--accent-hover); }
    .import-btn-secondary { background: var(--surface2); color: var(--text); }
    .import-btn-secondary:hover { opacity: 0.8; }
    .import-btn-cancel { background: none; color: var(--text-muted); border: 1px solid var(--border); }
    .import-warning { font-size: 0.75rem; color: var(--gold); margin-top: 10px; }

    .movie-detail-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 250;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; cursor: pointer;
    }
    .day-mode .movie-detail-overlay { background: rgba(0,0,0,0.5); }
    .movie-detail-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      max-width: 300px; width: 100%; overflow: hidden; cursor: default; position: relative;
    }
    .movie-detail-box img, .movie-detail-box .poster-placeholder {
      width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
    }
    .movie-detail-info {
      padding: 16px; text-align: center;
    }
    .movie-detail-title {
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .movie-detail-year {
      color: var(--text-muted); font-size: 0.85rem;
    }
    .movie-detail-overview {
      margin-top: 12px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;
      text-align: left; max-height: 120px; overflow-y: auto;
    }
    .movie-detail-meta {
      margin-top: 10px; font-size: 0.75rem; color: var(--text-muted); text-align: left;
    }
    .movie-detail-meta-label {
      color: var(--text); font-weight: 600; margin-right: 4px;
    }
    .movie-detail-meta-row {
      margin-bottom: 4px; line-height: 1.4;
    }
    .movie-detail-rating {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; font-size: 0.8rem;
    }
    .movie-detail-rating .tmdb-star { color: #f5c518; }
    .movie-detail-loading {
      margin-top: 12px; text-align: center; color: var(--text-muted); font-size: 0.75rem;
    }
    .movie-detail-rank {
      margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);
    }
    .movie-detail-rank strong { color: var(--text); }
    .movie-detail-actions {
      display: flex; gap: 8px; padding: 0 16px 16px; justify-content: center;
    }
    .movie-detail-rerank {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 20px; font-family: 'Outfit', sans-serif; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s;
    }
    .movie-detail-rerank:hover { opacity: 0.85; }
    .movie-detail-remove {
      background: none; color: var(--text-muted); border: 1px solid var(--surface2);
      border-radius: 10px; padding: 10px 16px; font-family: 'Outfit', sans-serif;
      font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .movie-detail-remove:hover { color: var(--accent); border-color: var(--accent); }
    .movie-detail-close {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none; color: #fff;
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background 0.2s;
    }
    .movie-detail-close:hover { background: rgba(0,0,0,0.8); }

    /* Ranked List */
    .ranked-section { margin-top: 10px; }
    .ranked-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 8px; flex-wrap: wrap;
    }
    .ranked-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .ranked-header-btns { display: flex; gap: 8px; }
    .trophy-section-title { font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .trophy-shelf { display: flex; gap: 10px; overflow-x: auto; padding: 0 0 16px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid var(--surface2); }
    .trophy-shelf::-webkit-scrollbar { display: none; }
    .trophy-card { flex-shrink: 0; width: 130px; background: var(--surface); border: 1px solid var(--surface2); border-radius: 12px; padding: 12px 10px; text-align: center; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
    .trophy-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .trophy-emoji { font-size: 1.6rem; margin-bottom: 4px; }
    .trophy-name { font-size: 0.68rem; font-weight: 700; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .trophy-winner-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 4px; }
    .trophy-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
    .trophy-avatar-ph { width: 20px; height: 20px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 0.55rem; color: var(--text-muted); }
    .trophy-winner-name { font-size: 0.7rem; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .trophy-detail { font-size: 0.6rem; color: var(--text-muted); }
    .trophy-card-selected { border-color: var(--accent); }
    .trophy-explainer { background: var(--surface2); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.8rem; color: var(--text-muted); position: relative; line-height: 1.5; }
    .trophy-explainer strong { color: var(--text); }
    .trophy-explainer-close { position: absolute; top: 6px; right: 10px; background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; }
    .activity-feed { margin-bottom: 20px; border-bottom: 1px solid var(--surface2); padding-bottom: 16px; }
    .activity-feed-title { font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: var(--text); }
    .activity-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .activity-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .activity-avatar-ph { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
    .activity-text { flex: 1; font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }
    .activity-text strong { color: var(--text); font-weight: 600; }
    .activity-poster { width: 24px; height: 36px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
    .activity-time { font-size: 0.65rem; color: var(--text-muted); opacity: 0.7; flex-shrink: 0; white-space: nowrap; }
    .activity-more { background: none; border: none; color: var(--accent); font-size: 0.78rem; cursor: pointer; padding: 8px 0 0; font-weight: 500; }
    .activity-more:hover { text-decoration: underline; }
    .genre-pills { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .genre-pills::-webkit-scrollbar { display: none; }
    .genre-pill { padding: 5px 12px; border-radius: 16px; border: none; background: var(--surface2); color: var(--text-muted); font-size: 0.75rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .genre-pill:hover { background: #2a2a32; }
    .genre-pill.active { background: var(--accent); color: #fff; }
    .clear-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ranked-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .ranked-empty p:first-child { font-size: 2rem; margin-bottom: 10px; }
    .ranked-list { display: flex; flex-direction: column; gap: 6px; }
    .ranked-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      transition: all 0.2s; cursor: pointer; position: relative;
    }
    .ranked-item:hover { background: var(--surface2); transform: translateY(-1px); }
    .ranked-list.is-dragging .ranked-item { transition: none; }
    .ranked-list.is-dragging .ranked-item:hover { background: var(--surface); transform: none; }
    .ranked-item.dragging-source { opacity: 0.25; transform: none !important; }
    .ranked-item.drop-before::before {
      content: ''; position: absolute; top: -4px; left: 0; right: 0;
      height: 3px; background: var(--accent); border-radius: 2px; z-index: 10;
    }
    .rank-number {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem; font-weight: 800; min-width: 32px; text-align: center;
      color: rgba(255,255,255,0.16);
    }
    .ranked-item:nth-child(1) .rank-number { color: var(--accent); }
    .ranked-item:nth-child(2) .rank-number { color: #c0c0c0; }
    .ranked-item:nth-child(3) .rank-number { color: #cd7f32; }
    .ranked-poster { width: 40px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .ranked-poster-ph { width: 40px; height: 60px; border-radius: 6px; }
    .ranked-item-tap {
      display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; cursor: pointer;
    }
    .ranked-item-info { flex: 1; min-width: 0; }
    .ranked-item-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ranked-item-year { color: var(--text-muted); font-size: 0.75rem; }
    .score-badge {
      font-size: 0.85rem; font-weight: 800; min-width: 38px; text-align: center;
      padding: 4px 6px; border-radius: 6px; flex-shrink: 0;
    }
    .score-high { background: rgba(76, 175, 80, 0.2); color: #66bb6a; }
    .score-mid { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .score-low { background: rgba(244, 67, 54, 0.2); color: #ef5350; }
    .drag-handle {
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 1.2rem; padding: 8px 4px;
      cursor: grab; flex-shrink: 0; touch-action: none;
      user-select: none; -webkit-user-select: none;
      min-width: 28px; min-height: 44px; border-radius: 6px;
      transition: color 0.2s;
    }
    .drag-handle:hover { color: var(--text-muted); }
    .drag-handle:active { cursor: grabbing; }
    .day-mode .drag-handle { color: #bbb; }
    .day-mode .drag-handle:hover { color: #888; }
    .remove-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 1rem; padding: 4px 6px; transition: color 0.2s; border-radius: 6px;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--accent); }

    /* Add from profile */
    .profile-add-btn {
      padding: 4px 10px; background: var(--accent); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600;
      flex-shrink: 0; transition: all 0.2s; white-space: nowrap;
    }
    .profile-add-btn:hover { background: var(--accent-hover); }
    .profile-add-btn:disabled { opacity: 0.4; cursor: default; background: #555; }

    /* Bookmark / Watchlist buttons */
    .bookmark-btn {
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      padding: 4px 6px; transition: all 0.2s; flex-shrink: 0; border-radius: 4px;
      color: #555; line-height: 1;
    }
    .bookmark-btn:hover { color: var(--gold); transform: scale(1.15); }
    .bookmark-btn.bookmarked { color: var(--gold); }
    .bookmark-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* Watchlist */
    .watchlist-section { margin-top: 10px; }
    .watchlist-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .watchlist-empty p:first-child { font-size: 2rem; margin-bottom: 10px; }
    .watchlist-list { display: flex; flex-direction: column; gap: 6px; }
    .watchlist-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      transition: all 0.2s;
    }
    .watchlist-item:hover { background: var(--surface2); transform: translateY(-1px); }
    .watchlist-watched-btn {
      padding: 5px 10px; background: #2e7d32; color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600;
      flex-shrink: 0; transition: all 0.2s; white-space: nowrap;
    }
    .watchlist-watched-btn:hover { background: #388e3c; }
    .watchlist-remove-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 1rem; padding: 4px 6px; transition: color 0.2s; border-radius: 6px;
      flex-shrink: 0;
    }
    .watchlist-remove-btn:hover { color: var(--accent); }

    /* Confirm */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 300;
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border); padding: 30px;
      border-radius: 18px; text-align: center; max-width: 350px;
    }
    .confirm-box p { margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    .confirm-btns button {
      padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
    }
    .confirm-yes { background: var(--accent); color: #fff; }
    .confirm-yes:hover { background: var(--accent-hover); }
    .confirm-no { background: #333; color: var(--text); }
    .confirm-no:hover { background: #444; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--surface); color: var(--text); padding: 12px 24px;
      border-radius: 12px; font-size: 0.9rem; z-index: 500;
      border: 1px solid var(--border); animation: fadeInUp 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      font-family: 'DM Sans', sans-serif;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Sign-in prompt */
    .signin-prompt {
      text-align: center; padding: 16px; background: var(--surface);
      border-radius: var(--radius); margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .signin-prompt p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #333; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mode Toggle */
    .mode-toggle {
      display: flex; gap: 4px; justify-content: center; margin-bottom: 12px;
    }
    .mode-btn {
      padding: 8px 20px; border: 1px solid var(--border); background: none;
      color: var(--text-muted); border-radius: 20px; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: var(--accent); color: var(--accent); background: rgba(255, 77, 77, 0.08);
    }
    .mode-btn:not(.active):hover { border-color: #555; color: var(--text); }

    /* Day Mode (Light Theme) */
    .day-mode {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #eeeee9;
      --text: #1a1a1e;
      --text-muted: #6e6e7a;
      --border: #d5d5cd;
    }
    .day-mode .logo-frame {
      border-color: rgba(0,0,0,0.13);
      background: rgba(0,0,0,0.025);
    }
    .day-mode .logo-frame .frame-num { color: rgba(0,0,0,0.25); }
    .day-mode .logo-frame .sprocket { background: rgba(0,0,0,0.08); }
    .day-mode .auth-btn-signout { background: #ddd; color: #555; }
    .day-mode .auth-btn-signout:hover { background: #ccc; color: #333; }
    .day-mode .auth-btn-google { background: #fff; color: #333; border: 1px solid var(--border); }
    .day-mode .auth-divider::before, .day-mode .auth-divider::after { background: var(--border); }
    .day-mode .mode-btn:not(.active):hover { border-color: #999; }
    .day-mode .spinner { border-color: #ccc; border-top-color: var(--accent); }
    .day-mode .remove-btn { color: #999; }
    .day-mode .remove-btn:hover { color: var(--accent); }
    .day-mode .move-btn { color: #999; }
    .day-mode .move-btn:hover { color: var(--text); }
    .day-mode .bookmark-btn { color: #999; }
    .day-mode .confirm-no { background: #ddd; color: var(--text); }
    .day-mode .confirm-no:hover { background: #ccc; }
    .day-mode .comparison-overlay { background: rgba(0,0,0,0.5); }
    .day-mode .toast { box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .day-mode .profile-add-btn:disabled { background: #ccc; }
    .day-mode .stats-accordion-header:hover { background: rgba(0,0,0,0.04); }
    .day-mode .stats-bar-bg { background: rgba(0,0,0,0.06); }
    .day-mode .decade-bar-bg { background: rgba(0,0,0,0.04); }
    .day-mode .nav-tab { border-color: var(--border); }
    .day-mode .profile-subtab { border-color: var(--border); }
    .day-mode .recs-row::-webkit-scrollbar-thumb { background: #ccc; }
    .day-mode .expanded-cat-overlay { background: rgba(0,0,0,0.6); }
    .day-mode .comparison-cancel { border-color: #ccc; }
    .day-mode .watchlist-remove { color: #999; }
    .day-mode .watchlist-remove:hover { color: var(--accent); }
    .day-mode .empty-state { border-color: #ccc; }
    .day-mode .watchlist-empty { border-color: #ccc; }
    .day-mode .logo-wordmark { color: var(--accent); }
    .day-mode .ranked-item-title { color: #111; }
    .day-mode .comparison-card-title { color: #111; }
    .day-mode .watchlist-item .ranked-item-title { color: #111; }
    .day-mode .rec-card-title { color: #111; }
    .day-mode .search-item-title { color: #111; }
    .day-mode .rank-number { color: rgba(0,0,0,0.16); }

    /* Theme toggle button */
    .theme-toggle {
      position: absolute; top: 12px; right: 12px; z-index: 400;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

    /* TV Mode Theme (Dartmouth Green) */
    .tv-mode {
      --accent: #00693E;
      --accent-hover: #00894E;
      --bg: #0a1510;
      --surface: #0f1c16;
      --surface2: #142a1e;
      --border: #1a2e22;
    }
    .day-mode.tv-mode {
      --accent: #00693E;
      --accent-hover: #00894E;
      --bg: #f0f5f2;
      --surface: #ffffff;

<body>
  <div id="root"></div>

  <!-- Firebase SDK (compat version for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="movies.js"></script>
  <script src="tvshows.js"></script>
  <script src="firebase-config.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─── Firebase Init ──────────────────────────────────────────
    const FIREBASE_READY = typeof FIREBASE_CONFIG !== "undefined"
      && FIREBASE_CONFIG.apiKey
      && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE";

    let db = null;
    let auth = null;
    if (FIREBASE_READY) {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    const ADMIN_UID = "lF7taXh4NETa3h2UPZI6SGnWWcj2";

    // ─── Process Movie Database ─────────────────────────────────
    const TMDB_IMG = "https://image.tmdb.org/t/p/w200";
    const TMDB_IMG_LG = "https://image.tmdb.org/t/p/w300";
    const TMDB_API_KEY = "39a17d2f20e6ebc19af8eadbf015f5ab";
    const TMDB_SEARCH_URL = "https://api.themoviedb.org/3/search/movie";

    const GENRE_MAP = {28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",10770:"TV Movie",53:"Thriller",10752:"War",37:"Western"};
    const TV_GENRE_MAP = {10759:"Action & Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",10762:"Kids",9648:"Mystery",10763:"News",10764:"Reality",10765:"Sci-Fi & Fantasy",10766:"Soap",10767:"Talk",10768:"War & Politics",37:"Western"};

    const seen = new Set();
    const MOVIE_DB = MOVIE_DATA
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
    const MOVIE_DB_IDS = new Set(MOVIE_DB.map(m => m.id));

    const tvSeen = new Set();
    const TV_DB = (typeof TV_DATA !== "undefined" ? TV_DATA : [])
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (tvSeen.has(m.id)) return false; tvSeen.add(m.id); return true; });
    const TV_DB_IDS = new Set(TV_DB.map(m => m.id));

    const TMDB_TV_SEARCH_URL = "https://api.themoviedb.org/3/search/tv";

    async function searchTMDBTV(query) {
      try {
        const resp = await fetch(`${TMDB_TV_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(s => {
          const baseGenre = s.genre_ids && s.genre_ids.length ? (TV_GENRE_MAP[s.genre_ids[0]] || "Drama") : "Drama";
          const rating = s.vote_average || null;
          return { id: s.id, title: s.name, year: s.first_air_date ? s.first_air_date.slice(0, 4) : "", genre: baseGenre, poster: s.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB TV search error:", e);
        return [];
      }
    }

    async function searchTMDB(query) {
      try {
        const resp = await fetch(`${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(m => {
          const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
          const rating = m.vote_average || null;
          return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre: baseGenre, poster: m.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB search error:", e);
        return [];
      }
    }

    // ─── Poster Component ───────────────────────────────────────
    function Poster({ poster, title, className, style, size }) {
      const [failed, setFailed] = React.useState(false);
      const base = size === "lg" ? TMDB_IMG_LG : TMDB_IMG;
      if (poster && !failed) {
        return <img src={`${base}${poster}`} alt={title} className={className} style={style} loading="lazy" onError={() => setFailed(true)} />;
      }
      return (
        <div className={`poster-placeholder ${className || ""}`} style={style}>
          {title ? title.slice(0, 20) : "?"}
        </div>
      );
    }

    // ─── Score Calculation ───────────────────────────────────────
    function getScore(index, total) {
      if (total <= 1) return 10.0;
      return Math.round((10.0 * (1 - index / (total - 1))) * 10) / 10;
    }

    function scoreClass(score) {
      if (score >= 7) return "score-high";
      if (score >= 4) return "score-mid";
      return "score-low";
    }

    // ─── Letterboxd Import ──────────────────────────────────────
    async function extractLetterboxdRatings(file) {
      let csvText;
      if (file.name.endsWith(".zip")) {
        const zip = await JSZip.loadAsync(file);
        const csvFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith("ratings.csv"));
        if (!csvFile) throw new Error("No ratings.csv found in ZIP");
        csvText = await zip.files[csvFile].async("string");
      } else {
        csvText = await file.text();
      }
      const lines = csvText.split("\n").map(l => l.trim()).filter(l => l);
      if (lines.length < 2) throw new Error("CSV file is empty");
      // Parse header to find column indices
      const header = lines[0].split(",").map(h => h.trim().toLowerCase());
      const nameIdx = header.indexOf("name");
      const yearIdx = header.indexOf("year");
      const ratingIdx = header.indexOf("rating");
      if (nameIdx === -1 || ratingIdx === -1) throw new Error("CSV missing Name or Rating columns");
      const entries = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].match(/(".*?"|[^,]+)/g);
        if (!cols) continue;
        const name = (cols[nameIdx] || "").replace(/^"|"$/g, "").trim();
        const year = yearIdx !== -1 ? (cols[yearIdx] || "").replace(/^"|"$/g, "").trim() : "";
        const rating = parseFloat((cols[ratingIdx] || "0").replace(/^"|"$/g, ""));
        if (name && !isNaN(rating) && rating > 0) {
          entries.push({ title: name, year, lbRating: rating });
        }
      }
      // Sort by rating desc (ties resolved later by TMDB vote average)
      entries.sort((a, b) => b.lbRating - a.lbRating);
      return entries;
    }

    async function lookupTMDB(title, year) {
      try {
        let url = `${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&include_adult=false&language=en-US&page=1`;
        if (year) url += `&year=${year}`;
        const resp = await fetch(url);
        if (!resp.ok) return null;
        const data = await resp.json();
        if (!data.results || data.results.length === 0) {
          // Fallback: try without year
          if (year) return lookupTMDB(title, "");
          return null;
        }
        const m = data.results[0];
        const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
        return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre: baseGenre, poster: m.poster_path || null, rating: m.vote_average || null };
      } catch (e) {
        return null;
      }
    }

    // ─── Binary Insertion ───────────────────────────────────────
    function createSession(newMovie, rankedList) {
      const session = {
        newMovie, list: rankedList, low: 0, high: rankedList.length,
        step: 0, maxSteps: Math.ceil(Math.log2(rankedList.length + 1)),
      };
      return advanceSession(session);
    }

    function advanceSession(session) {
      if (session.low >= session.high) return { ...session, done: true, insertIndex: session.low };
      const mid = Math.floor((session.low + session.high) / 2);
      return { ...session, done: false, compareMovie: session.list[mid], mid };
    }

    function recordChoice(session, preferNew) {
      const next = {
        ...session, step: session.step + 1,
        low: preferNew ? session.low : session.mid + 1,
        high: preferNew ? session.mid : session.high,
      };
      return advanceSession(next);
    }

    // ─── Firestore Helpers ──────────────────────────────────────
    const MILESTONES = [10, 25, 50, 100, 200, 500];

    async function writeActivityEvent(event) {
      if (!db) return;
      try {
        await db.collection("activity").add(event);
        _lastActivityWrite = Date.now();
      } catch (e) {
        console.error("Failed to write activity:", e);
      }
    }

    var _lastActivityWrite = 0;

    async function saveProfile(user, rankedList, tvRankedList, watchlist, tvWatchlist, isPrivate) {
      if (!db || !user) return;
      try {
        // Load existing profile to detect changes for activity feed
        var oldDoc = await db.collection("profiles").doc(user.uid).get();
        var oldData = oldDoc.exists ? oldDoc.data() : null;
        var oldMovieCount = oldData ? (oldData.movieCount || 0) : 0;
        var oldTop10Ids = oldData && oldData.movies ? oldData.movies.slice(0, 10).map(function(m) { return m.id; }).join(",") : "";

        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(user.uid).set({
          displayName: user.displayName || "Anonymous",
          photoURL: user.photoURL || null,
          movies: rankedList.map(toSave),
          movieCount: rankedList.length,
          tvShows: tvRankedList.map(toSave),
          tvShowCount: tvRankedList.length,
          watchlist: (watchlist || []).map(toSave),
          watchlistCount: (watchlist || []).length,
          tvWatchlist: (tvWatchlist || []).map(toSave),
          tvWatchlistCount: (tvWatchlist || []).length,
          isPrivate: !!isPrivate,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });

        // Throttle activity writes: max once per 30s (client-side tracking)
        var now = Date.now();
        if (now - _lastActivityWrite < 30000) return;

        var baseEvent = {
          uid: user.uid,
          displayName: user.displayName || "Anonymous",
          photoURL: user.photoURL || null,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        // Priority: joined > milestone > top10 > ranked (check both movies and TV)
        if (!oldData) {
          writeActivityEvent(Object.assign({}, baseEvent, { type: "joined", movie: null, rank: null, count: null }));
        } else {
          var newMovieCount = rankedList.length;
          var newTvCount = tvRankedList.length;
          var oldTvCount = oldData.tvShowCount || 0;
          var oldTvTop10Ids = oldData.tvShows ? oldData.tvShows.slice(0, 10).map(function(m) { return m.id; }).join(",") : "";

          // Check movie milestone
          var hitMilestone = null;
          for (var mi = 0; mi < MILESTONES.length; mi++) {
            if (oldMovieCount < MILESTONES[mi] && newMovieCount >= MILESTONES[mi]) {
              hitMilestone = MILESTONES[mi];
            }
          }
          if (hitMilestone) {
            writeActivityEvent(Object.assign({}, baseEvent, { type: "milestone", movie: null, rank: null, count: hitMilestone }));
          } else {
            // Check movie top 10 change
            var newTop10Ids = rankedList.slice(0, 10).map(function(m) { return m.id; }).join(",");
            if (oldTop10Ids && newTop10Ids !== oldTop10Ids && oldMovieCount >= 10) {
              writeActivityEvent(Object.assign({}, baseEvent, { type: "top10", movie: null, rank: null, count: null }));
            } else if (newMovieCount > oldMovieCount) {
              // New movie ranked
              var oldMovieIds = new Set((oldData.movies || []).map(function(m) { return m.id; }));
              var newest = null;
              var newestRank = null;
              for (var ri = 0; ri < rankedList.length; ri++) {
                if (!oldMovieIds.has(rankedList[ri].id)) {
                  newest = rankedList[ri];
                  newestRank = ri + 1;
                  break;
                }
              }
              if (newest) {
                writeActivityEvent(Object.assign({}, baseEvent, {
                  type: "ranked",
                  movie: { id: newest.id, title: newest.title, poster: newest.poster || null },
                  rank: newestRank,
                  count: null
                }));
              }
            } else if (newTvCount > oldTvCount) {
              // New TV show ranked
              var oldTvIds = new Set((oldData.tvShows || []).map(function(m) { return m.id; }));
              var newestTv = null;
              var newestTvRank = null;
              for (var ti = 0; ti < tvRankedList.length; ti++) {
                if (!oldTvIds.has(tvRankedList[ti].id)) {
                  newestTv = tvRankedList[ti];
                  newestTvRank = ti + 1;
                  break;
                }
              }
              if (newestTv) {
                writeActivityEvent(Object.assign({}, baseEvent, {
                  type: "ranked",
                  movie: { id: newestTv.id, title: newestTv.title, poster: newestTv.poster || null },
                  rank: newestTvRank,
                  count: null,
                  isTV: true
                }));
              }
            } else {
              // Check TV top 10 change
              var newTvTop10Ids = tvRankedList.slice(0, 10).map(function(m) { return m.id; }).join(",");
              if (oldTvTop10Ids && newTvTop10Ids !== oldTvTop10Ids && oldTvCount >= 10) {
                writeActivityEvent(Object.assign({}, baseEvent, { type: "top10", movie: null, rank: null, count: null, isTV: true }));
              }
            }
          }
        }
      } catch (e) {
        console.error("Failed to save profile:", e);
      }
    }

    async function loadActivityFeed(limit) {
      if (!db) return [];
      try {
        var snap = await db.collection("activity")
          .orderBy("timestamp", "desc")
          .limit(limit || 20)
          .get();
        return snap.docs.map(function(d) {
          var data = d.data();
          data._id = d.id;
          return data;
        });
      } catch (e) {
        console.error("Failed to load activity feed:", e);
        return [];
      }
    }

    async function loadProfile(uid) {
      if (!db) return null;
      try {
        const doc = await db.collection("profiles").doc(uid).get();
        if (doc.exists) return doc.data();
      } catch (e) {
        console.error("Failed to load profile:", e);
      }

    async function adminSaveProfile(uid, movies, tvShows) {
      if (!db) return;
      try {
        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(uid).update({

        console.error("Failed to admin save profile:", e);

    async function deleteProfile(uid) {
      if (!db) return;
      try {
        await db.collection("profiles").doc(uid).delete();
      } catch (e) {
        console.error("Failed to delete profile:", e);
