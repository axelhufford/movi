<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movi</title>
  <meta name="description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:title" content="Movi" />
  <meta property="og:description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:image" content="https://axelhufford.github.io/movi/logo.svg" />
  <meta property="og:url" content="https://axelhufford.github.io/movi/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Movi" />
  <meta name="twitter:description" content="Every movie ranked, one matchup at a time." />
  <meta name="twitter:image" content="https://axelhufford.github.io/movi/logo.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --text: #eee;
      --text-muted: #999;
      --gold: #f5c518;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #root { max-width: 900px; margin: 0 auto; padding: 20px; }

    .header { text-align: center; padding: 30px 0 20px; position: relative; }
    .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; cursor: pointer; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text-muted); margin-top: 6px; font-size: 0.95rem; }

    /* Auth Bar */
    .auth-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      padding: 10px 0; margin-bottom: 4px;
    }
    .auth-user {
      display: flex; align-items: center; gap: 8px;
    }
    .auth-avatar {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent);
    }
    .auth-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent);
    }
    .auth-name { font-size: 0.85rem; font-weight: 600; }
    .auth-btn {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .auth-btn-signin {
      background: var(--accent); color: #fff;
    }
    .auth-btn-signin:hover { background: var(--accent-hover); }
    .auth-btn-signout {
      background: #333; color: var(--text-muted); font-size: 0.75rem; padding: 6px 12px;
    }
    .auth-btn-signout:hover { background: #444; color: var(--text); }
    .auth-btn-email {
      background: #fff; color: #333;
    }
    .auth-btn-email:hover { background: #e0e0e0; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 10px 0;
      color: var(--text-muted); font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ""; flex: 1; height: 1px; background: #333;
    }
    .auth-form {
      background: var(--surface); border-radius: var(--radius); padding: 24px;
      margin-bottom: 16px; max-width: 360px; margin-left: auto; margin-right: auto;
    }
    .auth-form h3 { text-align: center; margin-bottom: 16px; font-size: 1.1rem; }
    .auth-input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
      background: #111; color: var(--text); font-size: 0.9rem; margin-bottom: 10px;
      outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: #666; }
    .auth-error {
      color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; text-align: center;
    }
    .auth-link {
      color: var(--accent); cursor: pointer; font-size: 0.8rem;
      background: none; border: none; text-decoration: underline;
    }
    .auth-link:hover { color: var(--accent-hover); }
    .auth-form-footer {
      text-align: center; margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);
    }
    .auth-form-submit {
      width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; background: var(--accent); color: #fff;
      transition: background 0.2s; margin-top: 4px;
    }
    .auth-form-submit:hover { background: var(--accent-hover); }
    .auth-back {
      display: block; text-align: center; margin-bottom: 12px;
      color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
      background: none; border: none;
    }
    .auth-back:hover { color: var(--text); }
    .auth-sync {
      font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
    }
    .auth-sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block;
    }

    /* Share */
    .share-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Profile View (viewing someone else's rankings) */
    .profile-banner {
      background: var(--surface); border-radius: var(--radius); padding: 20px;
      text-align: center; margin-bottom: 20px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent); margin-bottom: 10px;
    }
    .profile-avatar-ph {
      width: 64px; height: 64px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      border: 3px solid var(--accent); margin: 0 auto 10px;
    }
    .profile-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .profile-count { color: var(--text-muted); font-size: 0.9rem; }
    .profile-back {
      display: inline-block; margin-top: 12px; padding: 8px 20px;
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .profile-back:hover { background: var(--accent-hover); }

    /* Tabs for navigation */
    .nav-tabs {
      display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface);
      border-radius: var(--radius); padding: 4px; overflow-x: auto;
    }
    .nav-tab {
      flex: 1; padding: 10px 16px; border: none; background: none;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; text-align: center;
    }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* Community */
    .community-section { margin-top: 10px; }
    .community-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .community-list { display: flex; flex-direction: column; gap: 8px; }
    .community-card {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface); border-radius: var(--radius);
      cursor: pointer; transition: all 0.2s;
    }
    .community-card:hover { background: var(--surface2); transform: translateX(4px); }
    .community-card-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-avatar-ph {
      width: 44px; height: 44px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-info { flex: 1; min-width: 0; }
    .community-card-name { font-weight: 600; font-size: 0.95rem; }
    .community-card-meta { color: var(--text-muted); font-size: 0.8rem; }
    .community-card-top {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .community-card-top img, .community-card-top .poster-placeholder {
      width: 28px; height: 42px; border-radius: 4px; object-fit: cover;
    }
    .community-card-arrow { color: var(--text-muted); font-size: 1.2rem; flex-shrink: 0; }

    /* Search */
    .search-section { position: relative; margin-bottom: 24px; }
    .search-input {
      width: 100%; padding: 14px 20px; border-radius: var(--radius);
      border: 2px solid #333; background: var(--surface); color: var(--text);
      font-size: 1.05rem; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface2); border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid #333; border-top: none; max-height: 400px; overflow-y: auto;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid #1a1a3e;
    }
    .search-item:hover { background: rgba(233, 69, 96, 0.15); }
    .search-item-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #2a2a4a; }
    .search-item-info { flex: 1; }
    .search-item-title { font-weight: 600; font-size: 0.95rem; }
    .search-item-year { color: var(--text-muted); font-size: 0.85rem; }
    .search-item-dupe {
      font-size: 0.75rem; color: var(--gold); background: rgba(245, 197, 24, 0.15);
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .search-add-custom {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; transition: background 0.15s; color: var(--accent);
      font-weight: 600; border-top: 1px solid #333;
    }
    .search-add-custom:hover { background: rgba(233, 69, 96, 0.15); }
    .search-add-icon {
      width: 40px; height: 60px; border-radius: 4px; background: #2a2a4a;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      color: var(--accent); flex-shrink: 0;
    }
    .poster-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: #2a2a4a; color: var(--text-muted); font-size: 0.6rem;
      text-align: center; overflow: hidden;
    }

    /* Recommendations */
    .recs-section { margin-bottom: 30px; }
    .recs-category { margin-bottom: 20px; }
    .recs-category-title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); }
    .recs-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .recs-row::-webkit-scrollbar { height: 6px; }
    .recs-row::-webkit-scrollbar-track { background: transparent; }
    .recs-row::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .rec-card {
      flex-shrink: 0; width: 110px; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
      position: relative;
    }
    .rec-card:hover { transform: scale(1.05); }
    .rec-card.ranked { opacity: 0.35; }
    .rec-card img, .rec-card .poster-placeholder {
      width: 110px; height: 165px; border-radius: 8px; object-fit: cover;
    }
    .rec-card-title {
      font-size: 0.75rem; margin-top: 4px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-card-year { font-size: 0.65rem; color: var(--text-muted); }
    .rec-card-badge {
      position: absolute; top: 6px; right: 6px; background: rgba(245, 197, 24, 0.9);
      color: #000; font-size: 0.6rem; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    }

    /* Comparison */
    .comparison-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .comparison-box {
      background: var(--surface); border-radius: 20px; padding: 30px;
      max-width: 650px; width: 100%; text-align: center;
    }
    .comparison-title { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 6px; }
    .comparison-progress { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }
    .comparison-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .comparison-card {
      cursor: pointer; border-radius: var(--radius); overflow: hidden;
      border: 3px solid transparent; transition: all 0.2s; background: var(--surface2);
    }
    .comparison-card:hover { border-color: var(--accent); transform: scale(1.03); }
    .comparison-card img, .comparison-card .poster-placeholder {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
    }
    .comparison-card-info { padding: 10px; }
    .comparison-card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .comparison-card-year { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
    .comparison-label {
      padding: 8px; background: var(--accent); color: #fff;
      border-radius: 8px; font-weight: 600; font-size: 0.85rem;
    }
    .comparison-cancel {
      margin-top: 16px; padding: 10px 24px; background: none; border: 1px solid #555;
      color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .comparison-cancel:hover { border-color: var(--accent); color: var(--text); }

    /* Ranked List */
    .ranked-section { margin-top: 10px; }
    .ranked-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 8px; flex-wrap: wrap;
    }
    .ranked-header h2 { font-size: 1.3rem; }
    .ranked-header-btns { display: flex; gap: 8px; }
    .clear-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ranked-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .ranked-empty p:first-child { font-size: 2rem; margin-bottom: 10px; }
    .ranked-list { display: flex; flex-direction: column; gap: 6px; }
    .ranked-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 12px;
      background: var(--surface); border-radius: var(--radius);
      transition: background 0.15s;
    }
    .ranked-item:hover { background: var(--surface2); }
    .rank-number {
      font-size: 1.3rem; font-weight: 800; min-width: 32px; text-align: center;
      color: var(--text-muted);
    }
    .ranked-item:nth-child(1) .rank-number { color: var(--gold); }
    .ranked-item:nth-child(2) .rank-number { color: #c0c0c0; }
    .ranked-item:nth-child(3) .rank-number { color: #cd7f32; }
    .ranked-poster { width: 40px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .ranked-poster-ph { width: 40px; height: 60px; border-radius: 6px; }
    .ranked-item-info { flex: 1; min-width: 0; }
    .ranked-item-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ranked-item-year { color: var(--text-muted); font-size: 0.75rem; }
    .score-badge {
      font-size: 0.85rem; font-weight: 800; min-width: 38px; text-align: center;
      padding: 4px 6px; border-radius: 6px; flex-shrink: 0;
    }
    .score-high { background: rgba(76, 175, 80, 0.2); color: #66bb6a; }
    .score-mid { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .score-low { background: rgba(244, 67, 54, 0.2); color: #ef5350; }
    .move-btns {
      display: flex; flex-direction: column; gap: 1px; flex-shrink: 0;
    }
    .move-btn {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 0.7rem; padding: 2px 6px; transition: color 0.2s; border-radius: 4px;
      line-height: 1;
    }
    .move-btn:hover { color: var(--gold); }
    .move-btn:disabled { opacity: 0.15; cursor: default; }
    .remove-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 1rem; padding: 4px 6px; transition: color 0.2s; border-radius: 6px;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--accent); }

    /* Add from profile */
    .profile-add-btn {
      padding: 4px 10px; background: var(--accent); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600;
      flex-shrink: 0; transition: all 0.2s; white-space: nowrap;
    }
    .profile-add-btn:hover { background: var(--accent-hover); }
    .profile-add-btn:disabled { opacity: 0.4; cursor: default; background: #555; }

    /* Bookmark / Watchlist buttons */
    .bookmark-btn {
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      padding: 4px 6px; transition: all 0.2s; flex-shrink: 0; border-radius: 4px;
      color: #555; line-height: 1;
    }
    .bookmark-btn:hover { color: var(--gold); transform: scale(1.15); }
    .bookmark-btn.bookmarked { color: var(--gold); }
    .bookmark-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* Watchlist */
    .watchlist-section { margin-top: 10px; }
    .watchlist-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .watchlist-empty p:first-child { font-size: 2rem; margin-bottom: 10px; }
    .watchlist-list { display: flex; flex-direction: column; gap: 6px; }
    .watchlist-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 12px;
      background: var(--surface); border-radius: var(--radius);
      transition: background 0.15s;
    }
    .watchlist-item:hover { background: var(--surface2); }
    .watchlist-watched-btn {
      padding: 5px 10px; background: #2e7d32; color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600;
      flex-shrink: 0; transition: all 0.2s; white-space: nowrap;
    }
    .watchlist-watched-btn:hover { background: #388e3c; }
    .watchlist-remove-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 1rem; padding: 4px 6px; transition: color 0.2s; border-radius: 6px;
      flex-shrink: 0;
    }
    .watchlist-remove-btn:hover { color: var(--accent); }

    /* Confirm */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 300;
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-box {
      background: var(--surface); padding: 30px; border-radius: var(--radius);
      text-align: center; max-width: 350px;
    }
    .confirm-box p { margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    .confirm-btns button {
      padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
    }
    .confirm-yes { background: var(--accent); color: #fff; }
    .confirm-yes:hover { background: var(--accent-hover); }
    .confirm-no { background: #333; color: var(--text); }
    .confirm-no:hover { background: #444; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); color: var(--text); padding: 12px 24px;
      border-radius: 10px; font-size: 0.9rem; z-index: 500;
      border: 1px solid #333; animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Sign-in prompt */
    .signin-prompt {
      text-align: center; padding: 16px; background: var(--surface);
      border-radius: var(--radius); margin-bottom: 20px;
      border: 1px solid #333;
    }
    .signin-prompt p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #333; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mode Toggle */
    .mode-toggle {
      display: flex; gap: 4px; justify-content: center; margin-bottom: 12px;
    }
    .mode-btn {
      padding: 8px 20px; border: 2px solid #333; background: none;
      color: var(--text-muted); border-radius: 20px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: var(--accent); color: var(--accent); background: rgba(233, 69, 96, 0.1);
    }
    .mode-btn:not(.active):hover { border-color: #555; color: var(--text); }

    /* TV Mode Theme (Dartmouth Green) */
    .tv-mode {
      --accent: #00693E;
      --accent-hover: #00894E;
      --bg: #0a1a12;
      --surface: #112218;
      --surface2: #0d2e1a;
    }

    .tv-mode .score-high { background: rgba(0, 105, 62, 0.25); color: #4caf50; }

    /* Profile sub-toggle for movies/tv */
    .profile-subtabs {
      display: flex; gap: 4px; justify-content: center; margin: 12px 0;
    }
    .profile-subtab {
      padding: 6px 16px; border: 1px solid #444; background: none;

    @media (max-width: 600px) {
      .comparison-cards { gap: 10px; }
      .comparison-box { padding: 20px 14px; }
      .comparison-card-title { font-size: 0.8rem; }
      .header h1 { font-size: 1.6rem; }
      .rec-card { width: 95px; }
      .rec-card img, .rec-card .poster-placeholder { width: 95px; height: 142px; }
      .nav-tabs { gap: 2px; }
      .nav-tab { padding: 8px 10px; font-size: 0.8rem; }
      .mode-btn { padding: 6px 14px; font-size: 0.8rem; }
      .stats-cards { grid-template-columns: 1fr 1fr; }
    }

    /* ─── Stats & Insights ─────────────────────────────────────── */
    .stats-accordion {
      margin-top: 24px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stats-accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; cursor: pointer; user-select: none;
      transition: background 0.2s;
    }
    .stats-accordion-header:hover { background: rgba(255,255,255,0.04); }
    .stats-accordion-header h3 {
      margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;

    .stats-chevron {
      font-size: 0.8rem; color: var(--text-muted);
      transition: transform 0.3s ease;
    }
    .stats-accordion.open .stats-chevron { transform: rotate(180deg); }
    .stats-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .stats-accordion.open .stats-body { max-height: 2000px; }
    .stats-content { padding: 0 20px 20px; }
    .stats-cards {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stats-card {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      padding: 16px; text-align: center;
    }
    .stats-card-number {
      font-size: 1.8rem; font-weight: 700; color: var(--accent);
      line-height: 1;
    }
    .stats-card-label {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stats-section-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
      margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stats-bar-chart { margin-bottom: 24px; }
    .stats-bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .stats-bar-label {
      width: 80px; font-size: 0.8rem; color: var(--text-muted);
      text-align: right; flex-shrink: 0;
    }
    .stats-bar-track {
      flex: 1; height: 22px; background: rgba(255,255,255,0.04);
      border-radius: 6px; overflow: hidden; position: relative;
    }
    .stats-bar-fill {
      height: 100%; border-radius: 6px;
      background: var(--accent);
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .stats-bar-count {
      font-size: 0.75rem; color: var(--text-muted); width: 30px;
      flex-shrink: 0;
    }
    .stats-insights {
      background: rgba(255,255,255,0.03); border-radius: 10px;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .stats-insight {
      font-size: 0.85rem; color: var(--text-secondary);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .stats-insight-icon { flex-shrink: 0; }
    .stats-empty {
      text-align: center; padding: 30px; color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDK (compat version for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="movies.js"></script>
  <script src="tvshows.js"></script>
  <script src="firebase-config.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─── Firebase Init ──────────────────────────────────────────
    const FIREBASE_READY = typeof FIREBASE_CONFIG !== "undefined"
      && FIREBASE_CONFIG.apiKey
      && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE";

    let db = null;
    let auth = null;
    if (FIREBASE_READY) {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    const ADMIN_UID = "lF7taXh4NETa3h2UPZI6SGnWWcj2";

    // ─── Process Movie Database ─────────────────────────────────
    const TMDB_IMG = "https://image.tmdb.org/t/p/w200";
    const TMDB_IMG_LG = "https://image.tmdb.org/t/p/w300";
    const TMDB_API_KEY = "39a17d2f20e6ebc19af8eadbf015f5ab";
    const TMDB_SEARCH_URL = "https://api.themoviedb.org/3/search/movie";

    const GENRE_MAP = {28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",10770:"TV Movie",53:"Thriller",10752:"War",37:"Western"};
    const TV_GENRE_MAP = {10759:"Action & Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",10762:"Kids",9648:"Mystery",10763:"News",10764:"Reality",10765:"Sci-Fi & Fantasy",10766:"Soap",10767:"Talk",10768:"War & Politics",37:"Western"};

    const seen = new Set();
    const MOVIE_DB = MOVIE_DATA
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
    const MOVIE_DB_IDS = new Set(MOVIE_DB.map(m => m.id));

    const tvSeen = new Set();
    const TV_DB = (typeof TV_DATA !== "undefined" ? TV_DATA : [])
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (tvSeen.has(m.id)) return false; tvSeen.add(m.id); return true; });
    const TV_DB_IDS = new Set(TV_DB.map(m => m.id));

    const TMDB_TV_SEARCH_URL = "https://api.themoviedb.org/3/search/tv";

    async function searchTMDBTV(query) {
      try {
        const resp = await fetch(`${TMDB_TV_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(s => {
          const baseGenre = s.genre_ids && s.genre_ids.length ? (TV_GENRE_MAP[s.genre_ids[0]] || "Drama") : "Drama";
          const rating = s.vote_average || null;
          const genre = rating >= 8.0 ? baseGenre + ", Critically Acclaimed" : baseGenre;
          return { id: s.id, title: s.name, year: s.first_air_date ? s.first_air_date.slice(0, 4) : "", genre, poster: s.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB TV search error:", e);
        return [];
      }
    }

    async function searchTMDB(query) {
      try {
        const resp = await fetch(`${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(m => {
          const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
          const rating = m.vote_average || null;
          const genre = rating >= 8.0 ? baseGenre + ", Critically Acclaimed" : baseGenre;
          return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre, poster: m.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB search error:", e);
        return [];
      }
    }

    // ─── Poster Component ───────────────────────────────────────
    function Poster({ poster, title, className, style, size }) {
      const [failed, setFailed] = React.useState(false);
      const base = size === "lg" ? TMDB_IMG_LG : TMDB_IMG;
      if (poster && !failed) {
        return <img src={`${base}${poster}`} alt={title} className={className} style={style} loading="lazy" onError={() => setFailed(true)} />;
      }
      return (
        <div className={`poster-placeholder ${className || ""}`} style={style}>
          {title ? title.slice(0, 20) : "?"}
        </div>
      );
    }

    // ─── Score Calculation ───────────────────────────────────────
    function getScore(index, total) {
      if (total <= 1) return 10.0;
      return Math.round((10.0 * (1 - index / (total - 1))) * 10) / 10;
    }

    function scoreClass(score) {
      if (score >= 7) return "score-high";
      if (score >= 4) return "score-mid";
      return "score-low";
    }

    // ─── Binary Insertion ───────────────────────────────────────
    function createSession(newMovie, rankedList) {
      const session = {
        newMovie, list: rankedList, low: 0, high: rankedList.length,
        step: 0, maxSteps: Math.ceil(Math.log2(rankedList.length + 1)),
      };
      return advanceSession(session);
    }

    function advanceSession(session) {
      if (session.low >= session.high) return { ...session, done: true, insertIndex: session.low };
      const mid = Math.floor((session.low + session.high) / 2);
      return { ...session, done: false, compareMovie: session.list[mid], mid };
    }

    function recordChoice(session, preferNew) {
      const next = {
        ...session, step: session.step + 1,
        low: preferNew ? session.low : session.mid + 1,
        high: preferNew ? session.mid : session.high,
      };
      return advanceSession(next);
    }

    // ─── Firestore Helpers ──────────────────────────────────────
    async function saveProfile(user, rankedList, tvRankedList, watchlist, tvWatchlist) {
      if (!db || !user) return;
      try {
        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(user.uid).set({
          displayName: user.displayName || "Anonymous",
          photoURL: user.photoURL || null,
          movies: rankedList.map(toSave),
          movieCount: rankedList.length,
          tvShows: tvRankedList.map(toSave),
          tvShowCount: tvRankedList.length,
          watchlist: (watchlist || []).map(toSave),
          watchlistCount: (watchlist || []).length,
          tvWatchlist: (tvWatchlist || []).map(toSave),
          tvWatchlistCount: (tvWatchlist || []).length,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        console.error("Failed to save profile:", e);
      }
    }

    async function loadProfile(uid) {
      if (!db) return null;
      try {
        const doc = await db.collection("profiles").doc(uid).get();
        if (doc.exists) return doc.data();
      } catch (e) {
        console.error("Failed to load profile:", e);
      }
      return null;
    }

    async function adminSaveProfile(uid, movies, tvShows) {
      if (!db) return;
      try {
        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(uid).update({
          movies: movies.map(toSave),
          movieCount: movies.length,
          tvShows: tvShows.map(toSave),
          tvShowCount: tvShows.length,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        console.error("Failed to admin save profile:", e);
      }
    }

    async function loadCommunityProfiles() {
      if (!db) return [];
      try {
        const snap = await db.collection("profiles")
          .orderBy("updatedAt", "desc")
          .limit(50)
          .get();
        return snap.docs.map(d => ({ uid: d.id, ...d.data() }))
          .filter(p => (p.movieCount || 0) > 0 || (p.tvShowCount || 0) > 0);
      } catch (e) {
        console.error("Failed to load community:", e);
        return [];
      }
    }

    // ─── Recommendations ────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const POPULAR_MOVIE_IDS = [278,155,13,550,27205,603,680,329,597,98,862,8587,12,105,76341,157336,872585,361743,545611,496243,475557,346698,693134,533535,402431,299534,299536,24428,1726,118340,284054,293660,263115,324857,634649,414906,109445,277834,354912,301528,10681,585,38,37799,106646,562,949,807,274,769,500,115,578,694,348,679,62,85,10193,14160,9806,2062,244786,1124,77,6977,24,73,7345,210577,335984,78,37165,68718,16869,424,424694,332562,419430,530915,374720,313369];
    const POPULAR_TV_IDS = [1396,1399,66732,1418,60735,456,1402,1668,63174,71446,82856,76479,1100,95557,84958,2316,94997,93405,60574,62560,87108,85552,100088,114472,71712,44217,1405,63926,31917,67744,69478,32726,4614,1434,2190,1622,246,84773,1395,1104,2382,72879,61889,96677,2734,61175,4607,68507,75006,71789];

    function Recommendations({ onSelect, onBookmark, rankedIds, watchlistIds, rankedList, localDb, mode }) {
      const isTV = mode === "tv";
      const categories = useMemo(() => {
        const db = localDb;
        const popularIds = isTV ? POPULAR_TV_IDS : POPULAR_MOVIE_IDS;
        const popularIdSet = new Set(popularIds);
        const popular = db.filter(m => popularIdSet.has(m.id));
        const newReleases = db.filter(m => parseInt(m.year) >= 2023);
        const classicYear = isTV ? 2005 : 1990;
        const classics = db.filter(m => parseInt(m.year) <= classicYear);

        const genre1 = isTV ? "Drama" : "Horror";
        const genre2 = isTV ? "Comedy" : "Animation";
        const genre3Label = isTV ? "Sci-Fi & Fantasy" : "Comedies & Romance";
        const cat1 = db.filter(m => m.genre === genre1);
        const cat2 = db.filter(m => m.genre === genre2);
        const cat3 = isTV
          ? db.filter(m => m.genre === "Sci-Fi & Fantasy")
          : db.filter(m => m.genre === "Comedy" || m.genre === "Romance");

        // "For You" — based on user's top-ranked genres and decades
        let forYou = [];
        if (rankedList && rankedList.length >= 3) {
          const topHalf = rankedList.slice(0, Math.ceil(rankedList.length / 2));
          const genreCounts = {};
          const decadeCounts = {};
          topHalf.forEach(m => {
            if (m.genre) genreCounts[m.genre] = (genreCounts[m.genre] || 0) + 1;
            const decade = Math.floor(parseInt(m.year) / 10) * 10;
            if (decade) decadeCounts[decade] = (decadeCounts[decade] || 0) + 1;
          });
          const topGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => e[0]);
          const topDecades = Object.entries(decadeCounts).sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => Number(e[0]));
          const candidates = db.filter(m =>
            !rankedIds.has(m.id) &&
            (topGenres.includes(m.genre) || topDecades.includes(Math.floor(parseInt(m.year) / 10) * 10))
          );
          forYou = shuffle(candidates).slice(0, 20);
        }

        const forYouTitle = isTV ? "Shows You May Like" : "Movies You May Like";
        const cats = [];
        if (forYou.length > 0) cats.push({ title: forYouTitle, movies: forYou });
        cats.push(
          { title: "Popular", movies: shuffle(popular).slice(0, 20) },
          { title: "New Releases", movies: shuffle(newReleases).slice(0, 20) },
          { title: genre1, movies: shuffle(cat1).slice(0, 15) },
          { title: genre2, movies: shuffle(cat2).slice(0, 15) },
          { title: genre3Label, movies: shuffle(cat3).slice(0, 15) },
          { title: "Classics", movies: shuffle(classics).slice(0, 15) },
        );
        return cats;
      }, [localDb, isTV, rankedList && rankedList.length >= 3 ? rankedList.slice(0, Math.ceil(rankedList.length / 2)).map(m => m.id).join(",") : ""]);

      return (
        <div className="recs-section">
          {categories.map(cat => (
            <div key={cat.title} className="recs-category">
              <div className="recs-category-title">{cat.title}</div>
              <div className="recs-row">
                {cat.movies.map(m => {
                  const isRanked = rankedIds.has(m.id);
                  const isWatchlisted = watchlistIds && watchlistIds.has(m.id);
                  return (
                    <div key={m.id} className={`rec-card ${isRanked ? "ranked" : ""}`}
                      onClick={() => !isRanked && !isWatchlisted && onSelect(m)}>
                      {isRanked && <div className="rec-card-badge">Ranked</div>}
                      {isWatchlisted && <div className="rec-card-badge" style={{background:"rgba(245,197,24,0.9)"}}>&#x2605;</div>}
                      <Poster poster={m.poster} title={m.title}
                        style={{ width: "100%", height: "auto", aspectRatio: "2/3", borderRadius: 8 }} />
                      <div className="rec-card-title">{m.title}</div>
                      <div className="rec-card-year">{m.year}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── Search Bar ─────────────────────────────────────────────
    function SearchBar({ onSelect, onBookmark, rankedIds, watchlistIds, localDb, searchFn, placeholder, customLabel }) {
      const [query, setQuery] = useState("");
      const [open, setOpen] = useState(false);
      const [tmdbResults, setTmdbResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const containerRef = useRef(null);
      const debounceRef = useRef(null);

      // Local results (instant)
      const localResults = useMemo(() => {
        if (!query.trim()) return [];
        const q = query.toLowerCase();
        return (localDb || MOVIE_DB).filter(m =>
          m.title.toLowerCase().includes(q) || m.year.includes(q) || m.genre.toLowerCase().includes(q)
        ).slice(0, 10);
      }, [query, localDb]);

      // TMDB live search (debounced)
      const activeFn = searchFn || searchTMDB;
      useEffect(() => {
        if (!TMDB_API_KEY || !query.trim() || query.trim().length < 2) {
          setTmdbResults([]); setSearching(false); return;
        }
        setSearching(true);
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(async () => {
          const results = await activeFn(query.trim());
          setTmdbResults(results);
          setSearching(false);
        }, 350);
        return () => clearTimeout(debounceRef.current);
      }, [query]);

      // Merge: local first, then TMDB results not already in local
      const results = useMemo(() => {
        const localIds = new Set(localResults.map(m => m.id));
        const extra = tmdbResults.filter(m => !localIds.has(m.id));
        return [...localResults, ...extra].slice(0, 15);
      }, [localResults, tmdbResults]);

      useEffect(() => { setOpen(results.length > 0 || query.trim().length > 0); }, [results, query]);

      useEffect(() => {
        function handleClick(e) {
          if (containerRef.current && !containerRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      function handleSelect(movie) {
        if (rankedIds.has(movie.id)) return;
        setQuery(""); setOpen(false); onSelect(movie);
      }

      function handleAddCustom() {
        const title = query.trim();
        if (!title) return;
        setQuery(""); setOpen(false);
        onSelect({ id: "custom_" + Date.now(), title, year: "", genre: "", poster: null });
      }

      return (
        <div className="search-section" ref={containerRef}>
          <input className="search-input" type="text" placeholder={placeholder || "Search for a movie to rank..."}
            value={query} onChange={e => setQuery(e.target.value)}
            onFocus={() => query.trim() && setOpen(true)} />
          {open && (
            <div className="search-results">
              {results.map(m => {
                const isDupe = rankedIds.has(m.id);
                return (
                  <div key={m.id} className="search-item" style={isDupe ? { opacity: 0.5 } : {}}
                    onClick={() => handleSelect(m)}>
                    <Poster poster={m.poster} title={m.title} className="search-item-poster" />
                    <div className="search-item-info">
                      <div className="search-item-title">{m.title}</div>
                      <div className="search-item-year">{m.year} &middot; {m.genre}</div>
                    </div>
                    {isDupe && <span className="search-item-dupe">Already ranked</span>}
                    {onBookmark && !isDupe && (
                      <button className={`bookmark-btn ${watchlistIds && watchlistIds.has(m.id) ? "bookmarked" : ""}`}
                        disabled={watchlistIds && watchlistIds.has(m.id)}
                        onClick={(e) => { e.stopPropagation(); onBookmark(m); }}
                        title={watchlistIds && watchlistIds.has(m.id) ? "On watchlist" : "Add to watchlist"}>
                        {watchlistIds && watchlistIds.has(m.id) ? "\u2605" : "\u2606"}
                      </button>
                    )}
                  </div>
                );
              })}
              {searching && <div style={{textAlign:"center",padding:"10px",color:"var(--text-muted)",fontSize:"0.85rem"}}>Searching TMDB...</div>}
              {query.trim() && (
                <div className="search-add-custom" onClick={handleAddCustom}>
                  <div className="search-add-icon">+</div>
                  <div>Add "{query.trim()}" as custom {customLabel || "movie"}</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── Comparison View ────────────────────────────────────────
    function ComparisonView({ session, onChoice, onCancel, onWatchlist, itemLabel }) {
      if (!session || session.done) return null;
      const { newMovie, compareMovie, step, maxSteps } = session;

      function Card({ movie, onClick }) {
        return (
          <div className="comparison-card" onClick={onClick}>
            <Poster poster={movie.poster} title={movie.title} size="lg" />
            <div className="comparison-card-info">
              <div className="comparison-card-title">{movie.title}</div>
              <div className="comparison-card-year">{movie.year}{movie.genre ? ` \u00b7 ${movie.genre}` : ""}</div>
              <div className="comparison-label">I prefer this</div>
            </div>
          </div>
        );
      }

      return (
        <div className="comparison-overlay">
          <div className="comparison-box">
            <div className="comparison-title">Which {itemLabel || "movie"} do you prefer?</div>
            <div className="comparison-progress">Comparison {step + 1} of ~{Math.max(maxSteps, 1)}</div>
            <div className="comparison-cards">
              <Card movie={newMovie} onClick={() => onChoice(true)} />
              <Card movie={compareMovie} onClick={() => onChoice(false)} />
            </div>
            <div style={{display:"flex",gap:"8px",justifyContent:"center",marginTop:"16px",flexWrap:"wrap"}}>
              {onWatchlist && (
                <button className="comparison-cancel" onClick={onWatchlist}
                  style={{borderColor:"var(--gold)",color:"var(--gold)",marginTop:0}}>
                  &#x2606; Add to Watchlist
                </button>
              )}
              <button className="comparison-cancel" onClick={onCancel} style={{marginTop:0}}>Cancel</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Ranked List (with optional read-only mode) ─────────────
    function RankedList({ list, onRemove, onClear, onShare, onMove, readOnly, user, onAddMovie, onBookmark, rankedIds, watchlistIds, itemLabel }) {
      const [confirmClear, setConfirmClear] = useState(false);
      const total = list.length;

      if (total === 0 && !readOnly) {
        return (
          <div className="ranked-section">
            <h2 style={{ marginBottom: 16 }}>Your Rankings</h2>
            <div className="ranked-empty">
              <p>{itemLabel === "TV show" ? "\uD83D\uDCFA" : "\uD83C\uDFAC"}</p>
              <p>Search or pick a {itemLabel || "movie"} above to start ranking!</p>
            </div>
          </div>
        );
      }

      if (total === 0 && readOnly) {
        return (
          <div className="ranked-section">
            <div className="ranked-empty">
              <p>{itemLabel === "TV show" ? "\uD83D\uDCFA" : "\uD83C\uDFAC"}</p>
              <p>No {itemLabel || "movie"}s ranked yet.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="ranked-section">
          <div className="ranked-header">
            <h2>{readOnly ? "Rankings" : "Your Rankings"} ({total})</h2>
            {!readOnly && (
              <div className="ranked-header-btns">
                {user && onShare && (
                  <button className="share-btn" onClick={onShare}>
                    <span>&#x1F517;</span> Share
                  </button>
                )}
                <button className="clear-btn" onClick={() => setConfirmClear(true)}>Clear All</button>
              </div>
            )}
          </div>
          <div className="ranked-list">
            {list.map((movie, i) => {
              const score = getScore(i, total);
              return (
                <div key={movie.id} className="ranked-item">
                  <div className="rank-number">{i + 1}</div>
                  <Poster poster={movie.poster} title={movie.title}
                    className={movie.poster ? "ranked-poster" : "ranked-poster-ph poster-placeholder"} />
                  <div className="ranked-item-info">
                    <div className="ranked-item-title">{movie.title}</div>
                    <div className="ranked-item-year">{movie.year}{movie.genre ? ` \u00b7 ${movie.genre}` : ""}</div>
                  </div>
                  <div className={`score-badge ${scoreClass(score)}`}>{score.toFixed(1)}</div>
                  {!readOnly && (
                    <div className="move-btns">
                      <button className="move-btn" disabled={i === 0} onClick={() => onMove(i, i - 1)} title="Move up">&#x25B2;</button>
                      <button className="move-btn" disabled={i === total - 1} onClick={() => onMove(i, i + 1)} title="Move down">&#x25BC;</button>
                    </div>
                  )}
                  {!readOnly && <button className="remove-btn" onClick={() => onRemove(movie.id)} title="Remove">&#x2715;</button>}
                  {readOnly && onBookmark && (
                    <button className={`bookmark-btn ${watchlistIds && watchlistIds.has(movie.id) ? "bookmarked" : ""}`}
                      disabled={watchlistIds && watchlistIds.has(movie.id) || (rankedIds && rankedIds.has(movie.id))}
                      onClick={(e) => { e.stopPropagation(); onBookmark(movie); }}
                      title={watchlistIds && watchlistIds.has(movie.id) ? "On watchlist" : "Add to watchlist"}>
                      {watchlistIds && watchlistIds.has(movie.id) ? "\u2605" : "\u2606"}
                    </button>
                  )}
                  {readOnly && onAddMovie && (
                    <button className="profile-add-btn"
                      disabled={rankedIds && rankedIds.has(movie.id)}
                      onClick={(e) => { e.stopPropagation(); onAddMovie(movie); }}
                      title="Add to your rankings">
                      {rankedIds && rankedIds.has(movie.id) ? "Ranked" : "+ Add"}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
          {confirmClear && (
            <div className="confirm-overlay">
              <div className="confirm-box">
                <p>Remove all {total} {itemLabel || "movie"}s from your rankings?</p>
                <div className="confirm-btns">
                  <button className="confirm-yes" onClick={() => { onClear(); setConfirmClear(false); }}>Yes, Clear All</button>
                  <button className="confirm-no" onClick={() => setConfirmClear(false)}>Cancel</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Community View ─────────────────────────────────────────

    // ─── Profile View (viewing someone else's rankings) ─────────
    function ProfileView({ uid, onBack, onAddMovie, onBookmark, rankedIds, tvRankedIds, watchlistIds, tvWatchlistIds, defaultTab, isAdmin, onTabChange }) {
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [profileTab, setProfileTab] = useState(defaultTab || "movies");
      const [editedMovies, setEditedMovies] = useState(null);
      const [editedTv, setEditedTv] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        loadProfile(uid).then(p => {
          setProfile(p);
          if (p) {
            setEditedMovies(p.movies || []);
            setEditedTv(p.tvShows || []);
          }
          setLoading(false);
        });
      }, [uid]);

      if (loading) {
        return (
          <div style={{ textAlign: "center", padding: 60 }}>
            <div className="spinner"></div>
            <p style={{ color: "var(--text-muted)", marginTop: 12 }}>Loading rankings...</p>
          </div>
        );
      }

      if (!profile) {
        return (
          <div style={{ textAlign: "center", padding: 60 }}>
            <p style={{ color: "var(--text-muted)" }}>Profile not found.</p>
            <button className="profile-back" onClick={onBack}>Go Back</button>
          </div>
        );
      }

      const movieList = isAdmin && editedMovies ? editedMovies : (profile.movies || []);
      const tvList = isAdmin && editedTv ? editedTv : (profile.tvShows || []);
      const activeList = profileTab === "movies" ? movieList : tvList;
      const activeIds = profileTab === "movies" ? rankedIds : tvRankedIds;
      const activeWlIds = profileTab === "movies" ? watchlistIds : tvWatchlistIds;

      function handleAdminRemove(id) {
        if (profileTab === "movies") {
          setEditedMovies(prev => prev.filter(m => m.id !== id));
        } else {
          setEditedTv(prev => prev.filter(m => m.id !== id));
        }
      }

      function handleAdminMove(fromIdx, toIdx) {
        if (profileTab === "movies") {
          setEditedMovies(prev => {
            const next = [...prev];
            const [item] = next.splice(fromIdx, 1);
            next.splice(toIdx, 0, item);
            return next;
          });
        } else {
          setEditedTv(prev => {
            const next = [...prev];
            const [item] = next.splice(fromIdx, 1);
            next.splice(toIdx, 0, item);
            return next;
          });
        }
      }

      async function handleAdminSave() {
        setSaving(true);
        await adminSaveProfile(uid, editedMovies || [], editedTv || []);
        setSaving(false);
        // Reload profile
        const p = await loadProfile(uid);
        if (p) {
          setProfile(p);
          setEditedMovies(p.movies || []);
          setEditedTv(p.tvShows || []);
        }
      }

      const hasChanges = isAdmin && (
        JSON.stringify(editedMovies) !== JSON.stringify(profile.movies || []) ||
        JSON.stringify(editedTv) !== JSON.stringify(profile.tvShows || [])
      );

      return (
        <div>
          <div className="profile-banner">
            {profile.photoURL
              ? <img src={profile.photoURL} alt="" className="profile-avatar" referrerPolicy="no-referrer" />
              : <div className="profile-avatar-ph">{(profile.displayName || "?")[0]}</div>
            }
            <div className="profile-name">{profile.displayName || "Anonymous"}</div>
            {isAdmin && <div style={{color:"var(--gold)",fontSize:"0.75rem",fontWeight:600,marginBottom:4}}>ADMIN MODE</div>}
            <div className="profile-count">
              {movieList.length > 0 && `${movieList.length} movies`}
              {movieList.length > 0 && tvList.length > 0 && " · "}
              {tvList.length > 0 && `${tvList.length} shows`}
              {" ranked"}
            </div>
            <div className="profile-subtabs">
              <button className={`profile-subtab ${profileTab === "movies" ? "active" : ""}`}
                onClick={() => { setProfileTab("movies"); onTabChange && onTabChange("movies"); }}>Movies ({movieList.length})</button>
              <button className={`profile-subtab ${profileTab === "tv" ? "active" : ""}`}
                onClick={() => { setProfileTab("tv"); onTabChange && onTabChange("tv"); }}>TV Shows ({tvList.length})</button>
            </div>
            {hasChanges && (
              <button className="profile-back" onClick={handleAdminSave}
                style={{background:"#2e7d32",marginRight:8}} disabled={saving}>
                {saving ? "Saving..." : "Save Changes"}
              </button>
            )}
            <button className="profile-back" onClick={onBack}>&#x2190; Back</button>
          </div>
          {isAdmin ? (
            <RankedList list={activeList} readOnly={false}
              onRemove={handleAdminRemove} onMove={handleAdminMove}
              onClear={() => profileTab === "movies" ? setEditedMovies([]) : setEditedTv([])}
              itemLabel={profileTab === "tv" ? "TV show" : "movie"} />
          ) : (
            <RankedList list={activeList} readOnly={true}
              onAddMovie={(movie) => onAddMovie(movie, profileTab === "tv" ? "tv" : "movies")}
              onBookmark={(movie) => onBookmark(movie, profileTab === "tv" ? "tv" : "movies")}
              rankedIds={activeIds} watchlistIds={activeWlIds}
              itemLabel={profileTab === "tv" ? "TV show" : "movie"} />
          )}
        </div>
      );
    }
