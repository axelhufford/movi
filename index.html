<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0E0D;
      --surface: #1C1A18;
      --surface2: #262320;
      --accent: #FF4D4D;
      --accent-hover: #FF5C5C;
      --accent-soft: rgba(255,77,77,0.12);
      --accent-text: #FF5C5C;
      --text: #F5F3EF;
      --text-muted: #9A968E;
      --text-dim: #9A968E;
      --text-faint: #5C5953;
      --gold: #f5c518;
      --radius: 14px;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --border-accent: rgba(255,77,77,0.35);
      --accent-grad: linear-gradient(135deg, #FF4D4D 0%, #FF7A3D 100%);
      --accent-grad-hover: linear-gradient(135deg, #FF5C5C 0%, #FF8A4E 100%);
      --gold-foil: linear-gradient(110deg, #f5c518 0%, #fff1a8 45%, #f5c518 55%, #c99a00 100%);
      --hero-glow: radial-gradient(55% 40% at 50% 0%, rgba(255,77,77,0.18), transparent 70%);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 16px -4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
      --shadow-lg: 0 18px 48px -12px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.3);
      --shadow-glow: 0 0 0 1px var(--border-accent), 0 18px 48px -16px rgba(255,77,77,0.45);
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(55% 40% at 50% 0%, rgba(255,77,77,0.18), transparent 70%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    #root { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Film Strip Logo */
    .header { text-align: center; padding: 36px 0 20px; position: relative; }
    .header h1 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; cursor: pointer; display: none; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }

    .logo-strip { display: flex; align-items: center; justify-content: center; gap: 0; cursor: pointer; }
    .logo-frame {
      display: flex; align-items: center; justify-content: center; position: relative;
      width: 38px; height: 46px; border: 2px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.025);
    }
    .logo-frame.active {
      border-color: var(--accent); background: rgba(255,77,77,0.07);
      transform: scale(1.1); z-index: 2;
      box-shadow: 0 0 20px rgba(255,77,77,0.25);
    }
    .logo-frame .frame-num {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px;
      color: rgba(255,255,255,0.16);
    }
    .logo-frame.active .frame-num { color: var(--accent); }
    .logo-frame .sprocket {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 9px; height: 3px; border-radius: 1px; background: rgba(255,255,255,0.08);
    }
    .logo-frame.active .sprocket { background: rgba(255,77,77,0.28); }
    .sprocket-top { top: 3px; }
    .sprocket-bot { bottom: 3px; }
    .logo-wordmark {
      font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 32px;
      letter-spacing: 10px; text-transform: uppercase; color: #fff; margin-top: 8px;
    }
    .logo-tv-sub {
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 10px;
      letter-spacing: 4px; text-transform: uppercase; color: var(--accent-text); opacity: 0.65;
      margin-top: 2px; display: none;
    }
    .tv-mode .logo-tv-sub { display: block; }
    .tv-mode .logo-frame.active {
      border-color: var(--accent); background: rgba(0,135,90,0.1);
      box-shadow: 0 0 20px rgba(0,135,90,0.25);
    }
    .tv-mode .logo-frame.active .frame-num { color: var(--accent); }
    .tv-mode .logo-frame.active .sprocket { background: rgba(0,135,90,0.35); }

    /* Auth Bar */
    .auth-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      padding: 10px 0; margin-bottom: 4px;
    }
    .auth-user {
      display: flex; align-items: center; gap: 8px;
    }
    .auth-avatar {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent);
    }
    .auth-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent);
    }
    .auth-name { font-size: 0.85rem; font-weight: 600; }
    .auth-btn {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-btn-signin {
      background: var(--accent); color: #fff;
    }
    .auth-btn-signin:hover { background: var(--accent-hover); }
    .auth-btn-signout {
      background: var(--surface2); color: var(--text-muted); font-size: 0.75rem; padding: 6px 12px;
    }
    .auth-btn-signout:hover { background: var(--border-strong); color: var(--text); }
    .auth-btn-email {
      background: var(--surface2); color: var(--text);
    }
    .auth-btn-email:hover { background: var(--border-strong); }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 10px 0;
      color: var(--text-muted); font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ""; flex: 1; height: 1px; background: var(--border-strong);
    }
    .auth-form {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px;
      margin-bottom: 16px; max-width: 360px; margin-left: auto; margin-right: auto;
    }
    .auth-form h3 { text-align: center; margin-bottom: 16px; font-size: 1.1rem; font-family: 'Outfit', sans-serif; }
    .auth-input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 0.9rem; margin-bottom: 10px;
      outline: none; transition: border-color 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--text-faint); }
    .auth-error {
      color: var(--accent); font-size: 0.8rem; margin-bottom: 10px; text-align: center;
    }
    .auth-link {
      color: var(--accent); cursor: pointer; font-size: 0.8rem;
      background: none; border: none; text-decoration: underline;
    }
    .auth-link:hover { color: var(--accent-hover); }
    .auth-form-footer {
      text-align: center; margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);
    }
    .auth-form-submit {
      width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; background: var(--accent); color: #fff;
      transition: background 0.2s; margin-top: 4px;
    }
    .auth-form-submit:hover { background: var(--accent-hover); }
    .auth-back {
      display: block; text-align: center; margin-bottom: 12px;
      color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
      background: none; border: none;
    }
    .auth-back:hover { color: var(--text); }
    .auth-sync {
      font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
    }
    .auth-sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block;
    }

    /* Share */
    .share-btn {
      padding: 6px 14px; background: none; border: 1px solid var(--border-strong);
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }
    .private-toggle {
      padding: 6px 14px; background: none; border: 1px solid var(--border-strong);
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .private-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .private-toggle.active { border-color: var(--gold); color: var(--gold); }

    /* Profile View (viewing someone else's rankings) */
    .profile-banner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px;
      text-align: center; margin-bottom: 20px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent); margin-bottom: 10px;
    }
    .profile-avatar-ph {
      width: 64px; height: 64px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      border: 3px solid var(--accent); margin: 0 auto 10px;
    }
    .profile-name { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .profile-count { color: var(--text-muted); font-size: 0.9rem; }
    .profile-back {
      display: inline-block; margin-top: 12px; padding: 8px 20px;
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .profile-back:hover { background: var(--accent-hover); }

    /* Tabs for navigation */
    .nav-tabs {
      display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto;
    }
    .nav-tab {
      flex: 1; padding: 10px 16px; border: none; background: none;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; text-align: center;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.3px;
    }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* Community */
    .community-section { margin-top: 10px; }
    .community-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed var(--border-strong); border-radius: var(--radius);
    }
    .community-list { display: flex; flex-direction: column; gap: 8px; }
    .community-card {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .community-card:hover { background: var(--surface2); transform: translateY(-2px); }
    .community-card-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-avatar-ph {
      width: 44px; height: 44px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-info { flex: 1; min-width: 0; }
    .community-card-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem; }
    .community-card-meta { color: var(--text-muted); font-size: 0.8rem; }
    .community-card-top {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .community-card-top img, .community-card-top .poster-placeholder {
      width: 28px; height: 42px; border-radius: 4px; object-fit: cover;
    }
    .community-card-arrow { color: var(--text-muted); font-size: 1.2rem; flex-shrink: 0; }
    .compatibility-badge {
      font-size: 0.7rem; font-weight: 700; padding: 4px 8px;
      border-radius: 12px; flex-shrink: 0; text-align: center;
      min-width: 36px; line-height: 1;
    }
    .compatibility-high { background: var(--accent); color: #fff; }
    .compatibility-mid { background: #b8860b; color: #fff; }
    .compatibility-low { background: var(--surface2); color: var(--text-muted); font-weight: 600; }
    .compatibility-badge { cursor: pointer; }
    .compatibility-badge:active { transform: scale(0.95); }
    .compat-explainer {
      background: var(--surface); border: 1px solid var(--accent); border-radius: 12px;
      padding: 14px 18px; margin-bottom: 12px; font-size: 0.8rem;
      color: var(--text); line-height: 1.5; position: relative;
      animation: fadeInUp 0.2s;
    }
    .compat-explainer-close {
      position: absolute; top: 6px; right: 10px; background: none; border: none;
      color: var(--text-muted); cursor: pointer; font-size: 1rem;
    }
    .community-delete-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      opacity: 0.4; transition: opacity 0.2s; padding: 4px 8px; flex-shrink: 0;
    }
    .community-delete-btn:hover { opacity: 1; }
    .community-you-block { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--surface2); }
    .community-section-label {
      font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .community-card-you {
      border: 1px solid var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft, rgba(245, 197, 24, 0.15));
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    }
    .community-you-tag {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 1px;
      padding: 2px 6px; border-radius: 6px; background: var(--accent); color: #fff;
      margin-left: 6px; vertical-align: middle; text-transform: uppercase;
    }
    .community-card-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .personal-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 600;
      padding: 3px 8px; border-radius: 10px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); margin-top: 4px;
      max-width: 100%; overflow: hidden; cursor: pointer;
      transition: transform 0.1s, border-color 0.15s;
    }
    .personal-badge:hover { border-color: var(--accent); }
    .personal-badge:active { transform: scale(0.96); }
    .personal-badge-emoji { font-size: 0.85rem; line-height: 1; }
    .personal-badge-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.15s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .badge-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 22px; max-width: 320px; width: 100%;
      text-align: center; position: relative;
      animation: fadeInUp 0.2s;
    }
    .badge-modal-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .badge-modal-emoji { font-size: 3rem; margin-bottom: 8px; line-height: 1; }
    .badge-modal-label {
      font-family: 'Outfit', sans-serif; font-weight: 700;
      font-size: 1.05rem; margin-bottom: 4px;
    }
    .badge-modal-who { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
    .badge-modal-tooltip { font-size: 0.88rem; color: var(--text); line-height: 1.45; }
    .badge-modal-action {
      margin-top: 18px; padding: 9px 24px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; letter-spacing: 0.3px;
    }
    .badge-modal-action:active { transform: scale(0.97); }

    /* Search */
    .search-section { position: relative; margin-bottom: 24px; }
    .search-input {
      width: 100%; padding: 14px 20px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 1rem; outline: none; transition: border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface); border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--border); border-top: none; max-height: 400px; overflow-y: auto;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .search-item:hover { background: var(--accent-soft); }
    .search-item-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .search-item-info { flex: 1; }
    .search-item-title { font-weight: 600; font-size: 0.95rem; }
    .search-item-year { color: var(--text-muted); font-size: 0.85rem; }
    .search-item-dupe {
      font-size: 0.75rem; color: var(--gold); background: rgba(245, 197, 24, 0.15);
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .search-add-custom {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; transition: background 0.15s; color: var(--accent);
      font-weight: 600; border-top: 1px solid var(--border-strong);
    }
    .search-add-custom:hover { background: var(--accent-soft); }
    .search-add-icon {
      width: 40px; height: 60px; border-radius: 4px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      color: var(--accent); flex-shrink: 0;
    }
    .poster-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); color: var(--text-muted); font-size: 0.6rem;
      text-align: center; overflow: hidden;
    }

    /* Recommendations */
    .recs-section { margin-bottom: 30px; }
    .recs-category { margin-bottom: 20px; }
    .recs-category-title {
      font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; color: var(--text-muted);
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .recs-category-title:hover { color: var(--text); }
    .recs-category-title .expand-hint {
      font-size: 0.65rem; opacity: 0; transition: opacity 0.2s; color: var(--accent);
    }
    .recs-category-title:hover .expand-hint { opacity: 1; }
    .recs-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
    }
    .recs-row::-webkit-scrollbar { height: 6px; }
    .recs-row::-webkit-scrollbar-track { background: transparent; }
    .recs-row::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    .rec-card {
      flex-shrink: 0; width: 110px; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
      position: relative;
    }
    .rec-card:hover { transform: scale(1.05) translateY(-3px); }
    .rec-card.ranked { opacity: 0.35; }

      background: var(--surface); color: var(--text); padding: 12px 24px;
      border-radius: 12px; font-size: 0.9rem; z-index: 500;
      border: 1px solid var(--border); animation: fadeInUp 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      font-family: 'DM Sans', sans-serif;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Sign-in prompt */
    .signin-prompt {
      text-align: center; padding: 16px; background: var(--surface);
      border-radius: var(--radius); margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .signin-prompt p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--surface2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mode Toggle */
    .mode-toggle {
      display: flex; gap: 4px; justify-content: center; margin-bottom: 12px;
    }
    .mode-btn {
      padding: 8px 20px; border: 1px solid var(--border); background: none;
      color: var(--text-muted); border-radius: 20px; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: var(--accent); color: var(--accent); background: var(--accent-soft);
    }
    .mode-btn:not(.active):hover { border-color: var(--border-strong); color: var(--text); }

    /* Day Mode (Light Theme) */
    .day-mode {
      --bg: #FBF7F0;
      --surface: #FFFCF6;
      --surface2: #F3ECE0;
      --text: #1A1817;
      --text-muted: #6B6862;
      --text-dim: #6B6862;
      --text-faint: #A8A49C;
      --border: rgba(60,30,10,0.10);
      --border-strong: rgba(60,30,10,0.18);
      --border-accent: rgba(255,77,77,0.30);
      --accent-soft: rgba(255,77,77,0.10);
      --accent-text: #E63838;
      --accent-hover: #E63838;
      --hero-glow: radial-gradient(55% 40% at 50% 0%, rgba(255,122,61,0.14), transparent 70%);
      --shadow-sm: 0 1px 2px rgba(120,60,30,0.06);
      --shadow-md: 0 6px 20px -6px rgba(120,60,30,0.14), 0 1px 2px rgba(120,60,30,0.06);
      --shadow-lg: 0 20px 48px -16px rgba(120,60,30,0.22), 0 2px 6px rgba(120,60,30,0.08);
      --shadow-glow: 0 0 0 1px var(--border-accent), 0 20px 48px -18px rgba(255,77,77,0.35);
    }
    body:has(.day-mode) {
      background-color: transparent;
      background-image:
        radial-gradient(55% 40% at 50% 0%, rgba(255,122,61,0.14), transparent 70%),
        linear-gradient(180deg, #FBF7F0 0%, #F3E8D6 100%);
    }
    body:has(.tv-mode) {
      background-image: radial-gradient(55% 40% at 50% 0%, rgba(0,135,90,0.18), transparent 70%);
    }
    body:has(.day-mode.tv-mode) {
      background-image:
        radial-gradient(55% 40% at 50% 0%, rgba(0,135,90,0.12), transparent 70%),
        linear-gradient(180deg, #F5FAF7 0%, #D8EADE 100%);
    }
    .day-mode .logo-frame {
      border-color: rgba(0,0,0,0.13);
      background: rgba(0,0,0,0.025);
    }
    .day-mode .logo-frame.active {
      border-color: var(--accent); background: rgba(255,77,77,0.08);
      box-shadow: 0 0 20px rgba(255,77,77,0.18);
    }
    .day-mode .logo-frame.active .frame-num { color: var(--accent); }
    .day-mode .logo-frame.active .sprocket { background: rgba(255,77,77,0.28); }
    .day-mode .logo-frame .frame-num { color: rgba(0,0,0,0.25); }
    .day-mode .logo-frame .sprocket { background: rgba(0,0,0,0.08); }
    .day-mode .auth-btn-signout { background: var(--surface2); color: var(--text-dim); }
    .day-mode .auth-btn-signout:hover { background: var(--border-strong); color: var(--text); }
    .day-mode .auth-btn-google { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .day-mode .auth-divider::before, .day-mode .auth-divider::after { background: var(--border); }
    .day-mode .mode-btn:not(.active):hover { border-color: var(--text-faint); }
    .day-mode .spinner { border-color: var(--border-strong); border-top-color: var(--accent); }
    .day-mode .remove-btn { color: var(--text-faint); }
    .day-mode .remove-btn:hover { color: var(--accent); }
    .day-mode .move-btn { color: var(--text-faint); }
    .day-mode .move-btn:hover { color: var(--text); }
    .day-mode .bookmark-btn { color: var(--text-faint); }
    .day-mode .confirm-no { background: var(--surface2); color: var(--text); }
    .day-mode .confirm-no:hover { background: var(--border-strong); }
    .day-mode .comparison-overlay { background: rgba(0,0,0,0.5); }
    .day-mode .toast { box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .day-mode .profile-add-btn:disabled { background: var(--border-strong); }
    .day-mode .stats-accordion-header:hover { background: rgba(0,0,0,0.04); }
    .day-mode .stats-bar-bg { background: rgba(0,0,0,0.06); }
    .day-mode .decade-bar-bg { background: rgba(0,0,0,0.04); }
    .day-mode .nav-tab { border-color: var(--border); }
    .day-mode .profile-subtab { border-color: var(--border); }
    .day-mode .recs-row::-webkit-scrollbar-thumb { background: var(--border-strong); }
    .day-mode .expanded-cat-overlay { background: rgba(0,0,0,0.6); }
    .day-mode .comparison-cancel { border-color: var(--border-strong); }
    .day-mode .watchlist-remove { color: var(--text-faint); }
    .day-mode .watchlist-remove:hover { color: var(--accent); }
    .day-mode .empty-state { border-color: var(--border-strong); }
    .day-mode .watchlist-empty { border-color: var(--border-strong); }
    .day-mode .logo-wordmark { color: var(--accent); }
    .day-mode .ranked-item-title { color: var(--text); }
    .day-mode .comparison-card-title { color: var(--text); }
    .day-mode .watchlist-item .ranked-item-title { color: var(--text); }
    .day-mode .rec-card-title { color: var(--text); }
    .day-mode .search-item-title { color: var(--text); }
    .day-mode .rank-number { color: var(--text-muted); }

    /* Theme toggle button */
    .theme-toggle {
      position: absolute; top: 12px; right: 12px; z-index: 400;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

    /* TV Mode Theme (Green) */
    .tv-mode {
      --accent: #00875A;
      --accent-hover: #2DAF7C;
      --accent-soft: rgba(0,135,90,0.14);
      --accent-text: #2DAF7C;
      --border-accent: rgba(0,135,90,0.35);
      --bg: #0D120F;
      --surface: #151C18;
      --surface2: #1E2722;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --accent-grad: linear-gradient(135deg, #00875A 0%, #2DAF7C 100%);
      --accent-grad-hover: linear-gradient(135deg, #2DAF7C 0%, #3FC48F 100%);
      --hero-glow: radial-gradient(55% 40% at 50% 0%, rgba(0,135,90,0.18), transparent 70%);
      --shadow-glow: 0 0 0 1px var(--border-accent), 0 18px 48px -16px rgba(0,135,90,0.45);
    }
    .day-mode.tv-mode {
      --accent: #00875A;
      --accent-hover: #006B47;
      --accent-soft: rgba(0,135,90,0.10);
      --accent-text: #006B47;
      --border-accent: rgba(0,135,90,0.30);
      --bg: #F5FAF7;
      --surface: #FDFEFB;
      --surface2: #ECF3EE;
      --text: #1A1817;
      --text-muted: #6B6862;
      --text-dim: #6B6862;
      --text-faint: #A8A49C;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --accent-grad: linear-gradient(135deg, #006B47 0%, #00875A 100%);
      --accent-grad-hover: linear-gradient(135deg, #00875A 0%, #2DAF7C 100%);
      --hero-glow: radial-gradient(55% 40% at 50% 0%, rgba(0,135,90,0.12), transparent 70%);
      --shadow-glow: 0 0 0 1px var(--border-accent), 0 20px 48px -18px rgba(0,135,90,0.35);
    }
    .tv-mode .mode-btn.active {
      background: var(--accent-soft);
    }
    .tv-mode .search-item:hover { background: var(--accent-soft); }
    .tv-mode .search-add-custom:hover { background: var(--accent-soft); }
    .tv-mode .ranked-item:nth-child(1) .rank-number { color: var(--accent); }

    /* Profile sub-toggle for movies/tv */
    .profile-subtabs {
      display: flex; gap: 4px; justify-content: center; margin: 12px 0;
    }
    .profile-subtab {
      padding: 6px 16px; border: 1px solid var(--border-strong); background: none;
      color: var(--text-muted); border-radius: 16px; cursor: pointer;
      font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
    }
    .profile-subtab.active {
      border-color: var(--accent); color: var(--accent); background: rgba(233, 69, 96, 0.1);
    }

    @media (max-width: 600px) {
      .comparison-cards { gap: 10px; }
      .comparison-box { padding: 20px 14px; }
      .comparison-card-title { font-size: 0.8rem; }
      .header h1 { font-size: 1.6rem; }
      .rec-card { width: 95px; }
      .rec-card img, .rec-card .poster-placeholder { width: 95px; height: 142px; }
      .expanded-cat-overlay { padding: 20px 8px; }
      .expanded-cat-grid { padding: 16px 12px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); }
      .expanded-cat-header { padding: 16px; }
      .nav-tabs { gap: 2px; }
      .nav-tab { padding: 8px 10px; font-size: 0.8rem; }
      .mode-btn { padding: 6px 14px; font-size: 0.8rem; }
      .stats-cards { grid-template-columns: 1fr 1fr; }
      .ranked-item {
        flex-wrap: wrap; gap: 6px 8px; padding: 10px 10px;
      }
      .ranked-item-info { flex: 1; min-width: 120px; }
      .ranked-item-title {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        font-size: 0.85rem;
      }
      .ranked-item-year { font-size: 0.7rem; }
      .rank-number { min-width: 24px !important; font-size: 1.1rem !important; }
      .score-badge { min-width: 28px; font-size: 0.7rem; padding: 3px 4px; }
      .drag-handle { min-width: 20px; padding: 6px 2px; font-size: 1rem; }
      .remove-btn { padding: 2px 4px; font-size: 0.85rem; }
      .bookmark-btn { padding: 2px 4px; font-size: 0.9rem; }
      .profile-add-btn { padding: 3px 6px; font-size: 0.65rem; }
    }

    /* ─── Stats & Insights ─────────────────────────────────────── */
    .stats-accordion {
      margin-top: 24px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .stats-accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; cursor: pointer; user-select: none;
      transition: background 0.2s;
    }
    .stats-accordion-header:hover { background: rgba(255,255,255,0.04); }
    .stats-accordion-header h3 {
      margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .stats-chevron {
      font-size: 0.8rem; color: var(--text-muted);
      transition: transform 0.3s ease;
    }
    .stats-accordion.open .stats-chevron { transform: rotate(180deg); }
    .stats-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .stats-accordion.open .stats-body { max-height: 2000px; }
    .stats-content { padding: 0 20px 20px; }
    .stats-cards {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stats-card {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      padding: 16px; text-align: center;
    }
    .stats-card-number {
      font-size: 1.8rem; font-weight: 700; color: var(--accent);
      line-height: 1;
    }
    .stats-card-label {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stats-section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
      margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 3px;
    }
    .stats-bar-chart { margin-bottom: 24px; }
    .stats-bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .stats-bar-label {
      width: 80px; font-size: 0.8rem; color: var(--text-muted);
      text-align: right; flex-shrink: 0;
    }
    .stats-bar-track {
      flex: 1; height: 22px; background: rgba(255,255,255,0.04);
      border-radius: 6px; overflow: hidden; position: relative;
    }
    .stats-bar-fill {
      height: 100%; border-radius: 6px;
      background: var(--accent);
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .stats-bar-count {
      font-size: 0.75rem; color: var(--text-muted); width: 30px;
      flex-shrink: 0;
    }
    .stats-insights {
      background: rgba(255,255,255,0.03); border-radius: 10px;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .stats-insight {
      font-size: 0.85rem; color: var(--text-secondary);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .stats-insight-icon { flex-shrink: 0; }
    .stats-empty {
      text-align: center; padding: 30px; color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ─── v2 visual refresh ──────────────────────────────────────── */

    /* Module 1 — overlays: backdrop-blur + softer dim */
    .comparison-overlay, .import-overlay, .movie-detail-overlay, .expanded-cat-overlay {
      background: rgba(8,6,4,0.68);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
    }
    .day-mode .comparison-overlay,
    .day-mode .import-overlay,
    .day-mode .movie-detail-overlay,
    .day-mode .expanded-cat-overlay {
      background: rgba(30,20,10,0.38);
    }

    /* Module 1 — elevation on cards/modals/panels */
    .comparison-box, .movie-detail-box, .import-modal, .expanded-cat-modal,
    .auth-form, .profile-banner,
    .community-card, .trophy-card, .ranked-item, .watchlist-item,
    .nav-tabs, .stats-accordion, .signin-prompt {
      box-shadow: var(--shadow-md);
    }
    .comparison-box, .movie-detail-box, .import-modal, .expanded-cat-modal {
      box-shadow: var(--shadow-lg);
    }
    .community-card:hover, .trophy-card:hover, .ranked-item:hover, .watchlist-item:hover {
      box-shadow: var(--shadow-glow);
    }

    /* Module 2 — gradient primary CTAs */
    .auth-btn-signin,
    .auth-form-submit,
    .import-btn-primary,
    .movie-detail-rerank,
    .profile-back,
    .profile-add-btn {
      background: var(--accent-grad);
      box-shadow: 0 6px 18px -8px rgba(255,77,77,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    }
    .tv-mode .auth-btn-signin,
    .tv-mode .auth-form-submit,
    .tv-mode .import-btn-primary,
    .tv-mode .movie-detail-rerank,
    .tv-mode .profile-back,
    .tv-mode .profile-add-btn {
      box-shadow: 0 6px 18px -8px rgba(0,135,90,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .auth-btn-signin:hover,
    .auth-form-submit:hover,
    .import-btn-primary:hover,
    .movie-detail-rerank:hover,
    .profile-back:hover,
    .profile-add-btn:not(:disabled):hover {
      background: var(--accent-grad-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px -8px rgba(255,77,77,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .tv-mode .auth-btn-signin:hover,
    .tv-mode .auth-form-submit:hover,
    .tv-mode .import-btn-primary:hover,
    .tv-mode .movie-detail-rerank:hover,
    .tv-mode .profile-back:hover,
    .tv-mode .profile-add-btn:not(:disabled):hover {
      box-shadow: 0 10px 24px -8px rgba(0,135,90,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .auth-btn-signin:active,
    .auth-form-submit:active,
    .import-btn-primary:active,
    .movie-detail-rerank:active,
    .profile-back:active,
    .profile-add-btn:active {
      transform: translateY(0);
      box-shadow: 0 3px 8px -4px rgba(255,77,77,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .profile-add-btn:disabled {
      background: var(--surface2); color: var(--text-muted);
      box-shadow: none;
    }

    /* Module 2 — nav tab + mode btn active gradients */
    .nav-tab.active {
      background: var(--accent-grad);
      box-shadow: 0 4px 14px -6px rgba(255,77,77,0.55);
    }
    .tv-mode .nav-tab.active {
      box-shadow: 0 4px 14px -6px rgba(0,135,90,0.55);
    }
    .mode-btn.active {
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--border-accent);
    }

    /* Module 2 — score badge: universal green → yellow → gray scale */
    .score-high { background: rgba(76,175,80,0.20);  color: #4fb96a; }
    .score-mid  { background: rgba(245,197,24,0.18); color: var(--gold); }
    .score-low  { background: rgba(150,150,150,0.14); color: var(--text-muted); }
    .day-mode .score-high { background: rgba(76,175,80,0.20); color: #2f7d3a; }
    .day-mode .score-mid  { background: rgba(245,197,24,0.22); color: #a07d00; }
    .day-mode .score-low  { background: rgba(150,150,150,0.18); color: #6b6b6b; }
    .score-badge {
      font-variant-numeric: tabular-nums;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* Module 3 — ranked list hero treatment */
    .ranked-item { position: relative; }
    .rank-number {
      font-variant-numeric: tabular-nums;
      font-size: 1.9rem; font-weight: 900;
      color: var(--text-muted);
      letter-spacing: -0.03em;
      min-width: 42px;
    }
    .ranked-item:nth-child(1) .rank-number { color: var(--accent); }
    .tv-mode .ranked-item:nth-child(1) .rank-number { color: var(--accent); }
    .ranked-list > .ranked-item:first-child::before {
      content: ""; position: absolute; top: 0; left: 14px; right: 14px;
      height: 1px;
      background-image: linear-gradient(to right, var(--border-strong) 50%, transparent 50%);
      background-size: 8px 1px; background-repeat: repeat-x;
      pointer-events: none; opacity: 0.6;
    }
    .ranked-item::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: 0;
      height: 2px; background: var(--accent-grad); border-radius: 0 0 var(--radius) var(--radius);
      transform: scaleX(var(--score-scale, 0)); transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
      opacity: 0;
    }
    .ranked-item:hover::after { opacity: 1; }
    .ranked-list.is-dragging .ranked-item::after { display: none; }

    /* Module 4 — comparison screen polish */
    .comparison-cards { position: relative; }
    .comparison-cards::before,
    .comparison-cards::after {
      content: ""; position: absolute; width: 60%; aspect-ratio: 1;
      border-radius: 50%; filter: blur(40px); pointer-events: none;
      opacity: 0.55; z-index: -1;
      background: radial-gradient(circle, rgba(255,77,77,0.35) 0%, transparent 70%);
      animation: compare-pulse 4s ease-in-out infinite;
    }
    .comparison-cards::before { top: -10%; left: -10%; }
    .comparison-cards::after  { bottom: -10%; right: -10%; animation-delay: 2s; }
    .tv-mode .comparison-cards::before,
    .tv-mode .comparison-cards::after {
      background: radial-gradient(circle, rgba(0,135,90,0.35) 0%, transparent 70%);
    }
    .day-mode .comparison-cards::before,
    .day-mode .comparison-cards::after { opacity: 0.3; }
    @keyframes compare-pulse {
      0%, 100% { transform: scale(1); opacity: 0.45; }
      50%      { transform: scale(1.08); opacity: 0.7; }
    }
    .comparison-card {
      border-radius: 18px; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, border-color 0.2s;
    }
    .comparison-card:hover {
      transform: scale(1.04) translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 22px 56px -18px rgba(255,77,77,0.55);
    }
    .tv-mode .comparison-card:hover {
      box-shadow: 0 0 0 2px var(--accent), 0 22px 56px -18px rgba(0,135,90,0.55);
    }
    .comparison-card.is-losing {
      animation: loser-fade 220ms cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .comparison-card.is-winning {
      animation: winner-flash 220ms cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes loser-fade {
      to { transform: scale(0.92); opacity: 0.25; }
    }
    @keyframes winner-flash {
      0%   { transform: scale(1); box-shadow: 0 0 0 2px var(--accent), 0 22px 56px -18px rgba(255,77,77,0.55); }
      50%  { transform: scale(1.06); box-shadow: 0 0 0 3px var(--accent), 0 30px 64px -14px rgba(255,77,77,0.7); }
      100% { transform: scale(1); box-shadow: 0 0 0 2px var(--accent), 0 22px 56px -18px rgba(255,77,77,0.55); }
    }
    .comparison-label { background: var(--accent-grad); box-shadow: 0 4px 14px -6px rgba(255,77,77,0.55); }
    .tv-mode .comparison-label { box-shadow: 0 4px 14px -6px rgba(0,135,90,0.55); }

    /* Module 4 — film-strip progress */
    .comparison-strip {
      display: flex; gap: 4px; justify-content: center;
      margin: 4px 0 2px; padding: 6px 0;
      flex-wrap: wrap; max-width: 360px; margin-left: auto; margin-right: auto;
    }
    .comparison-strip-cell {
      width: 14px; height: 18px; border-radius: 2px;
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      position: relative;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .comparison-strip-cell::before,
    .comparison-strip-cell::after {
      content: ""; position: absolute; left: 50%; transform: translateX(-50%);
      width: 6px; height: 2px; border-radius: 1px;
      background: rgba(0,0,0,0.35);
    }
    .comparison-strip-cell::before { top: 2px; }
    .comparison-strip-cell::after  { bottom: 2px; }
    .day-mode .comparison-strip-cell::before,
    .day-mode .comparison-strip-cell::after { background: rgba(0,0,0,0.18); }
    .comparison-strip-cell.filled {
      background: var(--accent-grad);
      border-color: transparent;
    }
    .comparison-strip-cell.current {
      transform: scaleY(1.18);
      box-shadow: 0 0 0 1px var(--border-accent), 0 0 10px -2px var(--accent);
    }
    .comparison-strip-text {
      font-size: 0.72rem; color: var(--text-faint);
      margin: 0 0 18px;
      letter-spacing: 1.5px; text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    /* Module 5 — typography rhythm */
    .ranked-header h2 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
    }
    .rank-number, .score-badge, .ranked-item-year, .profile-count,
    .compatibility-badge, .activity-time, .stats-card-number,
    .stats-bar-count, .comparison-progress {
      font-variant-numeric: tabular-nums;
    }
    .eyebrow {
      display: block;
      font-family: 'Outfit', sans-serif; font-weight: 600;
      font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 4px;
    }
    .trophy-section-title .eyebrow { margin-bottom: 2px; }

    /* Module 6 — micro-interactions */
    @keyframes bookmark-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      70%  { transform: scale(0.95); }
      100% { transform: scale(1.1); }
    }
    .bookmark-btn.bookmarked {
      animation: bookmark-pop 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .genre-pill {
      transition: background 0.25s ease, color 0.25s ease, transform 0.12s ease, box-shadow 0.2s ease;
    }
    .genre-pill.active {
      background: var(--accent-grad);
      box-shadow: 0 4px 12px -4px rgba(255,77,77,0.5);
    }
    .tv-mode .genre-pill.active {
      box-shadow: 0 4px 12px -4px rgba(0,135,90,0.5);
    }
    .genre-pill:not(.active):hover { background: var(--surface2); color: var(--text); }
    .genre-pill:active { transform: scale(0.96); }

    /* Poster skeleton shimmer — subtle ambient motion for placeholder posters */
    .poster-placeholder {
      position: relative; overflow: hidden;
    }
    .poster-placeholder::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      animation: poster-shimmer 2.6s linear infinite;
      pointer-events: none;
    }
    .day-mode .poster-placeholder::after {
      background: linear-gradient(110deg, transparent 30%, rgba(0,0,0,0.04) 50%, transparent 70%);
    }
    @keyframes poster-shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Search input: richer focus ring */
    .search-input:focus {
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Module 8 — stats bars gradient + reveal */
    .stats-bar-fill {
      background: var(--accent-grad);
      animation: bar-reveal 600ms cubic-bezier(0.22,1,0.36,1) both;
    }
    .tv-mode .stats-bar-fill { background: var(--accent-grad); }
    @keyframes bar-reveal {
      from { transform: scaleX(0); transform-origin: left; }
      to   { transform: scaleX(1); transform-origin: left; }
    }
    .stats-card-number {
      background: var(--accent-grad);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }

    /* Module 8 — gold-foil first trophy winner */
    .trophy-shelf .trophy-card:first-child .trophy-winner-name {
      background: var(--gold-foil);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      font-weight: 700;
      animation: foil-shimmer 5s linear infinite;
    }
    @keyframes foil-shimmer {
      from { background-position: 0% 50%; }
      to   { background-position: 200% 50%; }
    }

    /* Respect reduced-motion: disable decorative animations */
    @media (prefers-reduced-motion: reduce) {
      .comparison-cards::before, .comparison-cards::after,
      .trophy-shelf .trophy-card:first-child .trophy-winner-name,
      .poster-placeholder::after,
      .bookmark-btn.bookmarked,
      .stats-bar-fill {
        animation: none !important;
      }
      .comparison-card.is-losing, .comparison-card.is-winning {
        animation-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDK (compat version for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="movies.js"></script>
  <script src="tvshows.js"></script>
  <script src="firebase-config.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─── Firebase Init ──────────────────────────────────────────
    const FIREBASE_READY = typeof FIREBASE_CONFIG !== "undefined"
      && FIREBASE_CONFIG.apiKey
      && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE";

    let db = null;
    let auth = null;
    if (FIREBASE_READY) {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    const ADMIN_UID = "lF7taXh4NETa3h2UPZI6SGnWWcj2";

    // ─── Process Movie Database ─────────────────────────────────
    const TMDB_IMG = "https://image.tmdb.org/t/p/w200";
    const TMDB_IMG_LG = "https://image.tmdb.org/t/p/w300";
    const TMDB_API_KEY = "39a17d2f20e6ebc19af8eadbf015f5ab";
    const TMDB_SEARCH_URL = "https://api.themoviedb.org/3/search/movie";
    // Rolling cutoff for "New Releases" — anything from the previous calendar year onward.
    const NEW_RELEASE_YEAR = new Date().getFullYear() - 1;

    const GENRE_MAP = {28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",10770:"TV Movie",53:"Thriller",10752:"War",37:"Western"};
    const TV_GENRE_MAP = {10759:"Action & Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",10762:"Kids",9648:"Mystery",10763:"News",10764:"Reality",10765:"Sci-Fi & Fantasy",10766:"Soap",10767:"Talk",10768:"War & Politics",37:"Western"};

    const seen = new Set();
    const MOVIE_DB = MOVIE_DATA
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
    const MOVIE_DB_IDS = new Set(MOVIE_DB.map(m => m.id));

    const tvSeen = new Set();
    const TV_DB = (typeof TV_DATA !== "undefined" ? TV_DATA : [])
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (tvSeen.has(m.id)) return false; tvSeen.add(m.id); return true; });
    const TV_DB_IDS = new Set(TV_DB.map(m => m.id));

    const TMDB_TV_SEARCH_URL = "https://api.themoviedb.org/3/search/tv";

    async function searchTMDBTV(query) {
      try {
        const resp = await fetch(`${TMDB_TV_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(s => {
          const baseGenre = s.genre_ids && s.genre_ids.length ? (TV_GENRE_MAP[s.genre_ids[0]] || "Drama") : "Drama";
          const rating = s.vote_average || null;
          return { id: s.id, title: s.name, year: s.first_air_date ? s.first_air_date.slice(0, 4) : "", genre: baseGenre, poster: s.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB TV search error:", e);
        return [];
      }
    }

    async function searchTMDB(query) {
      try {
        const resp = await fetch(`${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(m => {
          const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
          const rating = m.vote_average || null;
          return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre: baseGenre, poster: m.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB search error:", e);
        return [];
      }
    }

    // ─── Poster Component ───────────────────────────────────────
    function Poster({ poster, title, className, style, size }) {
      const [failed, setFailed] = React.useState(false);
      const base = size === "lg" ? TMDB_IMG_LG : TMDB_IMG;
      if (poster && !failed) {
        return <img src={`${base}${poster}`} alt={title} className={className} style={style} loading="lazy" onError={() => setFailed(true)} />;
      }
      return (
        <div className={`poster-placeholder ${className || ""}`} style={style}>
          {title ? title.slice(0, 20) : "?"}
        </div>
      );
    }

    // ─── Score Calculation ───────────────────────────────────────
    function getScore(index, total) {
      if (total <= 1) return 10.0;
      return Math.round((10.0 * (1 - index / (total - 1))) * 10) / 10;
    }

    function scoreClass(score) {
      if (score >= 7) return "score-high";
      if (score >= 4) return "score-mid";
      return "score-low";
    }

    // ─── Letterboxd Import ──────────────────────────────────────
    // Parse a single CSV line preserving empty fields and handling quoted
    // segments (including escaped double quotes). The regex previously used
    // collapsed consecutive commas, which misaligned columns whenever a
    // field like Year was blank.
    function splitCsvLine(line) {
      const out = [];
      let cur = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { cur += ch; }
        } else {
          if (ch === ',') { out.push(cur); cur = ""; }
          else if (ch === '"') { inQuotes = true; }
          else { cur += ch; }
        }
      }
      out.push(cur);
      return out;
    }

    async function extractLetterboxdRatings(file) {
      let csvText;
      if (file.name.endsWith(".zip")) {
        const zip = await JSZip.loadAsync(file);
        const csvFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith("ratings.csv"));
        if (!csvFile) throw new Error("No ratings.csv found in ZIP");
        csvText = await zip.files[csvFile].async("string");
      } else {
        csvText = await file.text();
      }
      const lines = csvText.split("\n").map(l => l.trim()).filter(l => l);
      if (lines.length < 2) throw new Error("CSV file is empty");
      // Parse header to find column indices
      const header = splitCsvLine(lines[0]).map(h => h.trim().toLowerCase());
      const nameIdx = header.indexOf("name");
      const yearIdx = header.indexOf("year");
      const ratingIdx = header.indexOf("rating");
      if (nameIdx === -1 || ratingIdx === -1) throw new Error("CSV missing Name or Rating columns");
      const entries = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = splitCsvLine(lines[i]);
        if (!cols.length) continue;
        const name = (cols[nameIdx] || "").trim();
        const year = yearIdx !== -1 ? (cols[yearIdx] || "").trim() : "";
        const rating = parseFloat(cols[ratingIdx] || "0");
        if (name && !isNaN(rating) && rating > 0) {
          entries.push({ title: name, year, lbRating: rating });
        }
      }
      // Sort by rating desc (ties resolved later by TMDB vote average)
      entries.sort((a, b) => b.lbRating - a.lbRating);
      return entries;
    }

    async function lookupTMDB(title, year) {
      try {
        let url = `${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&include_adult=false&language=en-US&page=1`;
        if (year) url += `&year=${year}`;
        const resp = await fetch(url);
        if (!resp.ok) return null;
        const data = await resp.json();
        if (!data.results || data.results.length === 0) {
          // Fallback: try without year
          if (year) return lookupTMDB(title, "");
          return null;
        }
        const m = data.results[0];
        const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
        return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre: baseGenre, poster: m.poster_path || null, rating: m.vote_average || null };
      } catch (e) {
        return null;
      }
    }

    // ─── Binary Insertion ───────────────────────────────────────
    function createSession(newMovie, rankedList) {
      const session = {
        newMovie, list: rankedList, low: 0, high: rankedList.length,
        step: 0, maxSteps: Math.ceil(Math.log2(rankedList.length + 1)),
      };
      return advanceSession(session);
    }

    function advanceSession(session) {
      if (session.low >= session.high) return { ...session, done: true, insertIndex: session.low };
      const mid = Math.floor((session.low + session.high) / 2);
      return { ...session, done: false, compareMovie: session.list[mid], mid };
    }

    function recordChoice(session, preferNew) {
      const next = {
        ...session, step: session.step + 1,
        low: preferNew ? session.low : session.mid + 1,
        high: preferNew ? session.mid : session.high,
      };
      return advanceSession(next);
    }

    // ─── Firestore Helpers ──────────────────────────────────────
    const MILESTONES = [10, 25, 50, 100, 200, 500];

    async function writeActivityEvent(event) {
      if (!db) return;
      try {
        await db.collection("activity").add(event);
        _lastActivityWrite = Date.now();
      } catch (e) {
        console.error("Failed to write activity:", e);
      }
    }

    var _lastActivityWrite = 0;

    async function saveProfile(user, rankedList, tvRankedList, watchlist, tvWatchlist, isPrivate) {
      if (!db || !user) return;
      try {
        // Load existing profile to detect changes for activity feed
        var oldDoc = await db.collection("profiles").doc(user.uid).get();
        var oldData = oldDoc.exists ? oldDoc.data() : null;
        var oldMovieCount = oldData ? (oldData.movieCount || 0) : 0;
        var oldTop10Ids = oldData && oldData.movies ? oldData.movies.slice(0, 10).map(function(m) { return m.id; }).join(",") : "";

        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(user.uid).set({
          displayName: user.displayName || "Anonymous",
          photoURL: user.photoURL || null,
          movies: rankedList.map(toSave),
          movieCount: rankedList.length,
          tvShows: tvRankedList.map(toSave),
          tvShowCount: tvRankedList.length,
          watchlist: (watchlist || []).map(toSave),
          watchlistCount: (watchlist || []).length,
          tvWatchlist: (tvWatchlist || []).map(toSave),
          tvWatchlistCount: (tvWatchlist || []).length,
          isPrivate: !!isPrivate,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });

        // Throttle activity writes: max once per 30s (client-side tracking)
        var now = Date.now();
        if (now - _lastActivityWrite < 30000) return;

        var baseEvent = {
          uid: user.uid,
          displayName: user.displayName || "Anonymous",
          photoURL: user.photoURL || null,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        // Priority: joined > milestone > top10 > ranked (check both movies and TV)
        if (!oldData) {
          writeActivityEvent(Object.assign({}, baseEvent, { type: "joined", movie: null, rank: null, count: null }));
        } else {
          var newMovieCount = rankedList.length;
          var newTvCount = tvRankedList.length;
          var oldTvCount = oldData.tvShowCount || 0;
          var oldTvTop10Ids = oldData.tvShows ? oldData.tvShows.slice(0, 10).map(function(m) { return m.id; }).join(",") : "";

          // Check movie milestone
          var hitMilestone = null;
          for (var mi = 0; mi < MILESTONES.length; mi++) {
            if (oldMovieCount < MILESTONES[mi] && newMovieCount >= MILESTONES[mi]) {
              hitMilestone = MILESTONES[mi];
            }
          }
          if (hitMilestone) {
            writeActivityEvent(Object.assign({}, baseEvent, { type: "milestone", movie: null, rank: null, count: hitMilestone }));
          } else {
            // Check movie top 10 change
            var newTop10Ids = rankedList.slice(0, 10).map(function(m) { return m.id; }).join(",");
            if (oldTop10Ids && newTop10Ids !== oldTop10Ids && oldMovieCount >= 10) {
              writeActivityEvent(Object.assign({}, baseEvent, { type: "top10", movie: null, rank: null, count: null }));
            } else if (newMovieCount > oldMovieCount) {
              // New movie ranked
              var oldMovieIds = new Set((oldData.movies || []).map(function(m) { return m.id; }));
              var newest = null;
              var newestRank = null;
              for (var ri = 0; ri < rankedList.length; ri++) {
                if (!oldMovieIds.has(rankedList[ri].id)) {
                  newest = rankedList[ri];
                  newestRank = ri + 1;
                  break;
                }
              }
              if (newest) {
                writeActivityEvent(Object.assign({}, baseEvent, {
                  type: "ranked",
                  movie: { id: newest.id, title: newest.title, poster: newest.poster || null },
                  rank: newestRank,
                  count: null
                }));
              }
            } else if (newTvCount > oldTvCount) {
              // New TV show ranked
              var oldTvIds = new Set((oldData.tvShows || []).map(function(m) { return m.id; }));
              var newestTv = null;
              var newestTvRank = null;
              for (var ti = 0; ti < tvRankedList.length; ti++) {
                if (!oldTvIds.has(tvRankedList[ti].id)) {
                  newestTv = tvRankedList[ti];
                  newestTvRank = ti + 1;
                  break;
                }
              }
              if (newestTv) {
                writeActivityEvent(Object.assign({}, baseEvent, {
                  type: "ranked",
                  movie: { id: newestTv.id, title: newestTv.title, poster: newestTv.poster || null },
                  rank: newestTvRank,
                  count: null,
                  isTV: true
                }));
              }
            } else {
              // Check TV top 10 change
              var newTvTop10Ids = tvRankedList.slice(0, 10).map(function(m) { return m.id; }).join(",");
              if (oldTvTop10Ids && newTvTop10Ids !== oldTvTop10Ids && oldTvCount >= 10) {
                writeActivityEvent(Object.assign({}, baseEvent, { type: "top10", movie: null, rank: null, count: null, isTV: true }));
              }
            }
          }
        }
      } catch (e) {
        console.error("Failed to save profile:", e);
      }
    }

    async function loadActivityFeed(limit) {
      if (!db) return [];
      try {
        var snap = await db.collection("activity")
          .orderBy("timestamp", "desc")
          .limit(limit || 20)
          .get();
        return snap.docs.map(function(d) {
          var data = d.data();
          data._id = d.id;
          return data;
        });
      } catch (e) {
        console.error("Failed to load activity feed:", e);
        return [];
      }
    }

    async function loadProfile(uid) {
      if (!db) return null;
      try {
        const doc = await db.collection("profiles").doc(uid).get();
        if (doc.exists) return doc.data();
      } catch (e) {
        console.error("Failed to load profile:", e);
      }
      return null;
    }

    async function adminSaveProfile(uid, movies, tvShows) {
      if (!db) return;
      try {
        const toSave = m => ({ id: m.id, title: m.title, year: m.year, genre: m.genre, poster: m.poster, rating: m.rating || null });
        await db.collection("profiles").doc(uid).update({
          movies: movies.map(toSave),
          movieCount: movies.length,
          tvShows: tvShows.map(toSave),
          tvShowCount: tvShows.length,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        console.error("Failed to admin save profile:", e);
      }
    }

    async function deleteProfile(uid) {
      if (!db) return;
      try {
        await db.collection("profiles").doc(uid).delete();
      } catch (e) {
        console.error("Failed to delete profile:", e);
      }
    }

    // ─── Compatibility Score ──────────────────────────────────
    function computeListCompatibility(myList, theirList) {
      if (!myList || !theirList || myList.length < 2 || theirList.length < 2) return null;
      const myMap = {};
      myList.forEach((m, i) => { myMap[m.id] = i / myList.length; });
      const theirMap = {};
      theirList.forEach((m, i) => { theirMap[m.id] = i / theirList.length; });
      const sharedIds = Object.keys(myMap).filter(id => id in theirMap);
      if (sharedIds.length < 2) return { score: null, shared: 0 };
      const rankDiffs = sharedIds.map(id => Math.abs(myMap[id] - theirMap[id]));
      const avgSimilarity = 1 - rankDiffs.reduce((a, b) => a + b, 0) / rankDiffs.length;
      const overlapRatio = sharedIds.length / Math.min(myList.length, theirList.length);
      const score = (avgSimilarity * 0.6 + Math.min(overlapRatio, 1) * 0.4) * 100;
      return { score: Math.round(score), shared: sharedIds.length };
    }

    function computeCompatibility(myMovies, myTv, theirMovies, theirTv) {
      const movieResult = computeListCompatibility(myMovies, theirMovies);
      const tvResult = computeListCompatibility(myTv, theirTv);
      const movieShared = movieResult ? movieResult.shared : 0;
      const tvShared = tvResult ? tvResult.shared : 0;
      const totalShared = movieShared + tvShared;
      if (totalShared < 2) return null;
      const movieScore = movieResult && movieResult.score !== null ? movieResult.score : 0;
      const tvScore = tvResult && tvResult.score !== null ? tvResult.score : 0;
      const blended = (movieScore * movieShared + tvScore * tvShared) / totalShared;
      return Math.round(blended);
    }

    async function loadCommunityProfiles() {
      if (!db) return [];
      try {
        const snap = await db.collection("profiles")
          .orderBy("updatedAt", "desc")
          .limit(50)
          .get();
        const all = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
          .filter(p => (p.movieCount || 0) > 0 || (p.tvShowCount || 0) > 0);
        // Deduplicate by displayName — keep the one with the most rankings (likely the real account)
        const byName = new Map();
        all.forEach(p => {
          const name = (p.displayName || "").toLowerCase().trim();
          const existing = byName.get(name);
          const total = (p.movieCount || 0) + (p.tvShowCount || 0);
          const existingTotal = existing ? (existing.movieCount || 0) + (existing.tvShowCount || 0) : 0;
          if (!existing || total > existingTotal) {
            byName.set(name, p);
          }
        });
        return Array.from(byName.values());
      } catch (e) {
        console.error("Failed to load community:", e);
        return [];
      }
    }

    // ─── Recommendations ────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const POPULAR_MOVIE_IDS = [278,155,13,550,27205,603,680,329,597,98,862,8587,12,105,76341,157336,872585,361743,545611,496243,475557,346698,693134,533535,402431,299534,299536,24428,1726,118340,284054,293660,263115,324857,634649,414906,109445,277834,354912,301528,10681,585,38,37799,106646,562,949,807,274,769,500,115,578,694,348,679,62,85,10193,14160,9806,2062,244786,1124,77,6977,24,73,7345,210577,335984,78,37165,68718,16869,424,424694,332562,419430,530915,374720,313369];
    const POPULAR_TV_IDS = [1396,1399,66732,1418,60735,456,1402,1668,63174,71446,82856,76479,1100,95557,84958,2316,94997,93405,60574,62560,87108,85552,100088,114472,71712,44217,1405,63926,31917,67744,69478,32726,4614,1434,2190,1622,246,84773,1395,1104,2382,72879,61889,96677,2734,61175,4607,68507,75006,71789];

    // TMDB genre IDs for discover endpoint
    const TMDB_GENRE_IDS = { Horror: 27, Animation: 16, Comedy: 35, Romance: 10749, Drama: 18, Action: 28, "Sci-Fi": 878, Thriller: 53 };
    const TMDB_TV_GENRE_IDS = { Drama: 18, Comedy: 35, "Sci-Fi & Fantasy": 10765, "Action & Adventure": 10759, Animation: 16, Crime: 80 };

    // Fetch fresh unranked movies/shows from TMDB for a category
    function parseTMDBResults(results, genreMap, isTV) {
      return (results || []).map(function(m) {
        return {
          id: m.id,
          title: isTV ? m.name : m.title,
          year: (isTV ? m.first_air_date : m.release_date || "").slice(0, 4),
          genre: m.genre_ids && m.genre_ids.length ? (genreMap[m.genre_ids[0]] || "Drama") : "Drama",
          poster: m.poster_path || null,
          rating: m.vote_average || null,
        };
      }).filter(function(m) { return m.poster && m.title; });
    }

    async function fetchTMDBCategory(endpoint, rankedIds, genreMap, isTV, limit) {
      try {
        // Fetch 2 pages for initial variety
        const [r1, r2] = await Promise.all([
          fetch(endpoint + "&page=1").then(r => r.json()),
          fetch(endpoint + "&page=2").then(r => r.json()),
        ]);
        var totalPages = r1.total_pages || 1;
        const all = parseTMDBResults([].concat(r1.results || [], r2.results || []), genreMap, isTV);
        // Dedupe
        const seen = new Set();
        const unique = all.filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
        // Unranked first, then ranked
        const unranked = unique.filter(m => !rankedIds.has(m.id));
        const ranked = unique.filter(m => rankedIds.has(m.id));
        return { movies: [...unranked, ...ranked].slice(0, limit || 20), totalPages: totalPages, nextPage: 3 };
      } catch (e) { return { movies: [], totalPages: 0, nextPage: 3 }; }
    }

    async function fetchTMDBPage(endpoint, page, genreMap, isTV, existingIds) {
      try {
        var r = await fetch(endpoint + "&page=" + page).then(function(r) { return r.json(); });
        var items = parseTMDBResults(r.results, genreMap, isTV);
        // Dedupe against existing
        var fresh = items.filter(function(m) { return !existingIds.has(m.id); });
        return { movies: fresh, totalPages: r.total_pages || 1 };
      } catch (e) { return { movies: [], totalPages: 0 }; }
    }

    function Recommendations({ onSelect, onBookmark, rankedIds, watchlistIds, rankedList, localDb, mode }) {
      const isTV = mode === "tv";
      const [tmdbCats, setTmdbCats] = useState({});
      const [expandedCat, setExpandedCat] = useState(null);
      const rankedCountRef = useRef(0);
      const endpointsRef = useRef({});

      // Fetch fresh TMDB data for all categories
      useEffect(() => {
        if (!TMDB_API_KEY) return;
        const base = "https://api.themoviedb.org/3";
        const type = isTV ? "tv" : "movie";
        const gMap = isTV ? TV_GENRE_MAP : GENRE_MAP;
        const gIds = isTV ? TMDB_TV_GENRE_IDS : TMDB_GENRE_IDS;

        const genre1 = isTV ? "Drama" : "Horror";
        const genre2 = isTV ? "Comedy" : "Animation";

        const endpoints = {
          popular: `${base}/${type}/popular?api_key=${TMDB_API_KEY}&language=en-US`,
          acclaimed: `${base}/${type}/top_rated?api_key=${TMDB_API_KEY}&language=en-US`,
          newReleases: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&${isTV ? "first_air_date.gte" : "primary_release_date.gte"}=${NEW_RELEASE_YEAR}-01-01`,
          genre1: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds[genre1] || 18}`,
          genre2: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds[genre2] || 16}`,
          genre3: isTV
            ? `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds["Sci-Fi & Fantasy"] || 10765}`
            : `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=35`,
          genre4: isTV
            ? null
            : `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=10749`,
          classics: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=vote_count.desc&${isTV ? "first_air_date.lte" : "primary_release_date.lte"}=${isTV ? "2005" : "1990"}-12-31`,
        };

        // Fetch "For You" using TMDB's similar movies/shows for your top picks
        var forYouEndpoint = null;
        let forYouPromise = Promise.resolve({ movies: [], totalPages: 0, nextPage: 3 });
        if (rankedList && rankedList.length >= 3) {
          // Pick up to 5 top-ranked movies with real TMDB IDs
          var topPicks = rankedList.slice(0, 10).filter(function(m) {
            return typeof m.id === "number" || (typeof m.id === "string" && m.id.indexOf("custom_") !== 0);
          }).slice(0, 5);

          if (topPicks.length > 0) {
            // Fetch similar movies for each top pick in parallel
            var similarPromises = topPicks.map(function(m) {
              var url = base + "/" + type + "/" + m.id + "/similar?api_key=" + TMDB_API_KEY + "&language=en-US&page=1";
              return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
                return parseTMDBResults(data.results || [], gMap, isTV);
              }).catch(function() { return []; });
            });

            forYouPromise = Promise.all(similarPromises).then(function(results) {
              // Merge all similar results, dedupe, prioritize unranked
              var seen = new Set();
              var all = [];
              results.forEach(function(movies) {
                movies.forEach(function(m) {
                  if (!seen.has(m.id) && m.poster) {
                    seen.add(m.id);
                    all.push(m);
                  }
                });
              });
              var unranked = all.filter(function(m) { return !rankedIds.has(m.id); });
              var ranked = all.filter(function(m) { return rankedIds.has(m.id); });
              var movies = unranked.concat(ranked).slice(0, 40);
              return { movies: movies, totalPages: 1, nextPage: 2 };
            });
          } else {
            // Fallback to genre-based discover if no valid TMDB IDs
            var topHalf = rankedList.slice(0, Math.ceil(rankedList.length / 2));
            var genreCounts = {};
            topHalf.forEach(function(m) { if (m.genre) genreCounts[m.genre] = (genreCounts[m.genre] || 0) + 1; });
            var topGenre = Object.entries(genreCounts).sort(function(a, b) { return b[1] - a[1]; })[0];
            if (topGenre) {
              var topGenreId = gIds[topGenre[0]];
              if (topGenreId) {
                forYouEndpoint = base + "/discover/" + type + "?api_key=" + TMDB_API_KEY + "&language=en-US&sort_by=vote_average.desc&vote_count.gte=100&with_genres=" + topGenreId;
                forYouPromise = fetchTMDBCategory(forYouEndpoint, rankedIds, gMap, isTV, 20);
              }
            }
          }
        }

        // Store endpoints for pagination
        endpointsRef.current = Object.assign({}, endpoints, { forYou: forYouEndpoint, _gMap: gMap, _isTV: isTV });

        var emptyResult = { movies: [], totalPages: 0, nextPage: 3 };
        Promise.all([
          forYouPromise,
          fetchTMDBCategory(endpoints.popular, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.acclaimed, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.newReleases, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.genre1, rankedIds, gMap, isTV, 15),
          fetchTMDBCategory(endpoints.genre2, rankedIds, gMap, isTV, 15),
          fetchTMDBCategory(endpoints.genre3, rankedIds, gMap, isTV, 15),
          endpoints.genre4 ? fetchTMDBCategory(endpoints.genre4, rankedIds, gMap, isTV, 15) : Promise.resolve(emptyResult),
          fetchTMDBCategory(endpoints.classics, rankedIds, gMap, isTV, 15),
        ]).then(function(results) {
          var keys = ["forYou", "popular", "acclaimed", "newReleases", "g1", "g2", "g3", "g4", "classics"];
          var epKeys = ["forYou", "popular", "acclaimed", "newReleases", "genre1", "genre2", "genre3", "genre4", "classics"];
          var state = {};
          keys.forEach(function(k, i) {
            var r = results[i];
            state[k] = { movies: r.movies, totalPages: r.totalPages, nextPage: r.nextPage, loading: false, endpoint: endpointsRef.current[epKeys[i]] || null };
          });
          setTmdbCats(state);
        });

        rankedCountRef.current = rankedIds.size;
      }, [isTV, rankedIds.size]);

      // Close expanded view on Escape
      useEffect(function() {
        function handleKey(e) { if (e.key === "Escape") setExpandedCat(null); }
        document.addEventListener("keydown", handleKey);
        return function() { document.removeEventListener("keydown", handleKey); };
      }, []);

      // Load more movies for a category (with throttle)
      var loadThrottleRef = useRef({});
      function loadMoreMovies(catKey) {
        var now = Date.now();
        if (loadThrottleRef.current[catKey] && now - loadThrottleRef.current[catKey] < 800) return;
        loadThrottleRef.current[catKey] = now;

        var catData = tmdbCats[catKey];
        if (!catData || !catData.endpoint || catData.loading) return;
        if (catData.nextPage > catData.totalPages) return;
        var ep = endpointsRef.current;
        var gMap = ep._gMap;
        var tvMode = ep._isTV;

        // Capture what we need before async work
        var endpoint = catData.endpoint;
        var pageToFetch = catData.nextPage;

        // Set loading
        setTmdbCats(function(prev) {
          var updated = Object.assign({}, prev);
          updated[catKey] = Object.assign({}, updated[catKey], { loading: true });
          return updated;
        });

        // Build existingIds from fresh state inside the updater callback
        var existingIds = new Set((catData.movies || []).map(function(m) { return m.id; }));
        fetchTMDBPage(endpoint, pageToFetch, gMap, tvMode, existingIds).then(function(result) {
          setTmdbCats(function(prev) {
            var old = prev[catKey];
            if (!old) return prev;
            // Dedupe against current state (not stale closure)
            var currentIds = new Set(old.movies.map(function(m) { return m.id; }));
            var fresh = result.movies.filter(function(m) { return !currentIds.has(m.id); });
            var updated = Object.assign({}, prev);
            updated[catKey] = Object.assign({}, old, {
              movies: old.movies.concat(fresh),
              nextPage: old.nextPage + 1,
              totalPages: result.totalPages || old.totalPages,
              loading: false,
            });
            return updated;
          });
        });
      }

      // Helper to get movies array from tmdbCats (handles new structure)
      function getTmdbMovies(key) {
        var d = tmdbCats[key];
        if (!d) return [];
        return d.movies || d;
      }

      const categories = useMemo(() => {
        const db = localDb;
        const genre1 = isTV ? "Drama" : "Horror";
        const genre2 = isTV ? "Comedy" : "Animation";
        const genre3Label = isTV ? "Sci-Fi & Fantasy" : "Comedy";
        const genre4Label = isTV ? null : "Romance";
        const forYouTitle = isTV ? "Shows You May Like" : "Movies You May Like";

        // Helper: merge local DB results with TMDB results, preferring unranked
        // localLimit caps how many local DB items to include (prevents dumping thousands)
        function mergeResults(localItems, tmdbItems, localLimit) {
          var maxLocal = localLimit || 10;
          var localUnranked = localItems.filter(m => !rankedIds.has(m.id)).slice(0, maxLocal);
          const merged = new Map();
          localUnranked.forEach(m => merged.set(m.id, m));
          (tmdbItems || []).filter(m => !rankedIds.has(m.id)).forEach(m => { if (!merged.has(m.id)) merged.set(m.id, m); });
          // Fill with ranked only if very few results
          if (merged.size < 5) {
