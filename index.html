<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%23ff4d4d'/%3E%3Cg transform='translate(8,14)'%3E%3Crect x='0' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3Crect x='11.5' y='-1' width='10' height='12' rx='1' fill='none' stroke='white' stroke-width='1.5'/%3E%3Crect x='23' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3C/g%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Movi</title>
  <meta name="description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:title" content="Movi" />
  <meta property="og:description" content="Every movie ranked, one matchup at a time." />
  <meta property="og:image" content="https://axelhufford.com/og-image.png?v=2" />
  <meta property="og:url" content="https://axelhufford.com/" />

  <meta name="twitter:title" content="Movi" />
  <meta name="twitter:description" content="Every movie ranked, one matchup at a time." />
  <meta name="twitter:image" content="https://axelhufford.com/og-image.png?v=2" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111115;
      --surface2: #18181e;
      --accent: #ff4d4d;
      --accent-hover: #ff6b6b;
      --text: #f0efe8;
      --text-muted: #6e6e7a;
      --gold: #f5c518;
      --radius: 14px;
      --border: #1c1c22;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #root { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Film Strip Logo */
    .header { text-align: center; padding: 36px 0 20px; position: relative; }
    .header h1 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; cursor: pointer; display: none; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }

    .logo-strip { display: flex; align-items: center; justify-content: center; gap: 0; cursor: pointer; }
    .logo-frame {
      display: flex; align-items: center; justify-content: center; position: relative;
      width: 38px; height: 46px; border: 2px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.025);
    }
    .logo-frame.active {
      border-color: var(--accent); background: rgba(255,77,77,0.07);
      transform: scale(1.1); z-index: 2;
      box-shadow: 0 0 20px rgba(255,77,77,0.25);
    }
    .logo-frame .frame-num {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px;
      color: rgba(255,255,255,0.16);
    }
    .logo-frame.active .frame-num { color: var(--accent); }
    .logo-frame .sprocket {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 9px; height: 3px; border-radius: 1px; background: rgba(255,255,255,0.08);
    }
    .logo-frame.active .sprocket { background: rgba(255,77,77,0.28); }
    .sprocket-top { top: 3px; }
    .sprocket-bot { bottom: 3px; }
    .logo-wordmark {
      font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 32px;
      letter-spacing: 10px; text-transform: uppercase; color: #fff; margin-top: 8px;
    }
    .logo-tv-sub {
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 10px;
      letter-spacing: 4px; text-transform: uppercase; color: #4ddb9a; opacity: 0.65;
      margin-top: 2px; display: none;
    }
    .tv-mode .logo-tv-sub { display: block; }
    .tv-mode .logo-frame.active {
      border-color: var(--accent); background: rgba(0,105,62,0.1);
      box-shadow: 0 0 20px rgba(0,105,62,0.25);
    }
    .tv-mode .logo-frame.active .frame-num { color: var(--accent); }
    .tv-mode .logo-frame.active .sprocket { background: rgba(0,105,62,0.35); }

    /* Auth Bar */
    .auth-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      padding: 10px 0; margin-bottom: 4px;
    }
    .auth-user {
      display: flex; align-items: center; gap: 8px;
    }
    .auth-avatar {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent);
    }
    .auth-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent);
    }
    .auth-name { font-size: 0.85rem; font-weight: 600; }
    .auth-btn {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-btn-signin {
      background: var(--accent); color: #fff;
    }
    .auth-btn-signin:hover { background: var(--accent-hover); }
    .auth-btn-signout {
      background: #333; color: var(--text-muted); font-size: 0.75rem; padding: 6px 12px;
    }
    .auth-btn-signout:hover { background: #444; color: var(--text); }
    .auth-btn-email {
      background: #fff; color: #333;
    }
    .auth-btn-email:hover { background: #e0e0e0; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 10px 0;
      color: var(--text-muted); font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ""; flex: 1; height: 1px; background: #333;
    }
    .auth-form {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px;
      margin-bottom: 16px; max-width: 360px; margin-left: auto; margin-right: auto;
    }
    .auth-form h3 { text-align: center; margin-bottom: 16px; font-size: 1.1rem; font-family: 'Outfit', sans-serif; }
    .auth-input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 0.9rem; margin-bottom: 10px;
      outline: none; transition: border-color 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: #666; }
    .auth-error {
      color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; text-align: center;
    }
    .auth-link {
      color: var(--accent); cursor: pointer; font-size: 0.8rem;
      background: none; border: none; text-decoration: underline;
    }
    .auth-link:hover { color: var(--accent-hover); }
    .auth-form-footer {
      text-align: center; margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);
    }
    .auth-form-submit {
      width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; background: var(--accent); color: #fff;
      transition: background 0.2s; margin-top: 4px;
    }
    .auth-form-submit:hover { background: var(--accent-hover); }
    .auth-back {
      display: block; text-align: center; margin-bottom: 12px;
      color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
      background: none; border: none;
    }
    .auth-back:hover { color: var(--text); }
    .auth-sync {
      font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
    }
    .auth-sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block;
    }

    /* Share */
    .share-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Profile View (viewing someone else's rankings) */
    .profile-banner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px;
      text-align: center; margin-bottom: 20px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent); margin-bottom: 10px;
    }
    .profile-avatar-ph {
      width: 64px; height: 64px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      border: 3px solid var(--accent); margin: 0 auto 10px;
    }
    .profile-name { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .profile-count { color: var(--text-muted); font-size: 0.9rem; }
    .profile-back {
      display: inline-block; margin-top: 12px; padding: 8px 20px;
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
    }
    .profile-back:hover { background: var(--accent-hover); }

    /* Tabs for navigation */
    .nav-tabs {
      display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto;
    }
    .nav-tab {
      flex: 1; padding: 10px 16px; border: none; background: none;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; text-align: center;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.3px;
    }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* Community */
    .community-section { margin-top: 10px; }
    .community-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .community-list { display: flex; flex-direction: column; gap: 8px; }
    .community-card {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .community-card:hover { background: var(--surface2); transform: translateY(-2px); }
    .community-card-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-avatar-ph {
      width: 44px; height: 44px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--accent);
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .community-card-info { flex: 1; min-width: 0; }
    .community-card-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem; }
    .community-card-meta { color: var(--text-muted); font-size: 0.8rem; }
    .community-card-top {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .community-card-top img, .community-card-top .poster-placeholder {
      width: 28px; height: 42px; border-radius: 4px; object-fit: cover;
    }
    .community-card-arrow { color: var(--text-muted); font-size: 1.2rem; flex-shrink: 0; }
    .compatibility-badge {
      font-size: 0.7rem; font-weight: 700; padding: 4px 8px;
      border-radius: 12px; flex-shrink: 0; text-align: center;
      min-width: 36px; line-height: 1;
    }
    .compatibility-high { background: var(--accent); color: #fff; }
    .compatibility-mid { background: #b8860b; color: #fff; }
    .compatibility-low { background: var(--surface2); color: var(--text-muted); font-weight: 600; }
    .community-delete-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      opacity: 0.4; transition: opacity 0.2s; padding: 4px 8px; flex-shrink: 0;
    }
    .community-delete-btn:hover { opacity: 1; }

    /* Search */
    .search-section { position: relative; margin-bottom: 24px; }
    .search-input {
      width: 100%; padding: 14px 20px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 1rem; outline: none; transition: border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface); border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--border); border-top: none; max-height: 400px; overflow-y: auto;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .search-item:hover { background: rgba(255, 77, 77, 0.1); }
    .search-item-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #2a2a4a; }
    .search-item-info { flex: 1; }
    .search-item-title { font-weight: 600; font-size: 0.95rem; }
    .search-item-year { color: var(--text-muted); font-size: 0.85rem; }
    .search-item-dupe {
      font-size: 0.75rem; color: var(--gold); background: rgba(245, 197, 24, 0.15);
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .search-add-custom {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; transition: background 0.15s; color: var(--accent);
      font-weight: 600; border-top: 1px solid #333;
    }
    .search-add-custom:hover { background: rgba(233, 69, 96, 0.15); }
    .search-add-icon {
      width: 40px; height: 60px; border-radius: 4px; background: #2a2a4a;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      color: var(--accent); flex-shrink: 0;
    }
    .poster-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: #2a2a4a; color: var(--text-muted); font-size: 0.6rem;
      text-align: center; overflow: hidden;
    }

    /* Recommendations */
    .recs-section { margin-bottom: 30px; }
    .recs-category { margin-bottom: 20px; }
    .recs-category-title {
      font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; color: var(--text-muted);
    }
    .recs-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .recs-row::-webkit-scrollbar { height: 6px; }
    .recs-row::-webkit-scrollbar-track { background: transparent; }
    .recs-row::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .rec-card {
      flex-shrink: 0; width: 110px; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
      position: relative;
    }
    .rec-card:hover { transform: scale(1.05) translateY(-3px); }
    .rec-card.ranked { opacity: 0.35; }
    .rec-card img, .rec-card .poster-placeholder {
      width: 110px; height: 165px; border-radius: 8px; object-fit: cover;
    }
    .rec-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; margin-top: 6px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-card-year { font-size: 0.65rem; color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
    .rec-card-badge {
      position: absolute; top: 6px; right: 6px; background: rgba(245, 197, 24, 0.9);
      color: #000; font-size: 0.6rem; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    }

    /* Comparison */
    .comparison-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .comparison-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px;
      max-width: 650px; width: 100%; text-align: center;
    }
    .comparison-title {
      font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .comparison-progress { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }
    .comparison-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .comparison-card {
      cursor: pointer; border-radius: var(--radius); overflow: hidden;
      border: 3px solid transparent; transition: all 0.2s; background: var(--surface2);
    }
    .comparison-card:hover { border-color: var(--accent); transform: scale(1.03); }
    .comparison-card img, .comparison-card .poster-placeholder {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
    }
    .comparison-card-info { padding: 10px; }
    .comparison-card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .comparison-card-year { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
    .comparison-label {
      padding: 8px; background: var(--accent); color: #fff;
      border-radius: 8px; font-weight: 600; font-size: 0.85rem;
    }
    .comparison-cancel {
      margin-top: 16px; padding: 10px 24px; background: none; border: 1px solid #555;
      color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .comparison-cancel:hover { border-color: var(--accent); color: var(--text); }

    /* Movie Detail Modal */
    .movie-detail-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 250;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; cursor: pointer;
    }
    .day-mode .movie-detail-overlay { background: rgba(0,0,0,0.5); }
    .movie-detail-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      max-width: 300px; width: 100%; overflow: hidden; cursor: default; position: relative;
    }
    .movie-detail-box img, .movie-detail-box .poster-placeholder {
      width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
    }
    .movie-detail-info {
      padding: 16px; text-align: center;
    }
    .movie-detail-title {
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .movie-detail-year {
      color: var(--text-muted); font-size: 0.85rem;
    }
    .movie-detail-close {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none; color: #fff;
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background 0.2s;
    }
    .movie-detail-close:hover { background: rgba(0,0,0,0.8); }

    /* Ranked List */
    .ranked-section { margin-top: 10px; }
    .ranked-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 8px; flex-wrap: wrap;
    }
    .ranked-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .ranked-header-btns { display: flex; gap: 8px; }
    .clear-btn {
      padding: 6px 14px; background: none; border: 1px solid #444;
      color: var(--text-muted); border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ranked-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
      border: 2px dashed #333; border-radius: var(--radius);
    }
    .ranked-empty p:first-child { font-size: 2rem; margin-bottom: 10px; }
    .ranked-list { display: flex; flex-direction: column; gap: 6px; }
    .ranked-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      transition: all 0.2s; cursor: pointer; position: relative;
    }
    .ranked-item:hover { background: var(--surface2); transform: translateY(-1px); }
    .ranked-list.is-dragging .ranked-item { transition: none; }
    .ranked-list.is-dragging .ranked-item:hover { background: var(--surface); transform: none; }
    .ranked-item.dragging-source { opacity: 0.25; transform: none !important; }
    .ranked-item.drop-before::before {
      content: ''; position: absolute; top: -4px; left: 0; right: 0;
      height: 3px; background: var(--accent); border-radius: 2px; z-index: 10;
    }
    .rank-number {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem; font-weight: 800; min-width: 32px; text-align: center;
      color: rgba(255,255,255,0.16);
    }
    .ranked-item:nth-child(1) .rank-number { color: var(--accent); }
    .ranked-item:nth-child(2) .rank-number { color: #c0c0c0; }

    .ranked-poster { width: 40px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .ranked-poster-ph { width: 40px; height: 60px; border-radius: 6px; }
    .ranked-item-info { flex: 1; min-width: 0; }
    .ranked-item-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .drag-handle {

    .remove-btn {

    /* Add from profile */

    /* Bookmark / Watchlist buttons */
    .bookmark-btn {

    /* Watchlist */

    /* Confirm */

    /* Toast */

    /* Sign-in prompt */

    /* Loading spinner */

    /* Day Mode (Light Theme) */

    .tv-mode .ranked-item:nth-child(1) .rank-number { color: var(--accent); }

    /* Profile sub-toggle for movies/tv */
    .profile-subtabs {
      display: flex; gap: 4px; justify-content: center; margin: 12px 0;
    }
    .profile-subtab {
      padding: 6px 16px; border: 1px solid #444; background: none;

    @media (max-width: 600px) {
      .comparison-cards { gap: 10px; }

      .nav-tabs { gap: 2px; }
      .nav-tab { padding: 8px 10px; font-size: 0.8rem; }
      .mode-btn { padding: 6px 14px; font-size: 0.8rem; }
      .stats-cards { grid-template-columns: 1fr 1fr; }

      }
      .ranked-item-info { flex: 1; min-width: 120px; }
      .ranked-item-title {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        font-size: 0.85rem;
      }

    /* ─── Stats & Insights ─────────────────────────────────────── */

    .stats-accordion.open .stats-chevron { transform: rotate(180deg); }
    .stats-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .stats-accordion.open .stats-body { max-height: 2000px; }
    .stats-content { padding: 0 20px 20px; }
    .stats-cards {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stats-card {
      background: rgba(255,255,255,0.04); border-radius: 10px;

    }

      font-size: 1.8rem; font-weight: 700; color: var(--accent);

      font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;

      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
      margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 3px;
    }
    .stats-bar-chart { margin-bottom: 24px; }
    .stats-bar-row {
      display: flex; align-items: center; gap: 10px;

    .stats-insight-icon { flex-shrink: 0; }
    .stats-empty {

      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDK (compat version for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="movies.js"></script>
  <script src="tvshows.js"></script>
  <script src="firebase-config.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─── Firebase Init ──────────────────────────────────────────
    const FIREBASE_READY = typeof FIREBASE_CONFIG !== "undefined"
      && FIREBASE_CONFIG.apiKey
      && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE";

    let db = null;
    let auth = null;
    if (FIREBASE_READY) {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    const ADMIN_UID = "lF7taXh4NETa3h2UPZI6SGnWWcj2";

    // ─── Process Movie Database ─────────────────────────────────
    const TMDB_IMG = "https://image.tmdb.org/t/p/w200";
    const TMDB_IMG_LG = "https://image.tmdb.org/t/p/w300";
    const TMDB_API_KEY = "39a17d2f20e6ebc19af8eadbf015f5ab";
    const TMDB_SEARCH_URL = "https://api.themoviedb.org/3/search/movie";

    const GENRE_MAP = {28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",10770:"TV Movie",53:"Thriller",10752:"War",37:"Western"};
    const TV_GENRE_MAP = {10759:"Action & Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",10762:"Kids",9648:"Mystery",10763:"News",10764:"Reality",10765:"Sci-Fi & Fantasy",10766:"Soap",10767:"Talk",10768:"War & Politics",37:"Western"};

    const seen = new Set();
    const MOVIE_DB = MOVIE_DATA
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
    const MOVIE_DB_IDS = new Set(MOVIE_DB.map(m => m.id));

    const tvSeen = new Set();
    const TV_DB = (typeof TV_DATA !== "undefined" ? TV_DATA : [])
      .map(([id, title, year, genre, poster]) => ({ id, title, year: String(year), genre, poster }))
      .filter(m => { if (tvSeen.has(m.id)) return false; tvSeen.add(m.id); return true; });
    const TV_DB_IDS = new Set(TV_DB.map(m => m.id));

    const TMDB_TV_SEARCH_URL = "https://api.themoviedb.org/3/search/tv";

    async function searchTMDBTV(query) {
      try {
        const resp = await fetch(`${TMDB_TV_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(s => {
          const baseGenre = s.genre_ids && s.genre_ids.length ? (TV_GENRE_MAP[s.genre_ids[0]] || "Drama") : "Drama";
          const rating = s.vote_average || null;
          return { id: s.id, title: s.name, year: s.first_air_date ? s.first_air_date.slice(0, 4) : "", genre: baseGenre, poster: s.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB TV search error:", e);
        return [];
      }
    }

    async function searchTMDB(query) {
      try {
        const resp = await fetch(`${TMDB_SEARCH_URL}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.results || []).map(m => {
          const baseGenre = m.genre_ids && m.genre_ids.length ? (GENRE_MAP[m.genre_ids[0]] || "Drama") : "Drama";
          const rating = m.vote_average || null;
          return { id: m.id, title: m.title, year: m.release_date ? m.release_date.slice(0, 4) : "", genre: baseGenre, poster: m.poster_path || null, rating };
        });
      } catch (e) {
        console.error("TMDB search error:", e);
        return [];
      }
    }

    // ─── Poster Component ───────────────────────────────────────
    function Poster({ poster, title, className, style, size }) {
      const [failed, setFailed] = React.useState(false);
      const base = size === "lg" ? TMDB_IMG_LG : TMDB_IMG;
      if (poster && !failed) {
        return <img src={`${base}${poster}`} alt={title} className={className} style={style} loading="lazy" onError={() => setFailed(true)} />;
      }
      return (
        <div className={`poster-placeholder ${className || ""}`} style={style}>
          {title ? title.slice(0, 20) : "?"}
        </div>
      );
    }

    // ─── Score Calculation ───────────────────────────────────────
    function getScore(index, total) {
      if (total <= 1) return 10.0;
      return Math.round((10.0 * (1 - index / (total - 1))) * 10) / 10;
    }

    function scoreClass(score) {
      if (score >= 7) return "score-high";
      if (score >= 4) return "score-mid";
      return "score-low";
    }

    // ─── Binary Insertion ───────────────────────────────────────
    function createSession(newMovie, rankedList) {
      const session = {
        newMovie, list: rankedList, low: 0, high: rankedList.length,
        step: 0, maxSteps: Math.ceil(Math.log2(rankedList.length + 1)),
      };
      return advanceSession(session);
    }

    function advanceSession(session) {
      if (session.low >= session.high) return { ...session, done: true, insertIndex: session.low };
      const mid = Math.floor((session.low + session.high) / 2);
      return { ...session, done: false, compareMovie: session.list[mid], mid };
    }

    function recordChoice(session, preferNew) {
      const next = {
        ...session, step: session.step + 1,
        low: preferNew ? session.low : session.mid + 1,
        high: preferNew ? session.mid : session.high,
      };
      return advanceSession(next);
    }

    // ─── Compatibility Score ──────────────────────────────────
    function computeListCompatibility(myList, theirList) {
      if (!myList || !theirList || myList.length < 2 || theirList.length < 2) return null;
      const myMap = {};
      myList.forEach((m, i) => { myMap[m.id] = i / myList.length; });
      const theirMap = {};
      theirList.forEach((m, i) => { theirMap[m.id] = i / theirList.length; });
      const sharedIds = Object.keys(myMap).filter(id => id in theirMap);
      if (sharedIds.length < 2) return { score: null, shared: 0 };
      const rankDiffs = sharedIds.map(id => Math.abs(myMap[id] - theirMap[id]));
      const avgSimilarity = 1 - rankDiffs.reduce((a, b) => a + b, 0) / rankDiffs.length;
      const overlapRatio = sharedIds.length / Math.min(myList.length, theirList.length);
      const score = (avgSimilarity * 0.6 + Math.min(overlapRatio, 1) * 0.4) * 100;
      return { score: Math.round(score), shared: sharedIds.length };
    }

    function computeCompatibility(myMovies, myTv, theirMovies, theirTv) {
      const movieResult = computeListCompatibility(myMovies, theirMovies);
      const tvResult = computeListCompatibility(myTv, theirTv);
      const movieShared = movieResult ? movieResult.shared : 0;
      const tvShared = tvResult ? tvResult.shared : 0;
      const totalShared = movieShared + tvShared;
      if (totalShared < 2) return null;
      const movieScore = movieResult && movieResult.score !== null ? movieResult.score : 0;
      const tvScore = tvResult && tvResult.score !== null ? tvResult.score : 0;
      const blended = (movieScore * movieShared + tvScore * tvShared) / totalShared;
      return Math.round(blended);
    }

    async function loadCommunityProfiles() {
      if (!db) return [];
      try {
        const snap = await db.collection("profiles")
          .orderBy("updatedAt", "desc")
          .limit(50)
          .get();
        const all = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
          .filter(p => (p.movieCount || 0) > 0 || (p.tvShowCount || 0) > 0);
        // Deduplicate by displayName — keep the one with the most rankings (likely the real account)
        const byName = new Map();
        all.forEach(p => {
          const name = (p.displayName || "").toLowerCase().trim();
          const existing = byName.get(name);
          const total = (p.movieCount || 0) + (p.tvShowCount || 0);
          const existingTotal = existing ? (existing.movieCount || 0) + (existing.tvShowCount || 0) : 0;
          if (!existing || total > existingTotal) {
            byName.set(name, p);
          }
        });
        return Array.from(byName.values());
      } catch (e) {
        console.error("Failed to load community:", e);
        return [];
      }
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Fetch fresh unranked movies/shows from TMDB for a category
    async function fetchTMDBCategory(endpoint, rankedIds, genreMap, isTV, limit) {
      try {
        // Fetch 2 pages for more variety
        const [r1, r2] = await Promise.all([
          fetch(endpoint + "&page=1").then(r => r.json()),
          fetch(endpoint + "&page=" + (1 + Math.floor(Math.random() * 4))).then(r => r.json()),
        ]);
        const all = [...(r1.results || []), ...(r2.results || [])];
        const items = all.map(m => ({
          id: m.id,
          title: isTV ? m.name : m.title,
          year: (isTV ? m.first_air_date : m.release_date || "").slice(0, 4),
          genre: m.genre_ids && m.genre_ids.length ? (genreMap[m.genre_ids[0]] || "Drama") : "Drama",
          poster: m.poster_path || null,
          rating: m.vote_average || null,
        })).filter(m => m.poster && m.title);
        // Dedupe
        const seen = new Set();
        const unique = items.filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
        // Unranked first, then ranked
        const unranked = unique.filter(m => !rankedIds.has(m.id));
        const ranked = unique.filter(m => rankedIds.has(m.id));
        return [...unranked, ...ranked].slice(0, limit || 20);
      } catch (e) { return []; }
    }

    function Recommendations({ onSelect, onBookmark, rankedIds, watchlistIds, rankedList, localDb, mode }) {
      const isTV = mode === "tv";
      const [tmdbCats, setTmdbCats] = useState({});
      const rankedCountRef = useRef(0);

      // Fetch fresh TMDB data for all categories
      useEffect(() => {
        if (!TMDB_API_KEY) return;
        const base = isTV ? "https://api.themoviedb.org/3" : "https://api.themoviedb.org/3";
        const type = isTV ? "tv" : "movie";
        const gMap = isTV ? TV_GENRE_MAP : GENRE_MAP;
        const gIds = isTV ? TMDB_TV_GENRE_IDS : TMDB_GENRE_IDS;

        const genre1 = isTV ? "Drama" : "Horror";
        const genre2 = isTV ? "Comedy" : "Animation";

        const endpoints = {
          popular: `${base}/${type}/popular?api_key=${TMDB_API_KEY}&language=en-US`,
          acclaimed: `${base}/${type}/top_rated?api_key=${TMDB_API_KEY}&language=en-US`,
          newReleases: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&${isTV ? "first_air_date.gte" : "primary_release_date.gte"}=2023-01-01`,
          genre1: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds[genre1] || 18}`,
          genre2: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds[genre2] || 16}`,
          genre3: isTV
            ? `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=${gIds["Sci-Fi & Fantasy"] || 10765}`
            : `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=popularity.desc&with_genres=35,10749`,
          classics: `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=vote_count.desc&${isTV ? "first_air_date.lte" : "primary_release_date.lte"}=${isTV ? "2005" : "1990"}-12-31`,
        };

        // Fetch for you based on user's top genres
        let forYouPromise = Promise.resolve([]);
        if (rankedList && rankedList.length >= 3) {
          const topHalf = rankedList.slice(0, Math.ceil(rankedList.length / 2));
          const genreCounts = {};
          topHalf.forEach(m => { if (m.genre) genreCounts[m.genre] = (genreCounts[m.genre] || 0) + 1; });
          const topGenre = Object.entries(genreCounts).sort((a, b) => b[1] - a[1])[0];
          if (topGenre) {
            const topGenreId = gIds[topGenre[0]];
            if (topGenreId) {
              const fyEndpoint = `${base}/discover/${type}?api_key=${TMDB_API_KEY}&language=en-US&sort_by=vote_average.desc&vote_count.gte=100&with_genres=${topGenreId}`;
              forYouPromise = fetchTMDBCategory(fyEndpoint, rankedIds, gMap, isTV, 20);
            }
          }
        }

        Promise.all([
          forYouPromise,
          fetchTMDBCategory(endpoints.popular, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.acclaimed, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.newReleases, rankedIds, gMap, isTV, 20),
          fetchTMDBCategory(endpoints.genre1, rankedIds, gMap, isTV, 15),
          fetchTMDBCategory(endpoints.genre2, rankedIds, gMap, isTV, 15),
          fetchTMDBCategory(endpoints.genre3, rankedIds, gMap, isTV, 15),
          fetchTMDBCategory(endpoints.classics, rankedIds, gMap, isTV, 15),
        ]).then(([forYou, popular, acclaimed, newReleases, g1, g2, g3, classics]) => {
          setTmdbCats({ forYou, popular, acclaimed, newReleases, g1, g2, g3, classics });
        });

        rankedCountRef.current = rankedIds.size;
      }, [isTV, rankedIds.size]);

      const categories = useMemo(() => {
        const db = localDb;
        const genre1 = isTV ? "Drama" : "Horror";
        const genre2 = isTV ? "Comedy" : "Animation";
        const genre3Label = isTV ? "Sci-Fi & Fantasy" : "Comedies & Romance";
        const forYouTitle = isTV ? "Shows You May Like" : "Movies You May Like";

        // Helper: merge local DB results with TMDB results, preferring unranked
        function mergeResults(localItems, tmdbItems, limit) {
          const merged = new Map();
          // Add local unranked first
          localItems.filter(m => !rankedIds.has(m.id)).forEach(m => merged.set(m.id, m));
          // Add TMDB unranked
          (tmdbItems || []).filter(m => !rankedIds.has(m.id)).forEach(m => { if (!merged.has(m.id)) merged.set(m.id, m); });
          // Fill with ranked if needed
          localItems.filter(m => rankedIds.has(m.id)).forEach(m => { if (!merged.has(m.id)) merged.set(m.id, m); });
          (tmdbItems || []).filter(m => rankedIds.has(m.id)).forEach(m => { if (!merged.has(m.id)) merged.set(m.id, m); });
          return shuffle([...merged.values()].slice(0, limit));
        }

        const popularIds = isTV ? POPULAR_TV_IDS : POPULAR_MOVIE_IDS;
        const popularIdSet = new Set(popularIds);

        const cats = [];

        // For You
        const localForYou = rankedList && rankedList.length >= 3 ? (() => {
          const topHalf = rankedList.slice(0, Math.ceil(rankedList.length / 2));
          const genreCounts = {};
          const decadeCounts = {};
          topHalf.forEach(m => {
            if (m.genre) genreCounts[m.genre] = (genreCounts[m.genre] || 0) + 1;
            const decade = Math.floor(parseInt(m.year) / 10) * 10;
            if (decade) decadeCounts[decade] = (decadeCounts[decade] || 0) + 1;
          });
          const topGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => e[0]);
          const topDecades = Object.entries(decadeCounts).sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => Number(e[0]));
          return db.filter(m => !rankedIds.has(m.id) && (topGenres.includes(m.genre) || topDecades.includes(Math.floor(parseInt(m.year) / 10) * 10)));
        })() : [];
        const forYou = mergeResults(localForYou, tmdbCats.forYou, 20);
        if (forYou.length > 0) cats.push({ title: forYouTitle, movies: forYou });

        // Popular
        cats.push({ title: "Popular", movies: mergeResults(db.filter(m => popularIdSet.has(m.id)), tmdbCats.popular, 20) });

        // Critically Acclaimed
        const localAcclaimed = db.filter(m => m.rating && m.rating >= 8.0);
        const acclaimedMerged = mergeResults(localAcclaimed, tmdbCats.acclaimed, 20);
        if (acclaimedMerged.length > 0) cats.push({ title: "🏆 Critically Acclaimed", movies: acclaimedMerged });

        // New Releases
        cats.push({ title: "New Releases", movies: mergeResults(db.filter(m => parseInt(m.year) >= 2023), tmdbCats.newReleases, 20) });

        // Genre rows
        cats.push({ title: genre1, movies: mergeResults(db.filter(m => m.genre === genre1), tmdbCats.g1, 15) });
        cats.push({ title: genre2, movies: mergeResults(db.filter(m => m.genre === genre2), tmdbCats.g2, 15) });
        cats.push({ title: genre3Label, movies: mergeResults(
          isTV ? db.filter(m => m.genre === "Sci-Fi & Fantasy") : db.filter(m => m.genre === "Comedy" || m.genre === "Romance"),
          tmdbCats.g3, 15
        ) });

        // Classics
        const classicYear = isTV ? 2005 : 1990;
        cats.push({ title: "Classics", movies: mergeResults(db.filter(m => parseInt(m.year) <= classicYear), tmdbCats.classics, 15) });

        return cats;
      }, [localDb, isTV, tmdbCats, rankedIds.size, rankedList && rankedList.length >= 3 ? rankedList.slice(0, Math.ceil(rankedList.length / 2)).map(m => m.id).join(",") : ""]);

      return (
        <div className="recs-section">
          {categories.map(cat => (
            <div key={cat.title} className="recs-category">
              <div className="recs-category-title">{cat.title}</div>
              <div className="recs-row">
                {cat.movies.map(m => {
                  const isRanked = rankedIds.has(m.id);
                  const isWatchlisted = watchlistIds && watchlistIds.has(m.id);
                  return (
                    <div key={m.id} className={`rec-card ${isRanked ? "ranked" : ""}`}
                      onClick={() => !isRanked && !isWatchlisted && onSelect(m)}>
                      {isRanked && <div className="rec-card-badge">Ranked</div>}
                      {isWatchlisted && <div className="rec-card-badge" style={{background:"rgba(245,197,24,0.9)"}}>&#x2605;</div>}
                      <Poster poster={m.poster} title={m.title}
                        style={{ width: "100%", height: "auto", aspectRatio: "2/3", borderRadius: 8 }} />
                      <div className="rec-card-title">{m.title}</div>
                      <div className="rec-card-year">{m.year}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── Search Bar ─────────────────────────────────────────────
    function SearchBar({ onSelect, onBookmark, rankedIds, watchlistIds, localDb, searchFn, placeholder, customLabel }) {
      const [query, setQuery] = useState("");
      const [open, setOpen] = useState(false);
      const [tmdbResults, setTmdbResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const containerRef = useRef(null);
      const debounceRef = useRef(null);

      // Local results (instant)
      const localResults = useMemo(() => {
        if (!query.trim()) return [];
        const q = query.toLowerCase();
        return (localDb || MOVIE_DB).filter(m =>
          m.title.toLowerCase().includes(q) || m.year.includes(q) || m.genre.toLowerCase().includes(q)
        ).slice(0, 10);
      }, [query, localDb]);

      // TMDB live search (debounced)
      const activeFn = searchFn || searchTMDB;
      useEffect(() => {
        if (!TMDB_API_KEY || !query.trim() || query.trim().length < 2) {
          setTmdbResults([]); setSearching(false); return;
        }
        setSearching(true);
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(async () => {
          const results = await activeFn(query.trim());
          setTmdbResults(results);
          setSearching(false);
        }, 350);
        return () => clearTimeout(debounceRef.current);
      }, [query]);

      // Merge: local first, then TMDB results not already in local
      const results = useMemo(() => {
        const localIds = new Set(localResults.map(m => m.id));
        const extra = tmdbResults.filter(m => !localIds.has(m.id));
        return [...localResults, ...extra].slice(0, 15);
      }, [localResults, tmdbResults]);

      useEffect(() => { setOpen(results.length > 0 || query.trim().length > 0); }, [results, query]);

      useEffect(() => {
        function handleClick(e) {
          if (containerRef.current && !containerRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      function handleSelect(movie) {
        if (rankedIds.has(movie.id)) return;
        setQuery(""); setOpen(false); onSelect(movie);
      }

      function handleAddCustom() {
        const title = query.trim();
        if (!title) return;
        setQuery(""); setOpen(false);
        onSelect({ id: "custom_" + Date.now(), title, year: "", genre: "", poster: null });
      }

      return (
        <div className="search-section" ref={containerRef}>
          <input className="search-input" type="text" placeholder={placeholder || "Search for a movie to rank..."}
            value={query} onChange={e => setQuery(e.target.value)}
            onFocus={() => query.trim() && setOpen(true)} />
          {open && (
            <div className="search-results">
              {results.map(m => {
                const isDupe = rankedIds.has(m.id);
                return (
                  <div key={m.id} className="search-item" style={isDupe ? { opacity: 0.5 } : {}}
                    onClick={() => handleSelect(m)}>
                    <Poster poster={m.poster} title={m.title} className="search-item-poster" />
                    <div className="search-item-info">
                      <div className="search-item-title">{m.title}</div>
                      <div className="search-item-year">{m.year} &middot; {m.genre}</div>
                    </div>
                    {isDupe && <span className="search-item-dupe">Already ranked</span>}
                    {onBookmark && !isDupe && (
                      <button className={`bookmark-btn ${watchlistIds && watchlistIds.has(m.id) ? "bookmarked" : ""}`}
                        disabled={watchlistIds && watchlistIds.has(m.id)}
                        onClick={(e) => { e.stopPropagation(); onBookmark(m); }}
                        title={watchlistIds && watchlistIds.has(m.id) ? "On watchlist" : "Add to watchlist"}>
                        {watchlistIds && watchlistIds.has(m.id) ? "\u2605" : "\u2606"}
                      </button>
                    )}
                  </div>
                );
              })}
              {searching && <div style={{textAlign:"center",padding:"10px",color:"var(--text-muted)",fontSize:"0.85rem"}}>Searching TMDB...</div>}
              {query.trim() && (
                <div className="search-add-custom" onClick={handleAddCustom}>
                  <div className="search-add-icon">+</div>
                  <div>Add "{query.trim()}" as custom {customLabel || "movie"}</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function RankedList({ list, onRemove, onClear, onShare, onMove, readOnly, user, onAddMovie, onBookmark, rankedIds, watchlistIds, itemLabel, onMovieClick }) {
      const [confirmClear, setConfirmClear] = useState(false);

      const [overIndex, setOverIndex] = useState(null);
      const listRef = useRef(null);

      const scrollIntervalRef = useRef(null);

      useEffect(() => {
        return () => {
          if (cloneRef.current) { cloneRef.current.remove(); cloneRef.current = null; }
          if (scrollIntervalRef.current) { clearInterval(scrollIntervalRef.current); scrollIntervalRef.current = null; }
        };
      }, []);

      function computeOverIndex(clientY) {
        if (!listRef.current) return null;
        var listTop = listRef.current.getBoundingClientRect().top;
        var relY = clientY - listTop + listRef.current.scrollTop;
        var rects = itemRectsRef.current;
        for (var r = 0; r < rects.length; r++) {
          var mid = rects[r].top + rects[r].height / 2;
          if (relY < mid) return r;
        }
        return rects.length;
      }

      function startAutoScroll(clientY) {
        if (scrollIntervalRef.current) return;
        scrollIntervalRef.current = setInterval(function() {
          var y = lastClientYRef.current;
          var edge = 60;
          if (y < edge) {
            var speed = Math.round(2 + 6 * (1 - y / edge));
            window.scrollBy(0, -speed);
          } else if (y > window.innerHeight - edge) {
            var dist = y - (window.innerHeight - edge);
            var speed2 = Math.round(2 + 6 * (dist / edge));
            window.scrollBy(0, speed2);
          }
        }, 16);
      }

      function stopAutoScroll() {
        if (scrollIntervalRef.current) { clearInterval(scrollIntervalRef.current); scrollIntervalRef.current = null; }
      }

      function removeClone() {
        if (cloneRef.current) { cloneRef.current.remove(); cloneRef.current = null; }
      }

      function handleDragStart(e, index) {
        if (e.target.closest && e.target.closest("button")) return;
        startPosRef.current = { x: e.clientX, y: e.clientY, index: index };
        isDraggingRef.current = false;
        e.currentTarget.setPointerCapture(e.pointerId);
        e.preventDefault();
      }

      function handleDragMove(e) {
        var sp = startPosRef.current;
        if (sp.index === null) return;

        if (!isDraggingRef.current) {
          var dx = Math.abs(e.clientX - sp.x);
          var dy = Math.abs(e.clientY - sp.y);
          if (dx + dy < 5) return;
          isDraggingRef.current = true;
          setDragIndex(sp.index);

          // Cache item rects relative to list container
          if (listRef.current) {
            var items = listRef.current.querySelectorAll(".ranked-item");
            var listTop = listRef.current.getBoundingClientRect().top;
            itemRectsRef.current = Array.from(items).map(function(el) {
              var r = el.getBoundingClientRect();
              return { top: r.top - listTop + listRef.current.scrollTop, height: r.height };
            });
          }

          // Create floating clone
          var items2 = listRef.current.querySelectorAll(".ranked-item");
          var srcEl = items2[sp.index];
          if (srcEl) {
            var rect = srcEl.getBoundingClientRect();
            var clone = srcEl.cloneNode(true);
            clone.style.cssText = "position:fixed;z-index:9999;pointer-events:none;width:" +
              rect.width + "px;left:" + rect.left + "px;top:" + rect.top + "px;opacity:0.92;" +
              "box-shadow:0 8px 32px rgba(0,0,0,0.35);transform:scale(1.02);border-radius:14px;" +
              "transition:none;background:var(--surface);border:1px solid var(--accent);";
            document.body.appendChild(clone);
            cloneRef.current = clone;
            startPosRef.current.offsetY = e.clientY - rect.top;
          }
          startAutoScroll(e.clientY);
        }

        if (isDraggingRef.current) {
          lastClientYRef.current = e.clientY;
          if (cloneRef.current) {
            cloneRef.current.style.top = (e.clientY - (startPosRef.current.offsetY || 0)) + "px";
          }
          var newOver = computeOverIndex(e.clientY);
          setOverIndex(function(prev) { return newOver !== prev ? newOver : prev; });
        }
      }

      function handleDragEnd(e) {
        if (isDraggingRef.current && startPosRef.current.index !== null && onMove) {
          var from = startPosRef.current.index;
          var to = overIndex;
          if (to !== null && to !== from && to !== from + 1) {
            var target = to > from ? to - 1 : to;
            onMove(from, target);
          }
        }
        removeClone();
        stopAutoScroll();
        setDragIndex(null);
        setOverIndex(null);
        isDraggingRef.current = false;
        startPosRef.current = { x: 0, y: 0, index: null };
      }

      function handleDragCancel(e) {
        removeClone();
        stopAutoScroll();
        setDragIndex(null);
        setOverIndex(null);
        isDraggingRef.current = false;
        startPosRef.current = { x: 0, y: 0, index: null };
      }

      if (total === 0 && !readOnly) {
        return (
          <div className="ranked-section">
            <h2 style={{ marginBottom: 16 }}>Your Rankings</h2>
            <div className="ranked-empty">
              <p>{itemLabel === "TV show" ? "\uD83D\uDCFA" : "\uD83C\uDFAC"}</p>
              <p>Search or pick a {itemLabel || "movie"} above to start ranking!</p>
            </div>
          </div>
        );
      }

      if (total === 0 && readOnly) {
        return (
          <div className="ranked-section">
            <div className="ranked-empty">
              <p>{itemLabel === "TV show" ? "\uD83D\uDCFA" : "\uD83C\uDFAC"}</p>
              <p>No {itemLabel || "movie"}s ranked yet.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="ranked-section">
          <div className="ranked-header">
            <h2>{readOnly ? "Rankings" : "Your Rankings"} ({total})</h2>
            {!readOnly && (
              <div className="ranked-header-btns">
                {user && onShare && (
                  <button className="share-btn" onClick={onShare}>
                    <span>&#x1F517;</span> Share
                  </button>
                )}
                <button className="clear-btn" onClick={() => setConfirmClear(true)}>Clear All</button>
              </div>
            )}
          </div>
          <div className={"ranked-list" + (dragIndex !== null ? " is-dragging" : "")} ref={listRef}>
            {list.map((movie, i) => {
              const score = getScore(i, total);
              var itemClass = "ranked-item";
              if (dragIndex === i) itemClass += " dragging-source";
              if (overIndex === i && overIndex !== dragIndex) itemClass += " drop-before";
              return (
                <div key={movie.id} className={itemClass} onClick={() => onMovieClick && onMovieClick(movie)}>
                  <div className="rank-number">{i + 1}</div>
                  <Poster poster={movie.poster} title={movie.title}
                    className={movie.poster ? "ranked-poster" : "ranked-poster-ph poster-placeholder"} />
                  <div className="ranked-item-info">
                    <div className="ranked-item-title">{movie.title}</div>
                    <div className="ranked-item-year">{movie.year}{movie.genre ? ` \u00b7 ${movie.genre}` : ""}</div>
                  </div>
                  <div className={`score-badge ${scoreClass(score)}`}>{score.toFixed(1)}</div>
                  {!readOnly && onMove && (
                    <div className="drag-handle"
                      onPointerDown={(e) => handleDragStart(e, i)}
                      onPointerMove={handleDragMove}
                      onPointerUp={handleDragEnd}
                      onPointerCancel={handleDragCancel}
                      title="Drag to reorder">&#x2807;</div>
                  )}
                  {!readOnly && <button className="remove-btn" onClick={(e) => { e.stopPropagation(); onRemove(movie.id); }} title="Remove">&#x2715;</button>}
                  {onBookmark && (
                    <button className={`bookmark-btn ${watchlistIds && watchlistIds.has(movie.id) ? "bookmarked" : ""}`}
                      disabled={watchlistIds && watchlistIds.has(movie.id) || (rankedIds && rankedIds.has(movie.id))}
                      onClick={(e) => { e.stopPropagation(); onBookmark(movie); }}
                      title={watchlistIds && watchlistIds.has(movie.id) ? "On watchlist" : "Add to watchlist"}>
                      {watchlistIds && watchlistIds.has(movie.id) ? "\u2605" : "\u2606"}
                    </button>
                  )}
                  {onAddMovie && (
                    <button className="profile-add-btn"
                      disabled={rankedIds && rankedIds.has(movie.id)}
                      onClick={(e) => { e.stopPropagation(); onAddMovie(movie); }}
                      title="Add to your rankings">
                      {rankedIds && rankedIds.has(movie.id) ? "Ranked" : "+ Add"}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
          {confirmClear && (
            <div className="confirm-overlay">
              <div className="confirm-box">
                <p>Remove all {total} {itemLabel || "movie"}s from your rankings?</p>
                <div className="confirm-btns">
                  <button className="confirm-yes" onClick={() => { onClear(); setConfirmClear(false); }}>Yes, Clear All</button>
                  <button className="confirm-no" onClick={() => setConfirmClear(false)}>Cancel</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Community View ─────────────────────────────────────────
    function CommunityView({ onViewProfile, currentUid, isAdmin, myMovies, myTv }) {
      const [profiles, setProfiles] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadCommunityProfiles().then(p => {
          let filtered = p.filter(pr => pr.uid !== currentUid);
          // Compute compatibility scores and sort
          const hasMyRankings = (myMovies && myMovies.length > 0) || (myTv && myTv.length > 0);
          if (hasMyRankings) {
            filtered = filtered.map(pr => {
              const compat = computeCompatibility(myMovies || [], myTv || [], pr.movies || [], pr.tvShows || []);
              console.log("Compatibility with", pr.displayName, ":", compat, "| their movies:", (pr.movies || []).length, "| my movies:", (myMovies || []).length);
              return { ...pr, compatibility: compat };
            });
            filtered.sort((a, b) => {
              if (a.compatibility !== null && b.compatibility !== null) return b.compatibility - a.compatibility;
              if (a.compatibility !== null) return -1;
              if (b.compatibility !== null) return 1;
              return 0;
            });
          }
          setProfiles(filtered);
          setLoading(false);
        });
      }, [currentUid, myMovies, myTv]);

      if (!FIREBASE_READY) {
        return (
          <div className="community-section">
            <div className="community-empty">
              <p style={{ fontSize: "2rem", marginBottom: 10 }}>&#x1F465;</p>
              <p>Set up Firebase to see other users' rankings.</p>
              <p style={{ fontSize: "0.8rem", marginTop: 8 }}>See firebase-config.js for instructions.</p>
            </div>
          </div>
        );
      }

      if (loading) {
        return (
          <div className="community-section" style={{ textAlign: "center", padding: 40 }}>
            <div className="spinner"></div>
            <p style={{ color: "var(--text-muted)", marginTop: 12, fontSize: "0.85rem" }}>Loading community...</p>
          </div>
        );
      }

      if (profiles.length === 0) {
        return (
          <div className="community-section">
            <div className="community-empty">
              <p style={{ fontSize: "2rem", marginBottom: 10 }}>&#x1F465;</p>
              <p>No other users yet. Share your link with friends!</p>
            </div>
          </div>
        );
      }

      return (
        <div className="community-section">
          <div className="community-list">
            {profiles.map(p => (
              <div key={p.uid} className="community-card" onClick={() => onViewProfile(p.uid)}>
                {p.photoURL
                  ? <img src={p.photoURL} alt="" className="community-card-avatar" referrerPolicy="no-referrer" />
                  : <div className="community-card-avatar-ph">{(p.displayName || "?")[0]}</div>
                }
                <div className="community-card-info">
                  <div className="community-card-name">{p.displayName || "Anonymous"}</div>
                  <div className="community-card-meta">
                    {(p.movieCount || 0) > 0 && `${p.movieCount} movies`}
                    {(p.movieCount || 0) > 0 && (p.tvShowCount || 0) > 0 && " · "}
                    {(p.tvShowCount || 0) > 0 && `${p.tvShowCount} shows`}
                    {(p.movieCount || 0) === 0 && (p.tvShowCount || 0) === 0 && "No rankings yet"}
                    {" ranked"}
                  </div>
                  {p.movies && p.movies.length > 0 && (
                    <div className="community-card-top">
                      {p.movies.slice(0, 5).map(m => (
                        <Poster key={m.id} poster={m.poster} title={m.title}
                          style={{ width: 28, height: 42, borderRadius: 4 }} />
                      ))}
                    </div>
                  )}
                </div>
                {p.compatibility !== undefined && p.compatibility !== null && (
                  <div className={`compatibility-badge ${p.compatibility >= 70 ? "compatibility-high" : p.compatibility >= 40 ? "compatibility-mid" : "compatibility-low"}`}>
                    {p.compatibility}%
                  </div>
                )}
                {p.compatibility === null && (myMovies && myMovies.length > 0 || myTv && myTv.length > 0) && (
                  <div className="compatibility-badge compatibility-low">—</div>
                )}
                <div className="community-card-arrow">&#x203A;</div>
                {isAdmin && (
                  <button className="community-delete-btn"
                    onClick={(e) => {
                      e.stopPropagation();
                      if (confirm(`Delete ${p.displayName || "this user"}'s profile?`)) {
                        deleteProfile(p.uid).then(() => {
                          setProfiles(prev => prev.filter(pr => pr.uid !== p.uid));
                        });
                      }
                    }}
                    title="Delete profile">&#x1F5D1;</button>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Profile View (viewing someone else's rankings) ─────────
    function ProfileView({ uid, onBack, onAddMovie, onBookmark, rankedIds, tvRankedIds, watchlistIds, tvWatchlistIds, defaultTab, isAdmin, onTabChange, onMovieClick }) {
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [profileTab, setProfileTab] = useState(defaultTab || "movies");
      const [editedMovies, setEditedMovies] = useState(null);
      const [editedTv, setEditedTv] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        loadProfile(uid).then(p => {
          setProfile(p);
          if (p) {
            setEditedMovies(p.movies || []);
            setEditedTv(p.tvShows || []);
          }
          setLoading(false);
        });
      }, [uid]);

      if (loading) {
        return (
          <div style={{ textAlign: "center", padding: 60 }}>
            <div className="spinner"></div>
            <p style={{ color: "var(--text-muted)", marginTop: 12 }}>Loading rankings...</p>
          </div>
        );
      }

      if (!profile) {
        return (
          <div style={{ textAlign: "center", padding: 60 }}>
            <p style={{ color: "var(--text-muted)" }}>Profile not found.</p>
            <button className="profile-back" onClick={onBack}>Go Back</button>
          </div>
        );
      }

      const movieList = isAdmin && editedMovies ? editedMovies : (profile.movies || []);
      const tvList = isAdmin && editedTv ? editedTv : (profile.tvShows || []);
      const activeList = profileTab === "movies" ? movieList : tvList;
      const activeIds = profileTab === "movies" ? rankedIds : tvRankedIds;
      const activeWlIds = profileTab === "movies" ? watchlistIds : tvWatchlistIds;

      function handleAdminRemove(id) {
        if (profileTab === "movies") {
          setEditedMovies(prev => prev.filter(m => m.id !== id));
        } else {
          setEditedTv(prev => prev.filter(m => m.id !== id));
        }
      }

      function handleAdminMove(fromIdx, toIdx) {
        if (profileTab === "movies") {
          setEditedMovies(prev => {
            const next = [...prev];
            const [item] = next.splice(fromIdx, 1);
            next.splice(toIdx, 0, item);
            return next;
          });
        } else {
          setEditedTv(prev => {
            const next = [...prev];
            const [item] = next.splice(fromIdx, 1);
            next.splice(toIdx, 0, item);
            return next;
          });
        }
      }

      async function handleAdminSave() {
        setSaving(true);
        await adminSaveProfile(uid, editedMovies || [], editedTv || []);
        setSaving(false);
        // Reload profile
        const p = await loadProfile(uid);
        if (p) {
          setProfile(p);
          setEditedMovies(p.movies || []);
          setEditedTv(p.tvShows || []);
        }
      }

      const hasChanges = isAdmin && (
        JSON.stringify(editedMovies) !== JSON.stringify(profile.movies || []) ||
        JSON.stringify(editedTv) !== JSON.stringify(profile.tvShows || [])
      );

      return (
        <div>
          <div className="profile-banner">
            {profile.photoURL
              ? <img src={profile.photoURL} alt="" className="profile-avatar" referrerPolicy="no-referrer" />
              : <div className="profile-avatar-ph">{(profile.displayName || "?")[0]}</div>
            }
            <div className="profile-name">{profile.displayName || "Anonymous"}</div>
            {isAdmin && <div style={{color:"var(--gold)",fontSize:"0.75rem",fontWeight:600,marginBottom:4}}>ADMIN MODE</div>}
            <div className="profile-count">
              {movieList.length > 0 && `${movieList.length} movies`}
              {movieList.length > 0 && tvList.length > 0 && " · "}
              {tvList.length > 0 && `${tvList.length} shows`}
              {" ranked"}
            </div>
            <div className="profile-subtabs">
              <button className={`profile-subtab ${profileTab === "movies" ? "active" : ""}`}
                onClick={() => { setProfileTab("movies"); onTabChange && onTabChange("movies"); }}>Movies ({movieList.length})</button>
              <button className={`profile-subtab ${profileTab === "tv" ? "active" : ""}`}
                onClick={() => { setProfileTab("tv"); onTabChange && onTabChange("tv"); }}>TV Shows ({tvList.length})</button>
            </div>
            {hasChanges && (
              <button className="profile-back" onClick={handleAdminSave}
                style={{background:"#2e7d32",marginRight:8}} disabled={saving}>
                {saving ? "Saving..." : "Save Changes"}
              </button>
            )}
            <button className="profile-back" onClick={onBack}>&#x2190; Back</button>
          </div>
          {isAdmin ? (
            <RankedList list={activeList} readOnly={false}
              onRemove={handleAdminRemove} onMove={handleAdminMove}
              onClear={() => profileTab === "movies" ? setEditedMovies([]) : setEditedTv([])}
              onAddMovie={(movie) => onAddMovie(movie, profileTab === "tv" ? "tv" : "movies")}
              onBookmark={(movie) => onBookmark(movie, profileTab === "tv" ? "tv" : "movies")}
              rankedIds={activeIds} watchlistIds={activeWlIds}
              onMovieClick={onMovieClick}
              itemLabel={profileTab === "tv" ? "TV show" : "movie"} />
          ) : (
            <RankedList list={activeList} readOnly={true}
              onAddMovie={(movie) => onAddMovie(movie, profileTab === "tv" ? "tv" : "movies")}
              onBookmark={(movie) => onBookmark(movie, profileTab === "tv" ? "tv" : "movies")}
              rankedIds={activeIds} watchlistIds={activeWlIds}
              onMovieClick={onMovieClick}
              itemLabel={profileTab === "tv" ? "TV show" : "movie"} />
          )}
        </div>
      );
    }

    // ─── Stats & Insights ──────────────────────────────────────
    function StatsView({ rankedList, watchlist, isTV }) {
      const itemLabel = isTV ? "shows" : "movies";
      const total = rankedList.length;
      const wlCount = (watchlist || []).length;

      if (total === 0) {
        return <div className="stats-empty">Rank some {itemLabel} to see your stats!</div>;
      }

      // Genre breakdown
      const genreCounts = {};
      rankedList.forEach(m => {
        const genres = (m.genre || "Unknown").split(",").map(g => g.trim());
        genres.forEach(g => { genreCounts[g] = (genreCounts[g] || 0) + 1; });
      });
      const genreSorted = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);
      const maxGenre = genreSorted[0] ? genreSorted[0][1] : 1;
      const topGenre = genreSorted[0] ? genreSorted[0][0] : "N/A";

      // Decade breakdown
      const decadeCounts = {};
      rankedList.forEach(m => {
        const yr = parseInt(m.year);
        if (!isNaN(yr)) {
          const decade = Math.floor(yr / 10) * 10 + "s";
          decadeCounts[decade] = (decadeCounts[decade] || 0) + 1;
        }
      });
      const decadeSorted = Object.entries(decadeCounts).sort((a, b) => {
        return parseInt(b[0]) - parseInt(a[0]);
      });
      const maxDecade = decadeSorted.length ? Math.max(...decadeSorted.map(d => d[1])) : 1;

      // Fun insights
      const insights = [];
      if (genreSorted.length > 0) {
        insights.push({ icon: "🎬", text: `Your #1 genre is ${topGenre} with ${genreSorted[0][1]} ${itemLabel}` });
      }
      if (decadeSorted.length > 0) {
        const topDecade = decadeSorted.reduce((a, b) => a[1] >= b[1] ? a : b);
        insights.push({ icon: "📅", text: `Most of your ${itemLabel} are from the ${topDecade[0]}` });
      }
      // Top 3 diversity
      if (rankedList.length >= 3) {
        const top3decades = new Set(rankedList.slice(0, 3).map(m => {
          const yr = parseInt(m.year);
          return isNaN(yr) ? null : Math.floor(yr / 10) * 10 + "s";
        }).filter(Boolean));
        if (top3decades.size === 3) {
          insights.push({ icon: "🌟", text: "Your top 3 are all from different decades!" });
        }
      }
      // 21st century percentage
      const c21 = rankedList.filter(m => parseInt(m.year) >= 2000).length;
      const pct = Math.round((c21 / total) * 100);
      insights.push({ icon: "🔮", text: `${pct}% of your list is from the 21st century` });
      // Unique genres
      if (genreSorted.length >= 5) {
        insights.push({ icon: "🎭", text: `You've explored ${genreSorted.length} different genres` });
      }

      // Bar colors for genres
      const barColors = [
        "#e94560", "#00b4d8", "#ffd166", "#06d6a0", "#ef476f",
        "#118ab2", "#fca311", "#8338ec", "#ff6b6b", "#48bfe3"
      ];

      return (
        <div className="stats-content">
          <div className="stats-cards">
            <div className="stats-card">
              <div className="stats-card-number">{total}</div>
              <div className="stats-card-label">{itemLabel} ranked</div>
            </div>
            <div className="stats-card">
              <div className="stats-card-number">{wlCount}</div>
              <div className="stats-card-label">on watchlist</div>
            </div>
            <div className="stats-card">
              <div className="stats-card-number">{topGenre}</div>
              <div className="stats-card-label">top genre</div>
            </div>
            <div className="stats-card">
              <div className="stats-card-number">{genreSorted.length}</div>
              <div className="stats-card-label">genres</div>
            </div>
          </div>

          <h4 className="stats-section-title">Genre Breakdown</h4>
          <div className="stats-bar-chart">
            {genreSorted.slice(0, 10).map(([genre, count], i) => (
              <div className="stats-bar-row" key={genre}>
                <div className="stats-bar-label">{genre}</div>
                <div className="stats-bar-track">
                  <div className="stats-bar-fill" style={{
                    width: Math.round((count / maxGenre) * 100) + "%",
                    background: barColors[i % barColors.length],
                    opacity: 0.85
                  }} />
                </div>
                <div className="stats-bar-count">{count}</div>
              </div>
            ))}
          </div>

          <h4 className="stats-section-title">By Decade</h4>
          <div className="stats-bar-chart">
            {decadeSorted.map(([decade, count]) => (
              <div className="stats-bar-row" key={decade}>
                <div className="stats-bar-label">{decade}</div>
                <div className="stats-bar-track">
                  <div className="stats-bar-fill" style={{
                    width: Math.round((count / maxDecade) * 100) + "%"
                  }} />
                </div>
                <div className="stats-bar-count">{count}</div>
              </div>
            ))}
          </div>

          {insights.length > 0 && (
            <>
              <h4 className="stats-section-title">Insights</h4>
              <div className="stats-insights">
                {insights.map((ins, i) => (
                  <div className="stats-insight" key={i}>
                    <span className="stats-insight-icon">{ins.icon}</span>
                    <span>{ins.text}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── Toast ──────────────────────────────────────────────────
    function Toast({ message }) {
      if (!message) return null;
      return <div className="toast">{message}</div>;
    }

    function MovieDetail({ movie, onClose }) {
      if (!movie) return null;
      return (
        <div className="movie-detail-overlay" onClick={onClose}>
          <div className="movie-detail-box" onClick={e => e.stopPropagation()}>
            <button className="movie-detail-close" onClick={onClose}>&#x2715;</button>

            <div className="movie-detail-info">
              <div className="movie-detail-title">{movie.title}</div>
