<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Film strip frames -->
  <g transform="translate(470, 160)">
    <!-- Frame 3 (left) -->
    <rect x="0" y="8" width="62" height="74" rx="3" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>
    <rect x="24" y="12" width="14" height="4" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="24" y="74" width="14" height="4" rx="1" fill="rgba(255,255,255,0.08)"/>
    <text x="31" y="56" font-family="Outfit, sans-serif" font-weight="800" font-size="30" fill="rgba(255,255,255,0.16)" text-anchor="middle">3</text>

    <!-- Frame 1 (center, active) -->
    <g transform="translate(62, 0) scale(1.1)" transform-origin="31 45">
      <rect x="0" y="0" width="62" height="82" rx="3" fill="rgba(255,77,77,0.07)" stroke="#ff4d4d" stroke-width="2"/>
      <rect x="24" y="4" width="14" height="4" rx="1" fill="rgba(255,77,77,0.28)"/>
      <rect x="24" y="74" width="14" height="4" rx="1" fill="rgba(255,77,77,0.28)"/>
      <text x="31" y="53" font-family="Outfit, sans-serif" font-weight="800" font-size="30" fill="#ff4d4d" text-anchor="middle">1</text>
    </g>

    <!-- Frame 2 (right) -->
    <rect x="136" y="8" width="62" height="74" rx="3" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>
    <rect x="160" y="12" width="14" height="4" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="160" y="74" width="14" height="4" rx="1" fill="rgba(255,255,255,0.08)"/>
    <text x="167" y="56" font-family="Outfit, sans-serif" font-weight="800" font-size="30" fill="rgba(255,255,255,0.16)" text-anchor="middle">2</text>
  </g>

  <!-- MOVI wordmark -->
  <text x="600" y="320" font-family="Outfit, sans-serif" font-weight="900" font-size="56" fill="white" text-anchor="middle" letter-spacing="16">MOVI</text>

  <!-- Tagline -->
  <text x="600" y="370" font-family="DM Sans, sans-serif" font-weight="400" font-size="20" fill="#6e6e7a" text-anchor="middle">Every movie ranked, one matchup at a time.</text>

  <!-- Subtle red glow behind active frame -->
  <ellipse cx="600" cy="200" rx="80" ry="60" fill="rgba(255,77,77,0.08)"/>

  <!-- URL -->
  <text x="600" y="540" font-family="Outfit, sans-serif" font-weight="500" font-size="16" fill="#6e6e7a" text-anchor="middle" letter-spacing="3">AXELHUFFORD.COM</text>
</svg>
